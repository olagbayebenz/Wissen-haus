name: Update Opportunities
on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-opportunities
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch, filter, dedupe and prune opportunities
        run: node redesign/scripts/fetch-opportunities.mjs
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add redesign/data/opportunities.json
          if git diff --cached --quiet; then
            echo "No changes to opportunities.json — nothing to commit."
          else
            git commit -m "chore: update opportunities data [skip ci]"
            git push
          fi
