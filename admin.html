<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard - Wissen-Haus</title>
<meta name="description" content="Wissen-Haus administrator dashboard for managing members, content, and programme data.">
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/css/styles.css">
<noscript><style>.reveal{opacity:1!important;transform:none!important}</style></noscript>
<style>
  .admin-header { background: linear-gradient(135deg, #0F2D1D 0%, #1a4d36 100%); color: white; padding: 32px; border-radius: 8px; margin-bottom: 32px }
  .admin-header h1 { margin: 0; font-size: 2rem }
  .stat-card { background: white; border: 1px solid var(--line); border-radius: 8px; padding: 20px; text-align: center }
  .stat-number { font-size: 2rem; font-weight: bold; color: var(--green-800) }
  .stat-label { color: var(--ink-60); font-size: 14px; margin-top: 8px }
  .submission-card { border: 1px solid var(--line); border-radius: 8px; padding: 16px; margin-bottom: 12px }
  .submission-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px }
  .submission-type { display: inline-block; padding: 4px 12px; background: var(--green-800); color: white; border-radius: 20px; font-size: 12px; font-weight: 600 }
  .submission-details { color: var(--ink-60); font-size: 14px; margin: 8px 0 }
  .btn-sm { padding: 6px 12px; font-size: 12px; text-decoration: none; border-radius: 4px; display: inline-block; border: none; cursor: pointer }
  .btn-view { background: var(--green-800); color: white }
  .btn-view:hover { background: var(--green-900) }
</style>
</head>
<body data-page="admin">

<main id="main">

<!-- ADMIN HEADER -->
<div style="padding: clamp(48px, 6vw, 84px) 0 0">
  <div class="wrap">
    <div class="admin-header">
      <h1>Admin Dashboard</h1>
      <p style="margin: 8px 0 0; opacity: 0.9">Manage submissions, applications, and member data</p>
      <a href="community.html" style="display: inline-block; margin-top: 16px; color: white; text-decoration: none; padding: 8px 16px; border: 1px solid white; border-radius: 4px; font-size: 14px">← Back to Community</a>
    </div>
  </div>
</div>

<!-- STATS -->
<section class="section">
  <div class="wrap">
    <div class="grid grid-4">
      <div class="stat-card reveal">
        <div class="stat-number" id="totalUsers">0</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card reveal" data-d="1">
        <div class="stat-number" id="totalSubmissions">0</div>
        <div class="stat-label">Applications</div>
      </div>
      <div class="stat-card reveal" data-d="2">
        <div class="stat-number" id="totalVolunteers">0</div>
        <div class="stat-label">Volunteer Apps</div>
      </div>
      <div class="stat-card reveal" data-d="3">
        <div class="stat-number" id="certificatesIssued">0</div>
        <div class="stat-label">Certificates</div>
      </div>
    </div>
  </div>
</section>

<!-- SUBMISSIONS -->
<section class="section">
  <div class="wrap">
    <div class="reveal">
      <h2 style="margin-top: 0">Recent Applications</h2>
      <div style="margin-bottom: 16px">
        <button onclick="filterSubmissions('all')" class="btn" style="margin-right: 8px">All</button>
        <button onclick="filterSubmissions('volunteer')" class="btn btn--outline" style="margin-right: 8px">Volunteers</button>
        <button onclick="filterSubmissions('partnership')" class="btn btn--outline">Partnerships</button>
      </div>

      <div id="submissionsList"></div>
      <p id="noSubmissions" style="text-align: center; color: var(--ink-60); padding: 32px">No applications yet.</p>
    </div>
  </div>
</section>

<!-- DATA EXPORT -->
<section class="section section--tight">
  <div class="wrap">
    <div style="border: 1px solid var(--line); border-radius: 8px; padding: 24px; background: var(--bg-light)">
      <h3 style="margin-top: 0">Data Management</h3>
      <p style="color: var(--ink-60)">Export data for reporting and analysis.</p>
      <div style="display: flex; gap: 12px; flex-wrap: wrap">
        <button onclick="exportSubmissions()" class="btn">Export Submissions</button>
        <button onclick="exportMembers()" class="btn btn--outline">Export Members</button>
        <button onclick="clearAllData()" class="btn btn--outline" style="color: #d63031">Clear Data (Dev Only)</button>
      </div>
    </div>
  </div>
</section>

</main>

<script src="assets/js/main.js"></script>
<script>
// Admin password check
if (localStorage.getItem('wh_adminAuth') !== 'true') {
  const password = prompt('Admin password:');
  if (password !== 'admin123') {
    alert('Access denied');
    window.location.href = 'community.html';
  } else {
    localStorage.setItem('wh_adminAuth', 'true');
  }
}

let allSubmissions = [];
let currentFilter = 'all';

function loadData() {
  // Load stats
  const users = JSON.parse(localStorage.getItem('wh_users') || '{}');
  const courseProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}');

  const userCount = Object.keys(users).length;
  const certCount = Object.values(courseProgress).filter(cp => cp && cp.certificateId).length;

  document.getElementById('totalUsers').textContent = userCount;
  document.getElementById('certificatesIssued').textContent = certCount;

  // Load submissions (would come from backend)
  // For now, show empty state
  document.getElementById('totalSubmissions').textContent = '0';
  document.getElementById('totalVolunteers').textContent = '0';
  document.getElementById('submissionsList').innerHTML = '';
  document.getElementById('noSubmissions').style.display = 'block';
}

function filterSubmissions(type) {
  currentFilter = type;
  renderSubmissions();
}

function renderSubmissions() {
  const container = document.getElementById('submissionsList');
  const filtered = currentFilter === 'all'
    ? allSubmissions
    : allSubmissions.filter(s => s.type.includes(currentFilter));

  if (filtered.length === 0) {
    container.innerHTML = '';
    document.getElementById('noSubmissions').style.display = 'block';
    return;
  }

  document.getElementById('noSubmissions').style.display = 'none';
  container.innerHTML = filtered.map(s => `
    <div class="submission-card">
      <div class="submission-header">
        <div>
          <span class="submission-type">${s.type.toUpperCase()}</span>
          <div style="margin-top: 8px">
            <strong>${s.name}</strong>
            <div class="submission-details">${s.email} • ${s.phone}</div>
          </div>
        </div>
        <div style="text-align: right">
          <div style="color: var(--ink-60); font-size: 12px">${new Date(s.date).toLocaleDateString()}</div>
          <button class="btn-sm btn-view" onclick="viewSubmission('${s.id}')">View Details</button>
        </div>
      </div>
    </div>
  `).join('');
}

function viewSubmission(id) {
  alert('Detailed view would show full submission data (backend integration needed)');
}

function exportSubmissions() {
  const csv = 'Type,Name,Email,Phone,Date\\n' + allSubmissions
    .map(s => `${s.type},"${s.name}",${s.email},${s.phone},${s.date}`)
    .join('\\n');

  downloadCSV(csv, 'submissions.csv');
}

function exportMembers() {
  const users = JSON.parse(localStorage.getItem('wh_users') || '{}');
  const csv = 'Email,Name,Joined\\n' + Object.values(users)
    .map(u => `${u.email},"${u.name}",${new Date().toLocaleDateString()}`)
    .join('\\n');

  downloadCSV(csv, 'members.csv');
}

function downloadCSV(csv, filename) {
  const link = document.createElement('a');
  link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  link.download = filename;
  link.click();
}

function clearAllData() {
  if (confirm('Delete all local data? This cannot be undone.')) {
    localStorage.clear();
    alert('All data cleared');
    window.location.href = 'login.html';
  }
}

loadData();
</script>
</body>
</html>
