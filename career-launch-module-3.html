<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 3: Networking - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="careerlunch"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 3 of 10</span><h1 class="display-lg mt-s">Networking Like a Pro</h1><p class="lead mt-m">Your network is your net worth. Learn to build genuine relationships, follow up strategically, and create opportunities through authentic connection.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="career-launch-module-2.html" class="btn btn--outline">← Previous Module</a><a href="career-launch-module-4.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 3, COURSE_ID = 'career-launch', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Networking Like a Pro</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Master the elevator pitch and conversation starters</li><li>Follow up authentically and maintain relationships</li><li>Leverage LinkedIn and online platforms strategically</li></ul></div><p class="module__summary">Networking isn't about pitching yourself. It's about genuine connection. Have a 30-second story ready. Ask questions and listen. Follow up within 48 hours. Use LinkedIn to stay connected. Build relationships before you need them—most opportunities come through people, not job boards.</p><div class="module__quiz"><strong>Quiz: Networking</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> The best networking approach is to:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_3_0" value="a"><span><strong>A.</strong> Ask for favors immediately</span></label><label class="module__option"><input type="radio" name="q_3_0" value="b"><span><strong>B.</strong> Focus on genuine connection and mutual interest</span></label><label class="module__option"><input type="radio" name="q_3_0" value="c"><span><strong>C.</strong> Only network when job hunting</span></label><label class="module__option"><input type="radio" name="q_3_0" value="d"><span><strong>D.</strong> Collect as many contacts as possible</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> When should you follow up after meeting someone?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_3_1" value="a"><span><strong>A.</strong> Never, they'll contact you</span></label><label class="module__option"><input type="radio" name="q_3_1" value="b"><span><strong>B.</strong> Within 48 hours with a personalized message</span></label><label class="module__option"><input type="radio" name="q_3_1" value="c"><span><strong>C.</strong> After a month</span></label><label class="module__option"><input type="radio" name="q_3_1" value="d"><span><strong>D.</strong> Only if they reach out first</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> Your LinkedIn profile should be:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_3_2" value="a"><span><strong>A.</strong> A replica of your resume</span></label><label class="module__option"><input type="radio" name="q_3_2" value="b"><span><strong>B.</strong> Updated regularly with achievements and a professional photo</span></label><label class="module__option"><input type="radio" name="q_3_2" value="c"><span><strong>C.</strong> Left blank until you need a job</span></label><label class="module__option"><input type="radio" name="q_3_2" value="d"><span><strong>D.</strong> Only for recruiters</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_3_0"]:checked')?.value, document.querySelector('input[name="q_3_1"]:checked')?.value, document.querySelector('input[name="q_3_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'career-launch-module-4.html'; }, 1500); } else { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-fail">You got ${correct}/3. Need 80%.</div>`; } }); updateProgress();
</script></body></html>
