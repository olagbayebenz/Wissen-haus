<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 4: Salary Negotiation - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="careerlunch"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 4 of 10</span><h1 class="display-lg mt-s">Salary Negotiation Essentials</h1><p class="lead mt-m">Know your worth. Learn to research market rates, make a strong case, and negotiate confidently without leaving money on the table.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="career-launch-module-3.html" class="btn btn--outline">← Previous Module</a><a href="career-launch-module-5.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 4, COURSE_ID = 'career-launch', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Salary Negotiation Essentials</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Research and know your market value</li><li>Negotiate confidently without losing the offer</li><li>Negotiate beyond just salary</li></ul></div><p class="module__summary">Research market rates on Glassdoor, Payscale, and H1B databases. Know your walk-away number. Don't state your salary first—let them. Always negotiate—companies expect it. If they say no to salary, negotiate remote work, flexible hours, professional development, or start date. Negotiation isn't greed; it's valuing yourself.</p><div class="module__quiz"><strong>Quiz: Negotiation</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> Before negotiating, you should:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_4_0" value="a"><span><strong>A.</strong> Accept the first offer</span></label><label class="module__option"><input type="radio" name="q_4_0" value="b"><span><strong>B.</strong> Research market rates and know your value</span></label><label class="module__option"><input type="radio" name="q_4_0" value="c"><span><strong>C.</strong> Ask friends what they make</span></label><label class="module__option"><input type="radio" name="q_4_0" value="d"><span><strong>D.</strong> Guess</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> What should you do when they ask your salary expectations?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_4_1" value="a"><span><strong>A.</strong> State your number first</span></label><label class="module__option"><input type="radio" name="q_4_1" value="b"><span><strong>B.</strong> Redirect—ask what they budgeted or say "I'm flexible"</span></label><label class="module__option"><input type="radio" name="q_4_1" value="c"><span><strong>C.</strong> Leave it blank</span></label><label class="module__option"><input type="radio" name="q_4_1" value="d"><span><strong>D.</strong> Exaggerate</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> If they won't budge on salary, you can negotiate:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_4_2" value="a"><span><strong>A.</strong> Nothing else</span></label><label class="module__option"><input type="radio" name="q_4_2" value="b"><span><strong>B.</strong> Remote work, flexibility, signing bonus, PTO, professional development</span></label><label class="module__option"><input type="radio" name="q_4_2" value="c"><span><strong>C.</strong> Reduce your expectations</span></label><label class="module__option"><input type="radio" name="q_4_2" value="d"><span><strong>D.</strong> Just accept it</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_4_0"]:checked')?.value, document.querySelector('input[name="q_4_1"]:checked')?.value, document.querySelector('input[name="q_4_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'career-launch-module-5.html'; }, 1500); } else { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-fail">You got ${correct}/3. Need 80%.</div>`; } }); updateProgress();
</script></body></html>
