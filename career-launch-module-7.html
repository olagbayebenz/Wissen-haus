<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 7: 5-Year Plan - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="careerlunch"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 7 of 10</span><h1 class="display-lg mt-s">Developing Your 5-Year Plan</h1><p class="lead mt-m">Set ambitious goals and create a roadmap to achieve them. Align your career with your values and aspirations.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="career-launch-module-6.html" class="btn btn--outline">← Previous Module</a><a href="career-launch-module-8.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 7, COURSE_ID = 'career-launch', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Developing Your 5-Year Plan</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Define your long-term career vision</li><li>Break down goals into actionable steps</li><li>Align career with values and growth</li></ul></div><p class="module__summary">Think big. Where do you want to be in 5 years? Work backward: Year 5 vision → Year 4 milestone → Year 3 → Year 2 → Year 1 goals. Each year should build skills for the next. Set specific milestones, not vague dreams. Revisit quarterly. Life will surprise you—plans should be flexible but directional. Your first role is stepping stone 1.</p><div class="module__quiz"><strong>Quiz: 5-Year Planning</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> How should you approach 5-year planning?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_7_0" value="a"><span><strong>A.</strong> Dream big without planning</span></label><label class="module__option"><input type="radio" name="q_7_0" value="b"><span><strong>B.</strong> Work backward from vision to actionable yearly goals</span></label><label class="module__option"><input type="radio" name="q_7_0" value="c"><span><strong>C.</strong> Don't plan, just react</span></label><label class="module__option"><input type="radio" name="q_7_0" value="d"><span><strong>D.</strong> Copy someone else's plan</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> What makes a good career goal?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_7_1" value="a"><span><strong>A.</strong> Vague and aspirational</span></label><label class="module__option"><input type="radio" name="q_7_1" value="b"><span><strong>B.</strong> Specific, measurable, aligned with values, with clear steps</span></label><label class="module__option"><input type="radio" name="q_7_1" value="c"><span><strong>C.</strong> Salary-focused only</span></label><label class="module__option"><input type="radio" name="q_7_1" value="d"><span><strong>D.</strong> Easy to achieve</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> How often should you review your plan?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_7_2" value="a"><span><strong>A.</strong> Once every 5 years</span></label><label class="module__option"><input type="radio" name="q_7_2" value="b"><span><strong>B.</strong> Quarterly or when circumstances change</span></label><label class="module__option"><input type="radio" name="q_7_2" value="c"><span><strong>C.</strong> Never</span></label><label class="module__option"><input type="radio" name="q_7_2" value="d"><span><strong>D.</strong> Only when you fail</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_7_0"]:checked')?.value, document.querySelector('input[name="q_7_1"]:checked')?.value, document.querySelector('input[name="q_7_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'career-launch-module-8.html'; }, 1500); } else { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-fail">You got ${correct}/3. Need 80%.</div>`; } }); updateProgress();
</script></body></html>
