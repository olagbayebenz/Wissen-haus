<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 10 - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="finliteracy"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 10 of 10</span><h1 class="display-lg mt-s">Building Long-Term Wealth</h1><p class="lead mt-m">Learn strategies for sustainable wealth growth, investment principles, retirement planning, and protecting your financial future.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="financial-literacy-module-9.html" class="btn btn--outline">← Previous Module</a><a href="financial-literacy-certificate.html" class="btn">Get Certificate →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 10, COURSE_ID = 'financial-literacy', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Building Long-Term Wealth</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Understand investment principles and asset allocation strategies</li><li>Plan for retirement and long-term financial goals</li><li>Build generational wealth and protect your financial future</li></ul></div><p class="module__summary">Building long-term wealth isn't about getting rich quick—it's about consistent, disciplined action over decades. This module covers investment fundamentals including stocks, bonds, and diversification; how to set realistic long-term financial goals; retirement planning options in Nigeria; and how to protect your wealth through insurance and risk management. You'll learn the power of compound interest, how to think like an investor, and how small decisions today create massive results decades from now.</p><div class="module__quiz"><strong>Quiz: Building Long-Term Wealth</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> What is the primary benefit of diversifying your investment portfolio?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_0" value="a"><span><strong>A.</strong> Guaranteed profits</span></label><label class="module__option"><input type="radio" name="q_10_0" value="b"><span><strong>B.</strong> Reduce risk by spreading investments across different asset classes</span></label><label class="module__option"><input type="radio" name="q_10_0" value="c"><span><strong>C.</strong> Eliminate all market losses</span></label><label class="module__option"><input type="radio" name="q_10_0" value="d"><span><strong>D.</strong> Avoid paying taxes</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> How does compound interest help build long-term wealth?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_1" value="a"><span><strong>A.</strong> It only works if you save large amounts at once</span></label><label class="module__option"><input type="radio" name="q_10_1" value="b"><span><strong>B.</strong> Small regular investments grow exponentially over time as you earn returns on your returns</span></label><label class="module__option"><input type="radio" name="q_10_1" value="c"><span><strong>C.</strong> It guarantees you'll become a millionaire</span></label><label class="module__option"><input type="radio" name="q_10_1" value="d"><span><strong>D.</strong> It has no effect on wealth building</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> At what age should you start thinking about retirement planning?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_2" value="a"><span><strong>A.</strong> Only when you're 50 or older</span></label><label class="module__option"><input type="radio" name="q_10_2" value="b"><span><strong>B.</strong> As early as possible, even in your 20s, to maximize compound growth</span></label><label class="module__option"><input type="radio" name="q_10_2" value="c"><span><strong>C.</strong> Never—let your government handle it</span></label><label class="module__option"><input type="radio" name="q_10_2" value="d"><span><strong>D.</strong> Only if you're wealthy</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_10_0"]:checked')?.value, document.querySelector('input[name="q_10_1"]:checked')?.value, document.querySelector('input[name="q_10_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-pass">✓ Passed!</div>'; this.disabled = true; setTimeout(() => { window.location.href = 'financial-literacy-certificate.html'; }, 1500); const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); } else { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">You got ' + correct + '/3. Need 80%.</div>'; } }); updateProgress();
</script></body></html>
