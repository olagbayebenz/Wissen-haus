<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join Wissen-Haus Community</title>
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/css/styles.css">
<style>
body{background:linear-gradient(135deg, var(--green-800) 0%, var(--green-900) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-wrapper{width:100%;max-width:500px}
.auth-card{background:#fff;border-radius:var(--radius-lg);padding:60px 40px;box-shadow:0 20px 60px rgba(15,45,29,.3)}
.auth-logo{text-align:center;margin-bottom:40px}
.auth-logo img{height:160px;margin:0 auto -5px;display:block}
.auth-logo p{color:var(--ink-60);margin:8px 0 0;font-size:0.95rem;font-weight:700}
.auth-section h2{color:var(--ink);font-size:1.3rem;margin:0 0 24px;font-weight:700}
.form-group{margin-bottom:20px}
.form-group label{display:block;color:var(--ink);font-weight:500;margin-bottom:8px;font-size:0.9rem}
.form-group input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius);font-size:1rem;font-family:inherit;transition:border-color .2s}
.form-group input:focus{outline:none;border-color:var(--green-800);box-shadow:0 0 0 3px rgba(15,45,29,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row .form-group{margin-bottom:0}
.form-submit{width:100%;padding:14px;background:var(--green-800);color:#fff;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer;font-size:1rem;transition:background .2s;margin-top:8px}
.form-submit:hover{background:var(--green-900)}
.form-submit:disabled{opacity:.6;cursor:not-allowed}
.form-error{background:#fee;color:#c33;padding:12px 14px;border-radius:var(--radius);font-size:0.9rem;margin-bottom:20px;display:none}
.form-error.show{display:block}
.auth-toggle{text-align:center;margin-top:24px;padding-top:24px;border-top:1px solid var(--line);color:var(--ink-60);font-size:0.9rem}
.auth-toggle a{color:var(--green-800);cursor:pointer;font-weight:600;text-decoration:none}
.auth-toggle a:hover{text-decoration:underline}
#loginSection{display:none}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:var(--radius-lg);padding:40px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.success-modal{text-align:center}
.success-modal h2{color:var(--green-800);margin:0 0 16px}
.success-modal p{color:var(--ink-60);margin:0}
</style>
</head>
<body data-page="login">

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html">
        <img src="assets/img/logo.png" alt="Wissen-Haus">
      </a>
      <p>"Empower Your Future"</p>
    </div>

    <div id="signupSection" class="auth-section">
      <h2>Create Account</h2>
      <form id="signupForm">
        <div class="form-error" id="signupError"></div>

        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="First name" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Last name" required>
          </div>
        </div>

        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="At least 6 characters" required>
        </div>

        <button type="submit" class="form-submit">Create Account</button>
      </form>

      <div class="auth-toggle">
        Already have an account? <a onclick="toggleForms()">Sign In</a>
      </div>
    </div>

    <div id="loginSection" class="auth-section">
      <h2>Sign In</h2>
      <form id="loginForm">
        <div class="form-error" id="loginError"></div>

        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" required>
        </div>

        <button type="submit" class="form-submit">Sign In</button>
      </form>

      <div class="auth-toggle">
        Don't have an account? <a onclick="toggleForms()">Create one</a>
      </div>
    </div>
  </div>
</div>

<div id="successModal" class="modal-overlay">
  <div class="modal-box success-modal">
    <h2>Welcome! 🎉</h2>
    <p>Redirecting to community...</p>
  </div>
</div>

<script src="assets/js/supabase-config.js"></script>
<script>
function toggleForms() {
  document.getElementById('signupSection').style.display =
    document.getElementById('signupSection').style.display === 'none' ? 'block' : 'none';
  document.getElementById('loginSection').style.display =
    document.getElementById('loginSection').style.display === 'none' ? 'block' : 'none';
}

document.getElementById('signupForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const error = document.getElementById('signupError');
  const btn = e.target.querySelector('button');

  if (password.length < 6) {
    error.textContent = 'Password must be at least 6 characters';
    error.classList.add('show');
    return;
  }

  try {
    btn.disabled = true;
    btn.textContent = 'Signing up...';

    if (!window.supabase) throw new Error('Auth service not ready');

    const { data, error: err } = await window.supabase.auth.signUp({
      email,
      password,
      options: { data: { first_name: firstName, last_name: lastName } }
    });

    if (err) throw new Error(err.message);

    localStorage.setItem('wh_currentUser', JSON.stringify({
      email, name: `${firstName} ${lastName}`, id: data.user.id
    }));

    document.getElementById('successModal').classList.add('show');
    setTimeout(() => window.location.href = 'community.html', 2000);
  } catch (err) {
    error.textContent = `Error: ${err.message}`;
    error.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const error = document.getElementById('loginError');
  const btn = e.target.querySelector('button');

  try {
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    if (!window.supabase) throw new Error('Auth service not ready');

    const { data, error: err } = await window.supabase.auth.signInWithPassword({ email, password });

    if (err) throw new Error(err.message);

    const user = data.user;
    localStorage.setItem('wh_currentUser', JSON.stringify({
      email: user.email,
      name: user.user_metadata?.name || user.email,
      id: user.id
    }));

    document.getElementById('successModal').classList.add('show');
    setTimeout(() => window.location.href = 'community.html', 2000);
  } catch (err) {
    error.textContent = `Error: ${err.message}`;
    error.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>

</body>
</html>
