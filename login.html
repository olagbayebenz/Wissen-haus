<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join Wissen-Haus Community</title>
<meta name="description" content="Sign in to your Wissen-Haus account to access scholarships, internships, mentorship and opportunities.">
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/css/styles.css">
<style>
body{background:linear-gradient(135deg, var(--green-800) 0%, var(--green-900) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-wrapper{width:100%;max-width:500px}
.auth-card{background:#fff;border-radius:var(--radius-lg);padding:60px 40px;box-shadow:0 20px 60px rgba(15,45,29,.3)}
.auth-logo{text-align:center;margin-bottom:40px}
.auth-logo a{text-decoration:none;cursor:pointer;display:inline-block;transition:transform .2s}
.auth-logo a:hover{transform:scale(1.05)}
.auth-logo img{height:160px;margin:0 auto -5px;display:block}
.auth-logo h1{color:var(--green-800);font-size:1.8rem;margin:0;font-weight:900;display:none}
.auth-logo p{color:var(--ink-60);margin:8px 0 0;font-size:0.95rem;font-weight:700}
.auth-section h2{color:var(--ink);font-size:1.3rem;margin:0 0 24px;font-weight:700}
.form-group{margin-bottom:20px}
.form-group label{display:block;color:var(--ink);font-weight:500;margin-bottom:8px;font-size:0.9rem}
.form-group input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius);font-size:1rem;font-family:inherit;transition:border-color .2s}
.form-group input:focus{outline:none;border-color:var(--green-800);box-shadow:0 0 0 3px rgba(15,45,29,.1)}
.password-group{position:relative}
.password-group input{padding-right:40px}
.toggle-password{position:absolute;right:12px;top:38px;background:none;border:none;cursor:pointer;color:var(--ink-60);font-size:1.2rem;padding:4px 8px;transition:color .2s}
.toggle-password:hover{color:var(--green-800)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row .form-group{margin-bottom:0}
.form-submit{width:100%;padding:14px;background:var(--green-800);color:#fff;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer;font-size:1rem;transition:background .2s;margin-top:8px}
.form-submit:hover{background:var(--green-900)}
.form-submit:disabled{opacity:.6;cursor:not-allowed}
.form-error{background:#fee;color:#c33;padding:12px 14px;border-radius:var(--radius);font-size:0.9rem;margin-bottom:20px;display:none}
.form-error.show{display:block}
.auth-toggle{text-align:center;margin-top:24px;padding-top:24px;border-top:1px solid var(--line);color:var(--ink-60);font-size:0.9rem}
.auth-toggle a{color:var(--green-800);cursor:pointer;font-weight:600;text-decoration:none}
.auth-toggle a:hover{text-decoration:underline}
.auth-footer{text-align:center;margin-top:16px;font-size:0.85rem}
.auth-footer a{color:var(--green-800);cursor:pointer;text-decoration:underline}
#loginSection{display:none}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:var(--radius-lg);padding:40px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--ink-60)}
</style>
</head>
<body data-page="login">



<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html">
        <img src="assets/img/logo.png" alt="Wissen-Haus">
        <h1>Wissen-Haus</h1>
      </a>
      <p>"Empower Your Future"</p>
    </div>

    <div id="signupSection" class="auth-section">
      <h2>Create Account</h2>
      <form id="signupForm">
        <div class="form-error" id="signupError"></div>

        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="First name" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Last name" required>
          </div>
        </div>

        <div class="form-group">
          <label for="signupUsername">Username</label>
          <input type="text" id="signupUsername" placeholder="Choose a username" required>
        </div>

        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required>
        </div>

        <div class="form-group password-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="At least 6 characters" minlength="6" required>
          <button type="button" class="toggle-password" onclick="togglePasswordVisibility('signupPassword')">👁️</button>
        </div>

        <button type="submit" class="form-submit">Sign Up</button>
      </form>

      <div class="auth-toggle">
        Already have an account? <a onclick="toggleForms()">Sign In</a>
      </div>
    </div>

    <div id="loginSection" class="auth-section">
<h2>Welcome Back</h2>
      <form id="loginForm">
        <div class="form-error" id="loginError"></div>

        <div class="form-group">
          <label for="loginUsername">Username or Email</label>
          <input type="text" id="loginUsername" placeholder="username or email" required>
        </div>

        <div class="form-group password-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" required>
          <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPassword')">👁️</button>
        </div>

        <button type="submit" class="form-submit">Sign In</button>
      </form>

      <div class="auth-footer">
        <a onclick="showForgotPassword()">Forgot Password?</a>
      </div>

      <div class="auth-toggle">
        Don't have an account? <a onclick="toggleForms()">Sign Up</a>
      </div>

      <div style="text-align:center;margin-top:32px;padding-top:24px;border-top:1px solid var(--line)">
        <a href="index.html" style="color:var(--green-800);font-size:0.85rem;text-decoration:none">← Back to Home</a>
      </div>
    </div>
  </div>
</div>
</div>

<div id="forgotModal" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeForgotPassword()">×</button>
    <h3 style="margin:0 0 24px;color:var(--ink)">Reset Password</h3>
    <div class="form-error" id="forgotError"></div>
    
    <form id="forgotForm">
      <div class="form-group">
        <label for="forgotUsername">Username or Email</label>
        <input type="text" id="forgotUsername" placeholder="username or email" required>
      </div>
      <button type="submit" class="form-submit">Send Reset</button>
    </form>

    <div id="forgotResult" style="display:none;text-align:center">
      <p style="color:var(--ink-60);margin-bottom:16px" id="resultMessage"></p>
      <button onclick="closeForgotPassword()" class="form-submit" style="background:var(--green-800)">Back to Login</button>
    </div>
  </div>
</div>

<script src="assets/js/supabase-config.js"></script>
<script>

// Show correct form on page load
function initializeForm() {
  const signupSection = document.getElementById('signupSection');
  const loginSection = document.getElementById('loginSection');

  if (window.location.hash === '#signin') {
    signupSection.style.display = 'none';
    loginSection.style.display = 'block';
  } else {
    signupSection.style.display = 'block';
    loginSection.style.display = 'none';
  }
}

// Call on load and when hash changes
window.addEventListener('load', initializeForm);
window.addEventListener('hashchange', initializeForm);

function togglePasswordVisibility(inputId) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
  } else {
    input.type = 'password';
  }
}

function toggleForms() {
  document.getElementById('signupSection').style.display = 
    document.getElementById('signupSection').style.display === 'none' ? 'block' : 'none';
  document.getElementById('loginSection').style.display = 
    document.getElementById('loginSection').style.display === 'none' ? 'block' : 'none';
  document.getElementById('signupError').classList.remove('show');
  document.getElementById('loginError').classList.remove('show');
}

function showForgotPassword() {
  document.getElementById('forgotModal').classList.add('show');
  document.getElementById('forgotForm').style.display = 'block';
  document.getElementById('forgotResult').style.display = 'none';
  document.getElementById('forgotError').classList.remove('show');
  document.getElementById('forgotUsername').value = '';
}

function closeForgotPassword() {
  document.getElementById('forgotModal').classList.remove('show');
}

function findUserByUsernameOrEmail(identifier) {
  const users = JSON.parse(localStorage.getItem('wh_users') || '{}');
  
  // Search by email
  if (users[identifier]) {
    return users[identifier];
  }
  
  // Search by username
  for (let email in users) {
    if (users[email].username === identifier) {
      return users[email];
    }
  }
  
  return null;
}

document.getElementById('forgotForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const identifier = document.getElementById('forgotUsername').value.trim();
  const errorDiv = document.getElementById('forgotError');
  const resultDiv = document.getElementById('forgotResult');
  const resultMsg = document.getElementById('resultMessage');

  const user = findUserByUsernameOrEmail(identifier);

  if (!user) {
    errorDiv.textContent = 'Username or email not found';
    errorDiv.classList.add('show');
    return;
  }

  errorDiv.classList.remove('show');
  document.getElementById('forgotForm').style.display = 'none';
  resultDiv.style.display = 'block';
  resultMsg.innerHTML = `<strong>Password Reset</strong><br><br>Your password is:<br><strong style="font-size:1.1rem;color:var(--green-800)">${user.password}</strong><br><br><small>Keep this secure and consider changing it after login.</small>`;
});

document.getElementById('signupForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const error = document.getElementById('signupError');
  const submitBtn = e.target.querySelector('button[type="submit"]');

  if (!firstName || !lastName || !email || !password) {
    error.textContent = 'All fields are required';
    error.classList.add('show');
    return;
  }

  if (password.length < 6) {
    error.textContent = 'Password must be at least 6 characters';
    error.classList.add('show');
    return;
  }

  try {
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing up...';
    error.classList.remove('show');

    // Wait for Supabase to load
    if (!window.supabase) {
      throw new Error('Supabase not initialized');
    }

    const { data, error: authError } = await window.supabase.auth.signUp({
      email,
      password,
      options: {
        data: {
          first_name: firstName,
          last_name: lastName
        }
      }
    });

    if (authError) throw new Error(authError.message);

    // Store user info
    const fullName = firstName + ' ' + lastName;
    localStorage.setItem('wh_currentUser', JSON.stringify({
      email,
      name: fullName,
      id: data.user.id
    }));
    localStorage.setItem('wh_visitDate', new Date().toISOString().split('T')[0]);

    // Redirect to community
    window.location.href = 'community.html';
  } catch (err) {
    console.error('Signup error:', err.message);
    error.textContent = `Error: ${err.message}`;
    error.classList.add('show');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Account';
  }
});

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const error = document.getElementById('loginError');
  const submitBtn = e.target.querySelector('button[type="submit"]');

  try {
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';
    error.classList.remove('show');

    // Wait for Supabase to load
    if (!window.supabase) {
      throw new Error('Supabase not initialized');
    }

    const { data, error: authError } = await window.supabase.auth.signInWithPassword({
      email,
      password
    });

    if (authError) throw new Error(authError.message);

    // Get user profile data
    const user = data.user;
    const userMetadata = user.user_metadata || {};

    // Store user info
    localStorage.setItem('wh_currentUser', JSON.stringify({
      email: user.email,
      name: userMetadata.first_name ? `${userMetadata.first_name} ${userMetadata.last_name || ''}` : user.email,
      id: user.id
    }));
    localStorage.setItem('wh_visitDate', new Date().toISOString().split('T')[0]);

    // Redirect to community
    window.location.href = 'community.html';
  } catch (err) {
    console.error('Login error:', err.message);
    error.textContent = `Error: ${err.message}`;
    error.classList.add('show');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign In';
  }
});

function findEmailByUser(targetUser) {
  const users = JSON.parse(localStorage.getItem('wh_users') || '{}');
  for (let email in users) {
    if (users[email].username === targetUser.username) {
      return email;
    }
  }
  return null;
}

document.getElementById('forgotModal').addEventListener('click', function(e) {
  if (e.target === this) closeForgotPassword();
});
</script>

</body>
</html>
