[build]
  command = ""
  publish = "redesign"

[build.environment]
  NODE_VERSION = "16"

# Redirect all requests to index.html for single-page app behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for HTML (shorter cache for updates)
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# API proxy (when backend is deployed)
# [[redirects]]
#   from = "/api/*"
#   to = "https://api.wissenhaus.org/:splat"
#   status = 200
#   force = true

[context.production]
  command = ""
  publish = "redesign"

[context.branch-deploy]
  command = ""
  publish = "redesign"

[context.deploy-preview]
  command = ""
  publish = "redesign"
