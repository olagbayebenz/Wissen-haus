<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 1: Intro to AI - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="aiforstu"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 1 of 10</span><h1 class="display-lg mt-s">Introduction to AI & Large Language Models</h1><p class="lead mt-m">Understand the fundamentals. How does ChatGPT work? What can AI do and not do? Build your mental model of artificial intelligence.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="ai-course.html" class="btn btn--outline">← Back to Course</a><a href="ai-module-2.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 1, COURSE_ID = 'ai', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Introduction to AI & Large Language Models</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Understand how Large Language Models work</li><li>Know what AI can and cannot do</li><li>Learn AI vocabulary and concepts</li></ul></div><p class="module__summary">AI models like ChatGPT are pattern-matching machines trained on massive amounts of text. They predict the next word based on context. They're useful for brainstorming, drafting, summarizing, and answering questions. They're not: conscious, always accurate, or able to access the internet. Treat AI as a collaborator, not an oracle. The future belongs to people who know how to work with AI.</p><div class="module__quiz"><strong>Quiz: AI Fundamentals</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> How do Large Language Models like ChatGPT work?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_1_0" value="a"><span><strong>A.</strong> They access the internet in real-time</span></label><label class="module__option"><input type="radio" name="q_1_0" value="b"><span><strong>B.</strong> They predict the next word based on patterns learned from training data</span></label><label class="module__option"><input type="radio" name="q_1_0" value="c"><span><strong>C.</strong> They think like humans</span></label><label class="module__option"><input type="radio" name="q_1_0" value="d"><span><strong>D.</strong> They have consciousness</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> What can AI do well?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_1_1" value="a"><span><strong>A.</strong> Always be completely accurate</span></label><label class="module__option"><input type="radio" name="q_1_1" value="b"><span><strong>B.</strong> Brainstorm, draft, summarize, answer questions based on its training</span></label><label class="module__option"><input type="radio" name="q_1_1" value="c"><span><strong>C.</strong> Replace human judgment</span></label><label class="module__option"><input type="radio" name="q_1_1" value="d"><span><strong>D.</strong> Make ethical decisions autonomously</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> What's an important limitation of current AI?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_1_2" value="a"><span><strong>A.</strong> None, AI can do anything</span></label><label class="module__option"><input type="radio" name="q_1_2" value="b"><span><strong>B.</strong> It can sometimes generate false information convincingly</span></label><label class="module__option"><input type="radio" name="q_1_2" value="c"><span><strong>C.</strong> It's too slow</span></label><label class="module__option"><input type="radio" name="q_1_2" value="d"><span><strong>D.</strong> It won't improve</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_1_0"]:checked')?.value, document.querySelector('input[name="q_1_1"]:checked')?.value, document.querySelector('input[name="q_1_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'ai-module-2.html'; }, 1500); } else { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-fail">You got ${correct}/3. Need 80%.</div>`; } }); updateProgress();
</script></body></html>
