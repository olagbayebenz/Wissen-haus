<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 10: Future of AI Careers - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="aiforstu"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 10 of 10</span><h1 class="display-lg mt-s">Future of AI Careers</h1><p class="lead mt-m">AI careers are rapidly evolving. Explore emerging roles, build a career strategy, and position yourself for opportunities in the AI-driven economy.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="ai-module-9.html" class="btn btn--outline">← Previous Module</a><a href="ai-certificate.html" class="btn">View Certificate →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 10, COURSE_ID = 'ai', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Future of AI Careers</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Understand emerging AI career paths and skill requirements</li><li>Build a personal AI learning and career roadmap</li><li>Position yourself for opportunities in the AI-driven economy</li></ul></div><p class="module__summary">The AI industry is creating entirely new roles daily. This module explores career paths from AI prompt engineers to AI ethics specialists, how to build your personal brand as an AI practitioner, and how to stay competitive as AI tools evolve. You'll learn how organizations are hiring for AI roles, what skills matter most, and how to bridge the gap between where you are today and where AI careers are heading.</p><div class="module__quiz"><strong>Quiz: Future of AI Careers</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> Which emerging AI career path focuses on building ethical guardrails and responsible AI practices?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_0" value="a"><span><strong>A.</strong> AI Data Specialist</span></label><label class="module__option"><input type="radio" name="q_10_0" value="b"><span><strong>B.</strong> AI Ethics and Safety Specialist</span></label><label class="module__option"><input type="radio" name="q_10_0" value="c"><span><strong>C.</strong> AI Marketing Manager</span></label><label class="module__option"><input type="radio" name="q_10_0" value="d"><span><strong>D.</strong> AI Infrastructure Engineer</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> What is the best strategy for staying relevant as AI tools and skills evolve?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_1" value="a"><span><strong>A.</strong> Focus only on learning one specific tool</span></label><label class="module__option"><input type="radio" name="q_10_1" value="b"><span><strong>B.</strong> Build foundational AI literacy and develop a continuous learning mindset</span></label><label class="module__option"><input type="radio" name="q_10_1" value="c"><span><strong>C.</strong> Wait for your employer to provide training</span></label><label class="module__option"><input type="radio" name="q_10_1" value="d"><span><strong>D.</strong> Avoid learning AI altogether</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> How should you position yourself for AI career opportunities in Nigeria?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_2" value="a"><span><strong>A.</strong> Wait for large companies to hire locally</span></label><label class="module__option"><input type="radio" name="q_10_2" value="b"><span><strong>B.</strong> Build a portfolio, contribute to open-source projects, and create your personal brand around AI applications</span></label><label class="module__option"><input type="radio" name="q_10_2" value="c"><span><strong>C.</strong> Only pursue roles outside Nigeria</span></label><label class="module__option"><input type="radio" name="q_10_2" value="d"><span><strong>D.</strong> Focus on traditional tech roles instead</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_10_0"]:checked')?.value, document.querySelector('input[name="q_10_1"]:checked')?.value, document.querySelector('input[name="q_10_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-pass">✓ Passed! ' + correct + '/3 correct. Loading next module...</div>'; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'ai-certificate.html'; }, 1500); } else { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">You got ' + correct + '/3. Need 80%.</div>'; } }); updateProgress();
</script></body></html>
