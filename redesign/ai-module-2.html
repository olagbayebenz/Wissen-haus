<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 2: Prompt Engineering - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="aiforstu"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 2 of 10</span><h1 class="display-lg mt-s">Prompt Engineering Fundamentals</h1><p class="lead mt-m">The quality of your prompt determines the quality of your output. Learn techniques to craft prompts that get you better results.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="ai-module-1.html" class="btn btn--outline">← Previous Module</a><a href="ai-module-3.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 2, COURSE_ID = 'ai', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Prompt Engineering Fundamentals</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Write clear, specific prompts with context</li><li>Use structured formats (templates, examples)</li><li>Iterate and refine prompts for better results</li></ul></div><p class="module__summary">Good prompts are specific and contextual. Instead of "write an essay," try "Write a 500-word essay on topic X for audience Y in tone Z." Use examples. Provide context. Tell AI what role to play. Use formatting (bullets, sections). If first result is mediocre, refine and re-ask. Prompt engineering is a skill—it improves with practice. Think of it as teaching the AI what you want.</p><div class="module__quiz"><strong>Quiz: Prompt Engineering</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> What makes a good prompt?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_2_0" value="a"><span><strong>A.</strong> Vague and open-ended</span></label><label class="module__option"><input type="radio" name="q_2_0" value="b"><span><strong>B.</strong> Specific, contextual, with role and format defined</span></label><label class="module__option"><input type="radio" name="q_2_0" value="c"><span><strong>C.</strong> Very long</span></label><label class="module__option"><input type="radio" name="q_2_0" value="d"><span><strong>D.</strong> Only questions</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> How should you provide examples in prompts?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_2_1" value="a"><span><strong>A.</strong> Never, AI doesn't need them</span></label><label class="module__option"><input type="radio" name="q_2_1" value="b"><span><strong>B.</strong> Show 1-2 examples of desired output format</span></label><label class="module__option"><input type="radio" name="q_2_1" value="c"><span><strong>C.</strong> Load it with 50+ examples</span></label><label class="module__option"><input type="radio" name="q_2_1" value="d"><span><strong>D.</strong> Only textual examples</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> If your first prompt result is mediocre:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_2_2" value="a"><span><strong>A.</strong> Accept it and move on</span></label><label class="module__option"><input type="radio" name="q_2_2" value="b"><span><strong>B.</strong> Refine the prompt and re-ask for better results</span></label><label class="module__option"><input type="radio" name="q_2_2" value="c"><span><strong>C.</strong> Give up on AI</span></label><label class="module__option"><input type="radio" name="q_2_2" value="d"><span><strong>D.</strong> Use a different tool</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'What makes a good prompt?', opts: ['Vague and open-ended', 'Specific, contextual, with role and format defined', 'Very long', 'Only questions'] },
  { q: 'How should you provide examples in prompts?', opts: ['Never, AI doesn\'t need them', 'Show 1-2 examples of desired output format', 'Load it with 50+ examples', 'Only textual examples'] },
  { q: 'If your first prompt result is mediocre:', opts: ['Accept it and move on', 'Refine the prompt and re-ask for better results', 'Give up on AI', 'Use a different tool'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_2_0"]:checked')?.value, document.querySelector('input[name="q_2_1"]:checked')?.value, document.querySelector('input[name="q_2_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'ai-module-3.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
