<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 3: AI for Writing - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="aiforstu"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 3 of 10</span><h1 class="display-lg mt-s">AI for Writing & Communication</h1><p class="lead mt-m">Draft, edit, and polish your writing with AI. Learn to use it for emails, essays, social media, and professional communication.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="ai-module-2.html" class="btn btn--outline">← Previous Module</a><a href="ai-module-4.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 3, COURSE_ID = 'ai', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">AI for Writing & Communication</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Use AI for drafting, editing, and polishing</li><li>Adapt tone for different audiences</li><li>Generate multiple versions quickly</li></ul></div><p class="module__summary">AI excels at drafting. Give it a rough idea; it produces options in seconds. Ask it to adjust tone (formal, casual, persuasive). Use it to overcome writer's block. Always review and personalize—don't just copy-paste. For emails: "Write a professional but warm email requesting X." For essays: "Write an intro for an essay on X targeting Y audience." For social: "Create 5 LinkedIn post ideas about X."</p><div class="module__quiz"><strong>Quiz: AI Writing</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> How should you use AI for writing?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_3_0" value="a"><span><strong>A.</strong> Copy output directly without review</span></label><label class="module__option"><input type="radio" name="q_3_0" value="b"><span><strong>B.</strong> Use as starting point, then personalize and review</span></label><label class="module__option"><input type="radio" name="q_3_0" value="c"><span><strong>C.</strong> Only for creative writing</span></label><label class="module__option"><input type="radio" name="q_3_0" value="d"><span><strong>D.</strong> Never use for important writing</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> Can AI help overcome writer's block?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_3_1" value="a"><span><strong>A.</strong> No, you must write alone</span></label><label class="module__option"><input type="radio" name="q_3_1" value="b"><span><strong>B.</strong> Yes, ask for multiple drafts to spark ideas</span></label><label class="module__option"><input type="radio" name="q_3_1" value="c"><span><strong>C.</strong> Only for fiction</span></label><label class="module__option"><input type="radio" name="q_3_1" value="d"><span><strong>D.</strong> Writer's block isn't real</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> When adjusting tone, what should you do?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_3_2" value="a"><span><strong>A.</strong> Accept first version</span></label><label class="module__option"><input type="radio" name="q_3_2" value="b"><span><strong>B.</strong> Ask AI to adjust (formal/casual/persuasive) and pick best</span></label><label class="module__option"><input type="radio" name="q_3_2" value="c"><span><strong>C.</strong> All tones are the same</span></label><label class="module__option"><input type="radio" name="q_3_2" value="d"><span><strong>D.</strong> Don't care about tone</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'How should you use AI for writing?', opts: ['Copy output directly without review', 'Use as starting point, then personalize and review', 'Only for creative writing', 'Never use for important writing'] },
  { q: 'Can AI help overcome writer\'s block?', opts: ['No, you must write alone', 'Yes, ask for multiple drafts to spark ideas', 'Only for fiction', 'Writer\'s block isn\'t real'] },
  { q: 'When adjusting tone, what should you do?', opts: ['Accept first version', 'Ask AI to adjust (formal/casual/persuasive) and pick best', 'All tones are the same', 'Don\'t care about tone'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_3_0"]:checked')?.value, document.querySelector('input[name="q_3_1"]:checked')?.value, document.querySelector('input[name="q_3_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'ai-module-4.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
