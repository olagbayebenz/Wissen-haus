<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 4: AI for Research - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="aiforstu"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 4 of 10</span><h1 class="display-lg mt-s">AI for Research & Learning</h1><p class="lead mt-m">Accelerate your learning. Use AI to summarize, explain complex topics, generate study guides, and find answers faster.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="ai-module-3.html" class="btn btn--outline">← Previous Module</a><a href="ai-module-5.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 4, COURSE_ID = 'ai', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">AI for Research & Learning</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Summarize complex topics efficiently</li><li>Generate study guides and practice questions</li><li>Explain difficult concepts in simple terms</li></ul></div><p class="module__summary">AI is a learning accelerator. Paste a complex article: "Explain this in simple terms for a beginner." Generate study guides: "Create a study guide for exam topic X with key points, definitions, and practice questions." Ask for explanations in different ways: "Explain quantum computing like I'm 5" or "Explain for a physics PhD." Verify important facts independently—AI can hallucinate. Good for brainstorming, learning, understanding, not authoritative research.</p><div class="module__quiz"><strong>Quiz: AI for Learning</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> How can AI help with studying?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_4_0" value="a"><span><strong>A.</strong> Replace all your studying</span></label><label class="module__option"><input type="radio" name="q_4_0" value="b"><span><strong>B.</strong> Generate guides, explain concepts, create practice questions</span></label><label class="module__option"><input type="radio" name="q_4_0" value="c"><span><strong>C.</strong> Only for entertainment</span></label><label class="module__option"><input type="radio" name="q_4_0" value="d"><span><strong>D.</strong> It can't help learning</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> What's a limitation when using AI for research?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_4_1" value="a"><span><strong>A.</strong> It's always 100% accurate</span></label><label class="module__option"><input type="radio" name="q_4_1" value="b"><span><strong>B.</strong> It can generate false info convincingly; verify important facts</span></label><label class="module__option"><input type="radio" name="q_4_1" value="c"><span><strong>C.</strong> It never makes mistakes</span></label><label class="module__option"><input type="radio" name="q_4_1" value="d"><span><strong>D.</strong> No limitations</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> How should you ask AI to explain complex topics?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_4_2" value="a"><span><strong>A.</strong> Just ask once</span></label><label class="module__option"><input type="radio" name="q_4_2" value="b"><span><strong>B.</strong> Ask in multiple ways or for different difficulty levels</span></label><label class="module__option"><input type="radio" name="q_4_2" value="c"><span><strong>C.</strong> Assume first explanation is best</span></label><label class="module__option"><input type="radio" name="q_4_2" value="d"><span><strong>D.</strong> Don't ask for explanations</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'How can AI help with studying?', opts: ['Replace all your studying', 'Generate guides, explain concepts, create practice questions', 'Only for entertainment', 'It can\'t help learning'] },
  { q: 'What\'s a limitation when using AI for research?', opts: ['It\'s always 100% accurate', 'It can generate false info convincingly; verify important facts', 'It never makes mistakes', 'No limitations'] },
  { q: 'How should you ask AI to explain complex topics?', opts: ['Just ask once', 'Ask in multiple ways or for different difficulty levels', 'Assume first explanation is best', 'Don\'t ask for explanations'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_4_0"]:checked')?.value, document.querySelector('input[name="q_4_1"]:checked')?.value, document.querySelector('input[name="q_4_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'ai-module-5.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
