<script>
const MODULE_ID = 7, COURSE_ID = 'ai', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = '<article class="module"><div class="module__header"><h2 class="module__title">Creative Projects</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Objective 1 for module 7</li><li>Objective 2 for module 7</li><li>Objective 3 for module 7</li></ul></div><p class="module__summary">Module 7 summary and key learning points.</p><div class="module__quiz"><strong>Quiz: Module 7</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> Question 1</p><div class="module__options"><label class="module__option"><input type="radio" name="q_7_0" value="a"><span><strong>A.</strong> Option A</span></label><label class="module__option"><input type="radio" name="q_7_0" value="b"><span><strong>B.</strong> Option B (Correct)</span></label><label class="module__option"><input type="radio" name="q_7_0" value="c"><span><strong>C.</strong> Option C</span></label><label class="module__option"><input type="radio" name="q_7_0" value="d"><span><strong>D.</strong> Option D</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> Question 2</p><div class="module__options"><label class="module__option"><input type="radio" name="q_7_1" value="a"><span><strong>A.</strong> Option A</span></label><label class="module__option"><input type="radio" name="q_7_1" value="b"><span><strong>B.</strong> Option B (Correct)</span></label><label class="module__option"><input type="radio" name="q_7_1" value="c"><span><strong>C.</strong> Option C</span></label><label class="module__option"><input type="radio" name="q_7_1" value="d"><span><strong>D.</strong> Option D</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> Question 3</p><div class="module__options"><label class="module__option"><input type="radio" name="q_7_2" value="a"><span><strong>A.</strong> Option A</span></label><label class="module__option"><input type="radio" name="q_7_2" value="b"><span><strong>B.</strong> Option B (Correct)</span></label><label class="module__option"><input type="radio" name="q_7_2" value="c"><span><strong>C.</strong> Option C</span></label><label class="module__option"><input type="radio" name="q_7_2" value="d"><span><strong>D.</strong> Option D</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>';
const answers = { correct: ['b', 'b', 'b'] };
  const questionText = [
  { q: 'Question 1', opts: ['Option A', 'Option B (Correct)', 'Option C', 'Option D'] },
  { q: 'Question 2', opts: ['Option A', 'Option B (Correct)', 'Option C', 'Option D'] },
  { q: 'Question 3', opts: ['Option A', 'Option B (Correct)', 'Option C', 'Option D'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_7_0"]:checked')?.value, document.querySelector('input[name="q_7_1"]:checked')?.value, document.querySelector('input[name="q_7_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-pass">✓ Passed! ' + correct + '/3 correct. Loading next module...</div>'; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = '8.html'; }, 1500); } else { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">You got ' + correct + '/3. Need 80%.</div>'; } }); updateProgress();
</script></body></html>
