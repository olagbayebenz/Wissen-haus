<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Career Assessment - Wissen-Haus</title>
<meta name="description" content="Take our career assessment and get a personalized roadmap, discover career pathways, and connect with mentors to guide your journey.">
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="stylesheet" href="assets/css/career-assessment.css">
<noscript><style>.reveal{opacity:1!important;transform:none!important}</style></noscript>
<style>
  .assessment-hero {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(184, 134, 11, 0.05) 100%);
    padding: clamp(60px, 8vw, 100px) 0;
    position: relative;
    overflow: hidden;
  }

  .assessment-hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(34, 197, 94, 0.08) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .assessment-hero-content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 700px;
    margin: 0 auto;
  }

  .assessment-form-card {
    background: white;
    border-radius: 16px;
    padding: clamp(40px, 6vw, 60px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    margin: -40px auto 60px;
    position: relative;
    z-index: 2;
    max-width: 650px;
  }

  .form-field-group {
    margin-bottom: 28px;
  }

  .form-field-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--ink);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-field-group input,
  .form-field-group textarea,
  .form-field-group select {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--line);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    transition: all 0.2s;
  }

  .form-field-group input:focus,
  .form-field-group textarea:focus,
  .form-field-group select:focus {
    outline: none;
    border-color: var(--green-800);
    box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
  }

  .form-field-group textarea {
    resize: vertical;
    min-height: 120px;
  }

  .form-row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 640px) {
    .form-row-2 {
      grid-template-columns: 1fr;
    }

    .assessment-form-card {
      padding: 30px 20px;
      margin: -30px 20px 40px;
    }
  }

  .cv-upload-wrapper {
    margin-bottom: 28px;
  }

  .cv-upload-box {
    border: 2px dashed var(--line);
    border-radius: 10px;
    padding: 28px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--bg-light);
  }

  .cv-upload-box:hover {
    border-color: var(--green-800);
    background: rgba(34, 197, 94, 0.05);
  }

  .cv-upload-box input[type="file"] {
    display: none;
  }

  .cv-upload-icon {
    font-size: 32px;
    margin-bottom: 12px;
  }

  .cv-upload-box p {
    margin: 0;
    color: var(--ink);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .cv-upload-box small {
    color: var(--ink-60);
    font-size: 13px;
  }

  .cv-file-feedback {
    margin-top: 12px;
    font-size: 13px;
  }

  .cv-file-feedback.success {
    color: var(--green-800);
  }

  .cv-file-feedback.error {
    color: #e74c3c;
  }

  .submit-button {
    width: 100%;
    padding: 16px;
    background: var(--green-800);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-button:hover {
    background: var(--green-900);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(34, 197, 94, 0.2);
  }

  .submit-button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }

  .results-container {
    max-width: 900px;
    margin: 0 auto;
  }

  .results-welcome {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(184, 134, 11, 0.1) 100%);
    border-radius: 16px;
    padding: 40px;
    margin-bottom: 50px;
    text-align: center;
  }

  .results-welcome h2 {
    color: var(--green-800);
    margin-bottom: 12px;
  }

  .results-welcome p {
    color: var(--ink-60);
    font-size: 16px;
    margin-bottom: 20px;
  }

  .results-section {
    margin-bottom: 50px;
  }

  .results-section h3 {
    font-size: 22px;
    color: var(--green-800);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .roadmap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .roadmap-card {
    background: white;
    border: 2px solid var(--line);
    border-radius: 12px;
    padding: 28px;
    transition: all 0.3s;
  }

  .roadmap-card:hover {
    border-color: var(--green-800);
    box-shadow: 0 8px 24px rgba(34, 197, 94, 0.12);
  }

  .roadmap-phase-badge {
    display: inline-block;
    background: var(--green-800);
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .roadmap-card h4 {
    font-size: 16px;
    margin: 12px 0 16px 0;
  }

  .roadmap-card ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .roadmap-card li {
    font-size: 14px;
    color: var(--ink-60);
    margin-bottom: 10px;
    padding-left: 24px;
    position: relative;
  }

  .roadmap-card li::before {
    content: '✓';
    position: absolute;
    left: 0;
    color: var(--green-800);
    font-weight: bold;
  }

  .timeline-box {
    background: rgba(34, 197, 94, 0.08);
    border-left: 4px solid var(--green-800);
    padding: 16px;
    border-radius: 8px;
    margin-top: 20px;
    font-size: 14px;
    color: var(--ink-60);
  }

  .timeline-box strong {
    color: var(--green-800);
  }

  .pathway-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .pathway-card {
    background: white;
    border: 2px solid var(--line);
    border-radius: 12px;
    padding: 24px;
    transition: all 0.3s;
  }

  .pathway-card:hover {
    border-color: var(--green-800);
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(34, 197, 94, 0.15);
  }

  .pathway-card h4 {
    color: var(--green-800);
    margin-bottom: 16px;
    font-size: 16px;
  }

  .pathway-info {
    font-size: 13px;
    line-height: 1.6;
  }

  .pathway-info p {
    margin-bottom: 12px;
    color: var(--ink-60);
  }

  .pathway-info strong {
    color: var(--ink);
    display: block;
    margin-top: 4px;
  }

  .opportunities-section {
    background: var(--bg-light);
    padding: 40px;
    border-radius: 16px;
    margin-bottom: 50px;
  }

  .opportunities-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
  }

  .opp-card {
    background: white;
    padding: 24px;
    border-radius: 12px;
    border: 1px solid var(--line);
  }

  .opp-card h4 {
    font-size: 15px;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .opp-card p {
    font-size: 13px;
    color: var(--ink-60);
    line-height: 1.5;
    margin: 0;
  }

  .skills-section {
    margin-bottom: 50px;
  }

  .skill-group {
    background: white;
    padding: 28px;
    border-radius: 12px;
    margin-bottom: 20px;
    border: 2px solid var(--line);
  }

  .skill-group h4 {
    margin-bottom: 16px;
    font-size: 15px;
  }

  .skill-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .skill-badge {
    display: inline-block;
    background: white;
    border: 2px solid var(--green-800);
    color: var(--green-800);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .skill-badge.critical {
    background: var(--green-800);
    color: white;
  }

  .mentorship-cta {
    background: linear-gradient(135deg, var(--green-800) 0%, #1a7d4f 100%);
    color: white;
    padding: 50px 40px;
    border-radius: 16px;
    text-align: center;
    margin: 50px 0;
  }

  .mentorship-cta h3 {
    color: white;
    margin-bottom: 16px;
  }

  .mentorship-cta p {
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 24px;
  }

  .mentorship-cta .btn {
    background: white;
    color: var(--green-800);
    font-weight: 600;
  }

  .reset-button {
    text-align: center;
    margin-top: 40px;
  }

  .reset-button .btn {
    background: white;
    border: 2px solid var(--line);
  }
</style>
</head>
<body data-page="assessment">
<noscript><div style="background:#0F2D1D;color:#fff;padding:12px 20px;text-align:center;font-family:sans-serif"><a href="index.html" style="color:#fff;margin:0 8px">Home</a><a href="about.html" style="color:#fff;margin:0 8px">About</a><a href="community.html" style="color:#fff;margin:0 8px">Community</a></div></noscript>

<main id="main">

<!-- HERO SECTION -->
<section class="assessment-hero">
  <div class="wrap">
    <div class="assessment-hero-content reveal">
      <span class="eyebrow" style="color: var(--green-800); font-weight: 700;">Career Assessment</span>
      <h1 class="display-lg mt-s">Discover Your Career Path</h1>
      <p class="lead mt-m">Take our quick assessment and get a personalized roadmap tailored to your interests, skills, and aspirations.</p>
    </div>
  </div>
</section>

<!-- FORM SECTION -->
<section class="section">
  <div class="wrap">
    <div class="assessment-form-card" id="formCard">
      <form id="careerAssessmentForm">
        <div class="form-row-2">
          <div class="form-field-group">
            <label for="assessmentName">Full Name *</label>
            <input type="text" id="assessmentName" name="name" placeholder="Your full name" required>
          </div>
          <div class="form-field-group">
            <label for="assessmentAge">Age *</label>
            <input type="number" id="assessmentAge" name="age" min="16" max="80" placeholder="e.g., 22" required>
          </div>
        </div>

        <div class="form-field-group">
          <label for="assessmentCurrentJob">What's Your Current Status? *</label>
          <input type="text" id="assessmentCurrentJob" name="currentJob" placeholder="e.g., Student, Software Engineer, Career Changer" required>
        </div>

        <div class="cv-upload-wrapper">
          <label style="display: block; font-weight: 600; margin-bottom: 10px; color: var(--ink); font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;">Upload Your CV (Optional)</label>
          <div class="cv-upload-box" id="cvUploadArea">
            <div class="cv-upload-icon">📎</div>
            <p>Click to upload your CV</p>
            <small>PDF, DOC, or DOCX (Max 5MB)</small>
            <input type="file" id="assessmentCV" name="cv" accept=".pdf,.doc,.docx">
          </div>
          <div class="cv-file-feedback" id="cvFeedback"></div>
        </div>

        <div class="form-field-group">
          <label for="assessmentCareerGoal">What's Your Career Goal? *</label>
          <textarea id="assessmentCareerGoal" name="careerGoal" placeholder="Describe what you'd like to do. E.g., 'I want to become a product manager in a tech startup'" required></textarea>
        </div>

        <button type="submit" class="submit-button">
          <span>Get Your Personalized Roadmap</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width: 18px; height: 18px;"><path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>
    </div>
  </div>
</section>

<!-- RESULTS SECTION -->
<section class="section" id="resultsSection" style="display:none;">
  <div class="wrap results-container">
    <div id="careerResultContainer"></div>
  </div>
</section>

</main>

<script src="assets/js/main.js"></script>
<script>
  // File upload handler
  document.addEventListener('DOMContentLoaded', function() {
    const fileInput = document.getElementById('assessmentCV');
    const uploadArea = document.getElementById('cvUploadArea');
    const feedback = document.getElementById('cvFeedback');
    const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB

    if (fileInput) {
      fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        feedback.textContent = '';
        feedback.className = 'cv-file-feedback';

        if (!file) return;

        if (file.size > MAX_FILE_SIZE) {
          feedback.textContent = '❌ File too large. Maximum size is 5MB.';
          feedback.className = 'cv-file-feedback error';
          fileInput.value = '';
          return;
        }

        const validTypes = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
        if (!validTypes.includes(file.type)) {
          feedback.textContent = '❌ Invalid file type. Please upload PDF or DOC/DOCX.';
          feedback.className = 'cv-file-feedback error';
          fileInput.value = '';
          return;
        }

        feedback.textContent = '✓ ' + file.name + ' (' + (file.size / 1024).toFixed(1) + 'KB)';
        feedback.className = 'cv-file-feedback success';
      });

      uploadArea.addEventListener('click', function(e) {
        if (e.target.tagName !== 'INPUT') {
          fileInput.click();
        }
      });
    }

    const form = document.getElementById('careerAssessmentForm');
    if (form) {
      const newForm = form.cloneNode(true);
      form.parentNode.replaceChild(newForm, form);

      newForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const submitBtn = newForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span>Analyzing your profile...</span>';

        try {
          const formData = {
            name: document.getElementById('assessmentName').value.trim(),
            age: document.getElementById('assessmentAge').value,
            currentJob: document.getElementById('assessmentCurrentJob').value.trim(),
            careerGoal: document.getElementById('assessmentCareerGoal').value.trim(),
            cvFile: document.getElementById('assessmentCV').files[0]?.name || 'not-provided'
          };

          if (!formData.name || !formData.age || !formData.currentJob || !formData.careerGoal) {
            throw new Error('Please fill in all required fields');
          }

          localStorage.setItem('careerAssessment', JSON.stringify({
            ...formData,
            timestamp: new Date().toISOString()
          }));

          document.getElementById('formCard').style.display = 'none';
          document.getElementById('resultsSection').style.display = 'block';
          generateCareerResults(formData);
          document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
          alert('Error: ' + error.message);
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      });
    }
  });

  function generateCareerResults(data) {
    const resultContainer = document.getElementById('careerResultContainer');
    const careerGoal = data.careerGoal.toLowerCase();
    let selectedPath = 'tech';

    if (careerGoal.includes('business') || careerGoal.includes('entrepreneur')) selectedPath = 'business';
    else if (careerGoal.includes('media') || careerGoal.includes('content')) selectedPath = 'media';
    else if (careerGoal.includes('health') || careerGoal.includes('medical')) selectedPath = 'healthcare';
    else if (careerGoal.includes('social') || careerGoal.includes('impact')) selectedPath = 'social';

    const timeline = calculateTimeline(parseInt(data.age), data.currentJob);

    const resultsHTML = `
      <div class="results-welcome">
        <h2>Your Personalized Career Roadmap</h2>
        <p>Based on your profile, ${data.name}. Here's what's next:</p>
        <button class="btn" onclick="resetCareerAssessment()">Take Assessment Again</button>
      </div>

      <section class="results-section">
        <h3>🗺️ Your 3-Phase Roadmap</h3>
        <div class="roadmap-grid">
          <div class="roadmap-card">
            <span class="roadmap-phase-badge">Phase 1</span>
            <h4>Foundation</h4>
            <p style="color: var(--ink-60); font-size: 13px; margin-bottom: 12px;">0-6 months</p>
            <ul>
              <li>Build core skills in your chosen field</li>
              <li>Complete relevant online courses</li>
              <li>Connect with professionals</li>
              <li>Build a portfolio of 2-3 projects</li>
            </ul>
          </div>
          <div class="roadmap-card">
            <span class="roadmap-phase-badge">Phase 2</span>
            <h4>Growth</h4>
            <p style="color: var(--ink-60); font-size: 13px; margin-bottom: 12px;">6-12 months</p>
            <ul>
              <li>Seek internship or junior role</li>
              <li>Deepen expertise through real projects</li>
              <li>Find a mentor in your field</li>
              <li>Build your professional network</li>
            </ul>
          </div>
          <div class="roadmap-card">
            <span class="roadmap-phase-badge">Phase 3</span>
            <h4>Advancement</h4>
            <p style="color: var(--ink-60); font-size: 13px; margin-bottom: 12px;">1-2 years</p>
            <ul>
              <li>Transition to mid-level role</li>
              <li>Develop leadership skills</li>
              <li>Explore international opportunities</li>
              <li>Mentor others in your field</li>
            </ul>
          </div>
        </div>
        <div class="timeline-box">
          <strong>Expected Timeline:</strong> ${timeline} years to reach your goal
        </div>
      </section>

      <section class="results-section">
        <h3>💼 Discover 6 Career Pathways</h3>
        <p style="color: var(--ink-60); margin-bottom: 24px;">Not sure what careers exist? Explore these paths and learn what skills you need, what roles exist, and realistic salary ranges in Nigeria.</p>
        <div class="pathway-grid">
          ${generatePathwayCard('Tech', 'tech', 'Software Engineer, Data Scientist, Product Manager, UX Designer', ['Problem-solving', 'Programming', 'System Thinking'], '₦1.5M - ₦8M+/year')}
          ${generatePathwayCard('Business', 'business', 'Manager, Finance Analyst, Sales Lead, Strategist', ['Leadership', 'Analytics', 'Communication'], '₦1.2M - ₦6M+/year')}
          ${generatePathwayCard('Media & Content', 'media', 'Journalist, Content Creator, Video Producer, Marketer', ['Storytelling', 'Creativity', 'Research'], '₦600K - ₦3M+/year')}
          ${generatePathwayCard('Entrepreneurship', 'entrepreneurship', 'Founder, Business Owner, Venture Builder', ['Innovation', 'Risk Management', 'Resilience'], 'Variable (₦0 - ∞)')}
          ${generatePathwayCard('Healthcare', 'healthcare', 'Healthcare Provider, Researcher, Healthcare Tech, Public Health', ['Empathy', 'Scientific Knowledge', 'Attention to Detail'], '₦1.5M - ₦5M+/year')}
          ${generatePathwayCard('Social Impact', 'social', 'NGO Leader, Policy Expert, Community Developer, CSR Manager', ['Systems Thinking', 'Communication', 'Advocacy'], '₦800K - ₦3M+/year')}
        </div>
      </section>

      <section class="opportunities-section">
        <h3 style="text-align: center; margin-bottom: 30px;">🌍 Global Opportunities Await</h3>
        <div class="opportunities-grid">
          <div class="opp-card">
            <h4>🔗 Remote Jobs</h4>
            <p>Work for global companies from Nigeria. Remote roles often pay 2-3x more than local positions.</p>
          </div>
          <div class="opp-card">
            <h4>🎓 Scholarships</h4>
            <p>Study abroad programs, fully-funded masters, and executive education globally recognized.</p>
          </div>
          <div class="opp-card">
            <h4>✈️ Visa-Sponsored Roles</h4>
            <p>Companies actively seeking Nigerian talent with visa sponsorship packages.</p>
          </div>
          <div class="opp-card">
            <h4>🚀 Build Your Profile</h4>
            <p>Skills, portfolio, and network to compete for the world's best opportunities.</p>
          </div>
        </div>
      </section>

      <section class="results-section">
        <h3>🎯 Skills You Need to Develop</h3>
        <div class="skill-group">
          <h4>🔴 Must-Have (Critical)</h4>
          <div class="skill-badges">
            <span class="skill-badge critical">Communication</span>
            <span class="skill-badge critical">Problem-solving</span>
            <span class="skill-badge critical">Adaptability</span>
            <span class="skill-badge critical">Time Management</span>
          </div>
        </div>
        <div class="skill-group">
          <h4>💡 Path-Specific Skills</h4>
          <div class="skill-badges">
            ${getPathSpecificSkills(selectedPath)}
          </div>
        </div>
      </section>

      <section class="mentorship-cta">
        <h3>👥 Get Real Mentorship</h3>
        <p>Struggling to figure it out alone? Connect with professionals who've been where you are and get the guidance you need.</p>
        <a href="mentor-application.html" class="btn">Find a Mentor</a>
      </section>

      <div class="reset-button">
        <button class="btn" onclick="resetCareerAssessment()">Start Over</button>
      </div>
    `;

    resultContainer.innerHTML = resultsHTML;
  }

  function generatePathwayCard(title, id, jobs, skills, salary) {
    return `
      <div class="pathway-card">
        <h4>${title}</h4>
        <div class="pathway-info">
          <p><strong>Key Roles</strong> ${jobs}</p>
          <p><strong>Skills Needed</strong> ${skills.join(', ')}</p>
          <p><strong>Nigeria Salary Range</strong> ${salary}</p>
        </div>
      </div>
    `;
  }

  function getPathSpecificSkills(pathway) {
    const skills = {
      tech: ['Programming', 'Data Analysis', 'System Design', 'Cloud Platforms', 'DevOps'],
      business: ['Financial Analysis', 'Strategic Planning', 'Sales', 'Negotiation', 'Excel/Analytics'],
      media: ['Content Writing', 'Video Editing', 'SEO/Marketing', 'Storytelling', 'Social Media'],
      healthcare: ['Clinical Skills', 'Research', 'Empathy', 'Attention to Detail', 'Medical Knowledge'],
      social: ['Systems Thinking', 'Advocacy', 'Program Management', 'Community Building', 'Policy'],
      entrepreneurship: ['Business Planning', 'Financial Mgmt', 'Sales', 'Leadership', 'Innovation']
    };
    return (skills[pathway] || skills.tech).map(skill =>
      `<span class="skill-badge">${skill}</span>`
    ).join('');
  }

  function calculateTimeline(age, currentJob) {
    if (currentJob.toLowerCase().includes('student') || currentJob.toLowerCase().includes('fresh')) {
      return '2-3';
    } else if (currentJob.toLowerCase().includes('intern') || currentJob.toLowerCase().includes('entry')) {
      return '1-2';
    } else if (currentJob.toLowerCase().includes('junior') || currentJob.toLowerCase().includes('mid')) {
      return '1-2';
    }
    return '1.5-2.5';
  }

  function resetCareerAssessment() {
    document.getElementById('formCard').style.display = 'block';
    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('careerAssessmentForm').reset();
    document.getElementById('cvFeedback').textContent = '';
    document.getElementById('formCard').scrollIntoView({ behavior: 'smooth' });
  }
</script>
