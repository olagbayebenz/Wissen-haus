<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Career Assessment - Wissen-Haus</title>
<meta name="description" content="Take our career assessment and get a personalized roadmap, discover career pathways, and connect with mentors to guide your journey.">
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="stylesheet" href="assets/css/career-assessment.css">
<noscript><style>.reveal{opacity:1!important;transform:none!important}</style></noscript>
</head>
<body data-page="assessment">
<noscript><div style="background:#0F2D1D;color:#fff;padding:12px 20px;text-align:center;font-family:sans-serif"><a href="index.html" style="color:#fff;margin:0 8px">Home</a><a href="about.html" style="color:#fff;margin:0 8px">About</a><a href="community.html" style="color:#fff;margin:0 8px">Community</a></div></noscript>

<main id="main">

<!-- PAGE HERO -->
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)">
  <div class="wrap">
    <div class="reveal">
      <span class="eyebrow">Career Assessment</span>
      <h1 class="display-lg mt-s">Discover Your Career Path</h1>
      <p class="lead mt-m">Answer a few simple questions and get a personalized roadmap, career pathways, and mentorship to guide your journey.</p>
    </div>
  </div>
</section>

<!-- ASSESSMENT FORM SECTION -->
<section class="section">
  <div class="wrap">
    <div style="max-width: 700px; margin: 0 auto;">
      <div class="career-form-body">
        <form id="careerAssessmentForm">
          <div class="form-row">
            <div class="field">
              <label for="assessmentName">Full Name *</label>
              <input type="text" id="assessmentName" name="name" placeholder="Your name" required>
            </div>
            <div class="field">
              <label for="assessmentAge">Age *</label>
              <input type="number" id="assessmentAge" name="age" min="16" max="80" placeholder="Age" required>
            </div>
          </div>

          <div class="form-row full">
            <div class="field">
              <label for="assessmentCurrentJob">Current Job/Status *</label>
              <input type="text" id="assessmentCurrentJob" name="currentJob" placeholder="e.g., Software Engineer, Student, Career Changer" required>
            </div>
          </div>

          <div class="form-row full">
            <div class="field">
              <label for="assessmentCV">Upload Your CV (Optional)</label>
              <div class="cv-upload-area" id="cvUploadArea">
                <label class="cv-upload-label">
                  <strong>📎 Click to upload CV</strong><br>
                  <small>PDF, DOC, or DOCX (Max 5MB)</small>
                  <input type="file" id="assessmentCV" name="cv" accept=".pdf,.doc,.docx">
                </label>
                <div class="cv-file-selected" id="cvFileName"></div>
                <div class="cv-error" id="cvError" style="color:#e74c3c;font-size:13px;margin-top:8px;"></div>
              </div>
            </div>
          </div>

          <div class="form-row full">
            <div class="field">
              <label for="assessmentCareerGoal">What would you like to be? *</label>
              <textarea id="assessmentCareerGoal" name="careerGoal" placeholder="Describe your career goal. E.g., 'I want to become a product manager in a tech startup' or 'I'm interested in healthcare technology'" required></textarea>
            </div>
          </div>

          <button type="submit" class="btn btn--block" style="margin-top: 24px;">Get Your Roadmap
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- RESULTS SECTION -->
<section class="section" id="resultsSection" style="display:none;">
  <div class="wrap">
    <div id="careerResultContainer"></div>
  </div>
</section>

</main>

<script src="assets/js/main.js"></script>
<script src="assets/js/career-assessment.js"></script>
<script>
  // File upload handler
  document.addEventListener('DOMContentLoaded', function() {
    const fileInput = document.getElementById('assessmentCV');
    const uploadArea = document.getElementById('cvUploadArea');
    const fileName = document.getElementById('cvFileName');
    const errorDiv = document.getElementById('cvError');
    const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB

    if (fileInput) {
      fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        errorDiv.textContent = '';
        fileName.textContent = '';

        if (!file) return;

        // Validate file size
        if (file.size > MAX_FILE_SIZE) {
          errorDiv.textContent = '❌ File too large. Maximum size is 5MB.';
          fileInput.value = '';
          return;
        }

        // Validate file type
        const validTypes = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
        if (!validTypes.includes(file.type)) {
          errorDiv.textContent = '❌ Invalid file type. Please upload PDF or DOC/DOCX.';
          fileInput.value = '';
          return;
        }

        fileName.textContent = '✓ ' + file.name + ' (' + (file.size / 1024).toFixed(1) + 'KB)';
      });

      // Make upload area clickable
      uploadArea.addEventListener('click', function(e) {
        if (e.target.tagName !== 'INPUT') {
          fileInput.click();
        }
      });
    }

    const form = document.getElementById('careerAssessmentForm');
    if (form) {
      // Remove modal-specific event listeners by cloning
      const newForm = form.cloneNode(true);
      form.parentNode.replaceChild(newForm, form);

      newForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const submitBtn = newForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Analyzing your profile...';

        try {
          // Collect form data
          const formData = {
            name: document.getElementById('assessmentName').value.trim(),
            age: document.getElementById('assessmentAge').value,
            currentJob: document.getElementById('assessmentCurrentJob').value.trim(),
            careerGoal: document.getElementById('assessmentCareerGoal').value.trim(),
            cvFile: document.getElementById('assessmentCV').files[0]?.name || 'not-provided'
          };

          // Validate
          if (!formData.name || !formData.age || !formData.currentJob || !formData.careerGoal) {
            throw new Error('Please fill in all required fields');
          }

          // Save to localStorage
          localStorage.setItem('careerAssessment', JSON.stringify({
            ...formData,
            timestamp: new Date().toISOString()
          }));

          // Show results
          document.querySelector('.career-form-body').style.display = 'none';
          document.getElementById('resultsSection').style.display = 'block';

          // Generate results
          generateCareerResults(formData);

          // Scroll to results
          document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });

          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;

        } catch (error) {
          alert('Error: ' + error.message);
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      });
    }
  });

  function resetCareerAssessment() {
    document.querySelector('.career-form-body').style.display = 'block';
    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('careerAssessmentForm').reset();
    document.querySelector('.career-form-body').scrollIntoView({ behavior: 'smooth' });
  }

  function generateCareerResults(data) {
    const resultContainer = document.getElementById('careerResultContainer');
    const careerGoal = data.careerGoal.toLowerCase();
    let selectedPath = 'tech';

    if (careerGoal.includes('business') || careerGoal.includes('entrepreneur')) selectedPath = 'business';
    else if (careerGoal.includes('media') || careerGoal.includes('content')) selectedPath = 'media';
    else if (careerGoal.includes('health') || careerGoal.includes('medical')) selectedPath = 'healthcare';
    else if (careerGoal.includes('social') || careerGoal.includes('impact')) selectedPath = 'social';

    const timeline = calculateTimeline(parseInt(data.age), data.currentJob);

    const resultsHTML = `
      <div class="career-results">
        <div class="results-header">
          <h2>Your Personalized Career Roadmap</h2>
          <p class="results-subtitle">Based on your profile, ${data.name}</p>
          <button class="btn btn--outline" onclick="resetCareerAssessment()">Take Assessment Again</button>
        </div>

        <section class="career-section">
          <h3>🗺️ Your Career Roadmap</h3>
          <div class="roadmap">
            <div class="roadmap-item">
              <div class="roadmap-phase">Phase 1</div>
              <div class="roadmap-title">Foundation (0-6 months)</div>
              <ul>
                <li>Build core skills in your chosen field</li>
                <li>Complete relevant online courses/certifications</li>
                <li>Connect with professionals in your field</li>
                <li>Build a portfolio of 2-3 projects</li>
              </ul>
            </div>
            <div class="roadmap-item">
              <div class="roadmap-phase">Phase 2</div>
              <div class="roadmap-title">Growth (6-12 months)</div>
              <ul>
                <li>Seek internship or junior role</li>
                <li>Deepen expertise through real projects</li>
                <li>Find a mentor in your field</li>
                <li>Build professional network</li>
              </ul>
            </div>
            <div class="roadmap-item">
              <div class="roadmap-phase">Phase 3</div>
              <div class="roadmap-title">Advancement (1-2 years)</div>
              <ul>
                <li>Transition to mid-level role</li>
                <li>Develop leadership skills</li>
                <li>Consider international opportunities</li>
                <li>Mentor others in your field</li>
              </ul>
            </div>
          </div>
          <p class="timeline-estimate"><strong>Expected Timeline:</strong> ${timeline} years to reach your goal</p>
        </section>

        <section class="career-section">
          <h3>💼 Discover Career Pathways</h3>
          <p>Not sure what careers exist? Explore these paths. For each, we explain what the job is, skills needed, salary ranges in Nigeria, and how to get started.</p>
          <div class="pathways-grid">
            ${generatePathwayCard('Tech', 'tech', 'Software Engineering, Data Science, Product Management, UX Design', ['Problem-solving', 'Programming', 'System thinking'], '₦1.5M - ₦8M+/year')}
            ${generatePathwayCard('Business', 'business', 'Management, Finance, Sales, Strategy', ['Leadership', 'Analytics', 'Communication'], '₦1.2M - ₦6M+/year')}
            ${generatePathwayCard('Media & Content', 'media', 'Journalism, Content Creation, Video Production, Marketing', ['Storytelling', 'Creativity', 'Research'], '₦600K - ₦3M+/year')}
            ${generatePathwayCard('Entrepreneurship', 'entrepreneurship', 'Startup Founder, Business Owner, Venture Building', ['Innovation', 'Risk management', 'Resilience'], 'Variable (₦0 - unlimited)')}
            ${generatePathwayCard('Healthcare', 'healthcare', 'Clinical, Research, Healthcare Tech, Public Health', ['Empathy', 'Scientific knowledge', 'Attention to detail'], '₦1.5M - ₦5M+/year')}
            ${generatePathwayCard('Social Impact', 'social', 'NGO Leadership, Policy, Community Development, CSR', ['Systems thinking', 'Communication', 'Advocacy'], '₦800K - ₦3M+/year')}
          </div>
        </section>

        <section class="career-section panel-light">
          <h3>🌍 See Global Opportunities</h3>
          <p>Think opportunities only exist abroad? Think again. Here's how to compete globally:</p>
          <div class="opportunities">
            <div class="opp-item">
              <h4>🔗 Remote Jobs</h4>
              <p>Work for global companies from Nigeria. Remote roles often pay 2-3x more than local positions.</p>
              <a href="#" class="textlink">Browse remote jobs →</a>
            </div>
            <div class="opp-item">
              <h4>🎓 International Scholarships</h4>
              <p>Study abroad programs, fully-funded masters, and executive education globally recognized.</p>
              <a href="#" class="textlink">Find scholarships →</a>
            </div>
            <div class="opp-item">
              <h4>✈️ Visa-Sponsored Roles</h4>
              <p>Companies actively seeking Nigerian talent with visa sponsorship packages.</p>
              <a href="#" class="textlink">Explore visa roles →</a>
            </div>
            <div class="opp-item">
              <h4>🚀 Position Yourself</h4>
              <p>Build skills, portfolio, and network to compete for the world's best opportunities.</p>
              <a href="#" class="textlink">Create global profile →</a>
            </div>
          </div>
        </section>

        <section class="career-section">
          <h3>🎯 Skills & Qualifications You Need</h3>
          <div class="skills-matrix">
            <div class="skill-category">
              <h4>Must-Have Skills (Critical)</h4>
              <div class="skills-list">
                <span class="skill-badge critical">Communication</span>
                <span class="skill-badge critical">Problem-solving</span>
                <span class="skill-badge critical">Adaptability</span>
                <span class="skill-badge critical">Time management</span>
              </div>
            </div>
            <div class="skill-category">
              <h4>Path-Specific Skills</h4>
              <div class="skills-list" id="pathSpecificSkills">
                ${getPathSpecificSkills(selectedPath)}
              </div>
            </div>
            <div class="skill-category">
              <h4>Recommended Qualifications</h4>
              <ul>
                <li>Bachelor's degree or equivalent (not always required)</li>
                <li>Relevant certifications (Coursera, Google, AWS, etc.)</li>
                <li>Portfolio of real projects</li>
                <li>1-2 years of relevant experience</li>
              </ul>
            </div>
          </div>
        </section>

        <section class="career-section">
          <h3>👥 Get Real Mentorship</h3>
          <p>Struggling to figure it out alone? Connect with professionals who've been where you are.</p>
          <div class="mentorship-cta">
            <div class="mentor-benefit">
              <h4>✓ Get Answers</h4>
              <p>Ask real questions to people who've navigated the same path</p>
            </div>
            <div class="mentor-benefit">
              <h4>✓ Learn from Mistakes</h4>
              <p>Avoid pitfalls by learning from others' experiences</p>
            </div>
            <div class="mentor-benefit">
              <h4>✓ Get Accountability</h4>
              <p>Have someone who actually cares check your progress</p>
            </div>
          </div>
          <a href="mentor-application.html" class="btn mt-m">Find a Mentor</a>
        </section>

        <div class="results-footer">
          <p>This roadmap is personalized to YOU. Your unique background, skills, and goals matter.</p>
          <button class="btn btn--outline" onclick="resetCareerAssessment()">Start Over</button>
        </div>
      </div>
    `;

    resultContainer.innerHTML = resultsHTML;
  }

  function generatePathwayCard(title, id, jobs, skills, salary) {
    return `
      <div class="pathway-card" data-pathway="${id}">
        <h4>${title}</h4>
        <div class="pathway-info">
          <p><strong>Roles:</strong> ${jobs}</p>
          <p><strong>Key Skills:</strong> ${skills.join(', ')}</p>
          <p><strong>Salary Range (Nigeria):</strong> ${salary}</p>
        </div>
        <a href="#" class="textlink">Learn more →</a>
      </div>
    `;
  }

  function getPathSpecificSkills(pathway) {
    const skills = {
      tech: ['Programming/Coding', 'Data Analysis', 'System Design', 'Cloud Platforms', 'DevOps'],
      business: ['Financial Analysis', 'Strategic Planning', 'Sales', 'Negotiation', 'Excel/Analytics'],
      media: ['Content Writing', 'Video Editing', 'SEO/Marketing', 'Storytelling', 'Social Media'],
      healthcare: ['Clinical Skills', 'Research', 'Empathy', 'Attention to Detail', 'Medical Knowledge'],
      social: ['Systems Thinking', 'Advocacy', 'Program Management', 'Community Building', 'Policy Knowledge'],
      entrepreneurship: ['Business Planning', 'Financial Management', 'Sales', 'Leadership', 'Innovation']
    };
    return (skills[pathway] || skills.tech).map(skill =>
      `<span class="skill-badge">${skill}</span>`
    ).join('');
  }

  function calculateTimeline(age, currentJob) {
    if (currentJob.toLowerCase().includes('student') || currentJob.toLowerCase().includes('fresh')) {
      return '2-3';
    } else if (currentJob.toLowerCase().includes('intern') || currentJob.toLowerCase().includes('entry')) {
      return '1-2';
    } else if (currentJob.toLowerCase().includes('junior') || currentJob.toLowerCase().includes('mid')) {
      return '1-2';
    }
    return '1.5-2.5';
  }
</script>
</body>
</html>
