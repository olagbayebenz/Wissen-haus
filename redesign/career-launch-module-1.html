<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 1: Crafting Your Resume - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="careerlunch"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 1 of 10</span><h1 class="display-lg mt-s">Crafting Your Professional Resume</h1><p class="lead mt-m">Your resume is your first impression. Learn how to create a document that gets past ATS systems, showcases your achievements, and opens doors to interviews.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="career-launch-course.html" class="btn btn--outline">← Back to Course</a><a href="career-launch-module-2.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 1, COURSE_ID = 'career-launch', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Crafting Your Professional Resume</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Format your resume for ATS systems and human eyes</li><li>Use action verbs and quantifiable achievements</li><li>Tailor your resume for each opportunity</li></ul></div><p class="module__summary">Your resume should tell your story in 30 seconds. Use strong action verbs, focus on achievements with numbers, keep it to one page if possible, and always tailor it to the job description. Avoid generic bullet points; instead, show impact.</p><div class="module__quiz"><strong>Quiz: Crafting Your Resume</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> What should you prioritize in resume bullet points?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_1_0" value="a"><span><strong>A.</strong> List all your duties</span></label><label class="module__option"><input type="radio" name="q_1_0" value="b"><span><strong>B.</strong> Start with action verbs and show measurable impact</span></label><label class="module__option"><input type="radio" name="q_1_0" value="c"><span><strong>C.</strong> Use passive language</span></label><label class="module__option"><input type="radio" name="q_1_0" value="d"><span><strong>D.</strong> Fill every line</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> How should you handle ATS systems?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_1_1" value="a"><span><strong>A.</strong> Use graphics and unusual formatting</span></label><label class="module__option"><input type="radio" name="q_1_1" value="b"><span><strong>B.</strong> Use simple formatting and mirror keywords from the job description</span></label><label class="module__option"><input type="radio" name="q_1_1" value="c"><span><strong>C.</strong> Make it as creative as possible</span></label><label class="module__option"><input type="radio" name="q_1_1" value="d"><span><strong>D.</strong> Ignore them</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> How often should you update your resume?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_1_2" value="a"><span><strong>A.</strong> Once a year</span></label><label class="module__option"><input type="radio" name="q_1_2" value="b"><span><strong>B.</strong> Only when job hunting</span></label><label class="module__option"><input type="radio" name="q_1_2" value="c"><span><strong>C.</strong> As you achieve wins, and tailor for each application</span></label><label class="module__option"><input type="radio" name="q_1_2" value="d"><span><strong>D.</strong> Never</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_1_0"]:checked')?.value, document.querySelector('input[name="q_1_1"]:checked')?.value, document.querySelector('input[name="q_1_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'career-launch-module-2.html'; }, 1500); } else { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-fail">You got ${correct}/3. Need 80%.</div>`; } }); updateProgress();
</script></body></html>
