<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 10: First 100 Days - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="careerlunch"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 10 of 10</span><h1 class="display-lg mt-s">Your First 100 Days on the Job</h1><p class="lead mt-m">The first 100 days set the tone for your entire tenure. Learn to start strong, build credibility, and establish yourself as a valuable team member.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="career-launch-module-9.html" class="btn btn--outline">← Previous Module</a><a href="career-launch-certificate.html" class="btn">View Certificate →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 10, COURSE_ID = 'career-launch', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Your First 100 Days on the Job</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Create a 30-60-90 day plan</li><li>Build relationships and prove value early</li><li>Establish yourself as a reliable performer</li></ul></div><p class="module__summary">Days 1-30: Listen, learn, observe. Absorb the culture. Days 31-60: Contribute small wins. Ask for projects where you can add immediate value. Days 61-90: Drive impact. Propose improvements. Build credibility. Ask for feedback constantly. Deliver what you promise. Show initiative without overstepping. First impressions last. Be reliable, curious, and humble.</p><div class="module__quiz"><strong>Quiz: First 100 Days</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> What should your focus be in the first 30 days?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_0" value="a"><span><strong>A.</strong> Make your mark immediately</span></label><label class="module__option"><input type="radio" name="q_10_0" value="b"><span><strong>B.</strong> Listen, learn, observe culture, build relationships</span></label><label class="module__option"><input type="radio" name="q_10_0" value="c"><span><strong>C.</strong> Fix all the problems</span></label><label class="module__option"><input type="radio" name="q_10_0" value="d"><span><strong>D.</strong> Prove you're the best</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> Days 31-60, you should focus on:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_1" value="a"><span><strong>A.</strong> Taking it easy</span></label><label class="module__option"><input type="radio" name="q_10_1" value="b"><span><strong>B.</strong> Delivering small wins, building trust, seeking feedback</span></label><label class="module__option"><input type="radio" name="q_10_1" value="c"><span><strong>C.</strong> Waiting for direction</span></label><label class="module__option"><input type="radio" name="q_10_1" value="d"><span><strong>D.</strong> Complaining about processes</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> The most important thing in your first 100 days:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_2" value="a"><span><strong>A.</strong> Getting promoted</span></label><label class="module__option"><input type="radio" name="q_10_2" value="b"><span><strong>B.</strong> Being reliable, curious, humble, and delivering on promises</span></label><label class="module__option"><input type="radio" name="q_10_2" value="c"><span><strong>C.</strong> Making money</span></label><label class="module__option"><input type="radio" name="q_10_2" value="d"><span><strong>D.</strong> Being visible at every meeting</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
  const questionText = [
  { q: 'What should your focus be in the first 30 days?', opts: ['Make your mark immediately', 'Listen, learn, observe culture, build relationships', 'Fix all the problems', 'Prove you\'re the best'] },
  { q: 'Days 31-60, you should focus on:', opts: ['Taking it easy', 'Delivering small wins, building trust, seeking feedback', 'Waiting for direction', 'Complaining about processes'] },
  { q: 'The most important thing in your first 100 days:', opts: ['Getting promoted', 'Being reliable, curious, humble, and delivering on promises', 'Making money', 'Being visible at every meeting'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_10_0"]:checked')?.value, document.querySelector('input[name="q_10_1"]:checked')?.value, document.querySelector('input[name="q_10_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading your certificate...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'career-launch-certificate.html'; }, 1500); } else { let html = `<div class=\"module__quiz-fail\">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style=\"margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px\"><strong>Q${item.index}:</strong> ${item.question}<br><span style=\"color:var(--red)\">Your answer:</span> ${item.userAnswer}<br><span style=\"color:var(--green-800)\">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
