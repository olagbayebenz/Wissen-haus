<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 2: Mastering Interviews - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="careerlunch"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 2 of 10</span><h1 class="display-lg mt-s">Mastering the Interview Process</h1><p class="lead mt-m">Interviews are conversations, not interrogations. Learn to prepare, tell compelling stories, answer tough questions, and leave a lasting impression.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="career-launch-module-1.html" class="btn btn--outline">← Previous Module</a><a href="career-launch-module-3.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 2, COURSE_ID = 'career-launch', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Mastering the Interview Process</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Research the company and prepare thoroughly</li><li>Use the STAR method to answer behavioral questions</li><li>Ask insightful questions and close strong</li></ul></div><p class="module__summary">Preparation is everything. Research the company, their challenges, and the team. Practice the STAR method (Situation, Task, Action, Result) for behavioral questions. Prepare stories that show your skills. Remember: interviews are two-way streets—ask thoughtful questions about role fit and growth.</p><div class="module__quiz"><strong>Quiz: Interview Mastery</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> What is the STAR method for interviews?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_2_0" value="a"><span><strong>A.</strong> Starting Talking and Repeating</span></label><label class="module__option"><input type="radio" name="q_2_0" value="b"><span><strong>B.</strong> Situation, Task, Action, Result</span></label><label class="module__option"><input type="radio" name="q_2_0" value="c"><span><strong>C.</strong> Stay, Talk, Anxious, Ready</span></label><label class="module__option"><input type="radio" name="q_2_0" value="d"><span><strong>D.</strong> Simple, Time-bound, Accurate, Real</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> Before the interview, you should:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_2_1" value="a"><span><strong>A.</strong> Arrive early and wing it</span></label><label class="module__option"><input type="radio" name="q_2_1" value="b"><span><strong>B.</strong> Research the company, role, and interviewers, practice answers</span></label><label class="module__option"><input type="radio" name="q_2_1" value="c"><span><strong>C.</strong> Just read the job description</span></label><label class="module__option"><input type="radio" name="q_2_1" value="d"><span><strong>D.</strong> Don't overthink it</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> What should you do at the end of an interview?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_2_2" value="a"><span><strong>A.</strong> Just say goodbye</span></label><label class="module__option"><input type="radio" name="q_2_2" value="b"><span><strong>B.</strong> Ask about next steps, send a thank-you email within 24 hours</span></label><label class="module__option"><input type="radio" name="q_2_2" value="c"><span><strong>C.</strong> Wait by your phone</span></label><label class="module__option"><input type="radio" name="q_2_2" value="d"><span><strong>D.</strong> Follow them on social media</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
  const questionText = [
  { q: 'What is the STAR method for interviews?', opts: ['Starting Talking and Repeating', 'Situation, Task, Action, Result', 'Stay, Talk, Anxious, Ready', 'Simple, Time-bound, Accurate, Real'] },
  { q: 'Before the interview, you should:', opts: ['Arrive early and wing it', 'Research the company, role, and interviewers, practice answers', 'Just read the job description', 'Don\'t overthink it'] },
  { q: 'What should you do at the end of an interview?', opts: ['Just say goodbye', 'Ask about next steps, send a thank-you email within 24 hours', 'Wait by your phone', 'Follow them on social media'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_2_0"]:checked')?.value, document.querySelector('input[name="q_2_1"]:checked')?.value, document.querySelector('input[name="q_2_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'career-launch-module-3.html'; }, 1500); } else { let html = `<div class=\"module__quiz-fail\">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style=\"margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px\"><strong>Q${item.index}:</strong> ${item.question}<br><span style=\"color:var(--red)\">Your answer:</span> ${item.userAnswer}<br><span style=\"color:var(--green-800)\">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
