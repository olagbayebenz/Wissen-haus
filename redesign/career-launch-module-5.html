<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 5: Personal Branding - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="careerlunch"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 5 of 10</span><h1 class="display-lg mt-s">Building Your Personal Brand</h1><p class="lead mt-m">Your brand is your reputation. Learn to tell your story, build online presence, and position yourself as an expert in your field.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="career-launch-module-4.html" class="btn btn--outline">← Previous Module</a><a href="career-launch-module-6.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 5, COURSE_ID = 'career-launch', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Building Your Personal Brand</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Define your unique value proposition</li><li>Build a cohesive online presence</li><li>Share your expertise and knowledge</li></ul></div><p class="module__summary">Your brand is what people say about you when you're not in the room. Define what you stand for. Be consistent across LinkedIn, Twitter, and your portfolio. Share your learnings—write, speak, mentor. Let your work speak. Authenticity beats perfection. Build your brand before you need a job.</p><div class="module__quiz"><strong>Quiz: Personal Branding</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> What is a personal brand?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_5_0" value="a"><span><strong>A.</strong> Your logo and colors</span></label><label class="module__option"><input type="radio" name="q_5_0" value="b"><span><strong>B.</strong> Your unique reputation and what people associate with you</span></label><label class="module__option"><input type="radio" name="q_5_0" value="c"><span><strong>C.</strong> How you dress</span></label><label class="module__option"><input type="radio" name="q_5_0" value="d"><span><strong>D.</strong> Marketing yourself</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> How should you build your brand?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_5_1" value="a"><span><strong>A.</strong> Be everything to everyone</span></label><label class="module__option"><input type="radio" name="q_5_1" value="b"><span><strong>B.</strong> Define your niche, be consistent, share expertise authentically</span></label><label class="module__option"><input type="radio" name="q_5_1" value="c"><span><strong>C.</strong> Post constantly</span></label><label class="module__option"><input type="radio" name="q_5_1" value="d"><span><strong>D.</strong> Don't show your personality</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> Why share your knowledge online?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_5_2" value="a"><span><strong>A.</strong> To compete with others</span></label><label class="module__option"><input type="radio" name="q_5_2" value="b"><span><strong>B.</strong> Establish credibility, help others, create opportunities</span></label><label class="module__option"><input type="radio" name="q_5_2" value="c"><span><strong>C.</strong> You shouldn't</span></label><label class="module__option"><input type="radio" name="q_5_2" value="d"><span><strong>D.</strong> Only if you're famous</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
  const questionText = [
  { q: 'What is a personal brand?', opts: ['Your logo and colors', 'Your unique reputation and what people associate with you', 'How you dress', 'Marketing yourself'] },
  { q: 'How should you build your brand?', opts: ['Be everything to everyone', 'Define your niche, be consistent, share expertise authentically', 'Post constantly', 'Don\'t show your personality'] },
  { q: 'Why share your knowledge online?', opts: ['To compete with others', 'Establish credibility, help others, create opportunities', 'You shouldn\'t', 'Only if you\'re famous'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_5_0"]:checked')?.value, document.querySelector('input[name="q_5_1"]:checked')?.value, document.querySelector('input[name="q_5_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'career-launch-module-6.html'; }, 1500); } else { let html = `<div class=\"module__quiz-fail\">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style=\"margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px\"><strong>Q${item.index}:</strong> ${item.question}<br><span style=\"color:var(--red)\">Your answer:</span> ${item.userAnswer}<br><span style=\"color:var(--green-800)\">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
