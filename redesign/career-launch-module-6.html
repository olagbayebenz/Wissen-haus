<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 6: Workplace Culture - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="careerlunch"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 6 of 10</span><h1 class="display-lg mt-s">Understanding Workplace Culture</h1><p class="lead mt-m">Every company has a culture. Learn to identify it, assess fit, and navigate office dynamics successfully from day one.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="career-launch-module-5.html" class="btn btn--outline">← Previous Module</a><a href="career-launch-module-7.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 6, COURSE_ID = 'career-launch', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Understanding Workplace Culture</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Identify and assess company culture during interviews</li><li>Navigate office politics and hierarchies</li><li>Find your place and thrive in the culture</li></ul></div><p class="module__summary">Culture is the unwritten rules. Pay attention to communication style, decision-making speed, work-life balance, values in practice (not just stated). Ask interviewers about culture. During interviews, meet team members—they reveal the real culture. Once inside, observe before acting. Align with the culture while staying true to yourself.</p><div class="module__quiz"><strong>Quiz: Workplace Culture</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> How do you assess company culture during interviews?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_6_0" value="a"><span><strong>A.</strong> Read the website</span></label><label class="module__option"><input type="radio" name="q_6_0" value="b"><span><strong>B.</strong> Observe team dynamics, ask about values, check Glassdoor</span></label><label class="module__option"><input type="radio" name="q_6_0" value="c"><span><strong>C.</strong> Trust the job description</span></label><label class="module__option"><input type="radio" name="q_6_0" value="d"><span><strong>D.</strong> Don't bother</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> What does culture tell you?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_6_1" value="a"><span><strong>A.</strong> Only how fancy the office is</span></label><label class="module__option"><input type="radio" name="q_6_1" value="b"><span><strong>B.</strong> Communication style, values in action, work-life balance, career growth</span></label><label class="module__option"><input type="radio" name="q_6_1" value="c"><span><strong>C.</strong> Nothing important</span></label><label class="module__option"><input type="radio" name="q_6_1" value="d"><span><strong>D.</strong> Just the dress code</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> When starting a new role, you should:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_6_2" value="a"><span><strong>A.</strong> Immediately change everything</span></label><label class="module__option"><input type="radio" name="q_6_2" value="b"><span><strong>B.</strong> Observe, ask questions, listen before acting</span></label><label class="module__option"><input type="radio" name="q_6_2" value="c"><span><strong>C.</strong> Do your own thing</span></label><label class="module__option"><input type="radio" name="q_6_2" value="d"><span><strong>D.</strong> Complain about the culture</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_6_0"]:checked')?.value, document.querySelector('input[name="q_6_1"]:checked')?.value, document.querySelector('input[name="q_6_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'career-launch-module-7.html'; }, 1500); } else { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-fail">You got ${correct}/3. Need 80%.</div>`; } }); updateProgress();
</script></body></html>
