<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 8: Remote Work - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="careerlunch"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 8 of 10</span><h1 class="display-lg mt-s">Remote Work Skills & Setup</h1><p class="lead mt-m">Distributed work is here to stay. Master the skills to thrive in remote and hybrid environments.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="career-launch-module-7.html" class="btn btn--outline">← Previous Module</a><a href="career-launch-module-9.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 8, COURSE_ID = 'career-launch', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Remote Work Skills & Setup</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Set up a productive remote workspace</li><li>Communicate asynchronously and stay connected</li><li>Maintain work-life balance in distributed teams</li></ul></div><p class="module__summary">Remote work requires discipline. Create a dedicated workspace. Overcommunicate—document decisions, share context in writing. Use async-first communication (email, docs, recordings) so global teams aren't blocked by time zones. Over-video isn't productivity; it's exhausting. Have a schedule and stick to it. Boundaries between work and home are harder to maintain but essential.</p><div class="module__quiz"><strong>Quiz: Remote Work</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> What's essential for remote work success?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_8_0" value="a"><span><strong>A.</strong> Always be online and available</span></label><label class="module__option"><input type="radio" name="q_8_0" value="b"><span><strong>B.</strong> Dedicated workspace, clear boundaries, async-first communication</span></label><label class="module__option"><input type="radio" name="q_8_0" value="c"><span><strong>C.</strong> Video camera always on</span></label><label class="module__option"><input type="radio" name="q_8_0" value="d"><span><strong>D.</strong> Just have a laptop</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> How should you communicate in remote teams?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_8_1" value="a"><span><strong>A.</strong> Instant messages only</span></label><label class="module__option"><input type="radio" name="q_8_1" value="b"><span><strong>B.</strong> Document in writing, share context, use async-first, minimal sync meetings</span></label><label class="module__option"><input type="radio" name="q_8_1" value="c"><span><strong>C.</strong> Back-to-back video calls</span></label><label class="module__option"><input type="radio" name="q_8_1" value="d"><span><strong>D.</strong> Only email</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> What's the biggest remote work challenge?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_8_2" value="a"><span><strong>A.</strong> Wearing pajamas</span></label><label class="module__option"><input type="radio" name="q_8_2" value="b"><span><strong>B.</strong> Work-life boundaries and overworking</span></label><label class="module__option"><input type="radio" name="q_8_2" value="c"><span><strong>C.</strong> The time zone difference</span></label><label class="module__option"><input type="radio" name="q_8_2" value="d"><span><strong>D.</strong> Boredom</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
  const questionText = [
  { q: 'What\'s essential for remote work success?', opts: ['Always be online and available', 'Dedicated workspace, clear boundaries, async-first communication', 'Video camera always on', 'Just have a laptop'] },
  { q: 'How should you communicate in remote teams?', opts: ['Instant messages only', 'Document in writing, share context, use async-first, minimal sync meetings', 'Back-to-back video calls', 'Only email'] },
  { q: 'What\'s the biggest remote work challenge?', opts: ['Wearing pajamas', 'Work-life boundaries and overworking', 'The time zone difference', 'Boredom'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_8_0"]:checked')?.value, document.querySelector('input[name="q_8_1"]:checked')?.value, document.querySelector('input[name="q_8_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'career-launch-module-9.html'; }, 1500); } else { let html = `<div class=\"module__quiz-fail\">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style=\"margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px\"><strong>Q${item.index}:</strong> ${item.question}<br><span style=\"color:var(--red)\">Your answer:</span> ${item.userAnswer}<br><span style=\"color:var(--green-800)\">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
