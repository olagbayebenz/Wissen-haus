<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 9: Managing Offers - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="careerlunch"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 9 of 10</span><h1 class="display-lg mt-s">Managing Offers & Making Decisions</h1><p class="lead mt-m">You have an offer. Now what? Learn to evaluate opportunities objectively and make decisions aligned with your career goals.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="career-launch-module-8.html" class="btn btn--outline">← Previous Module</a><a href="career-launch-module-10.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 9, COURSE_ID = 'career-launch', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Managing Offers & Making Decisions</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Evaluate opportunities beyond salary</li><li>Compare multiple offers strategically</li><li>Make decisions aligned with your 5-year plan</li></ul></div><p class="module__summary">Never judge an offer on salary alone. Compare: learning potential, team quality, company growth, work-life balance, location, mission fit. Ask for time to decide. Consult mentors. Trust your gut—red flags now become real problems later. Turn down offers that don't align with your goals. A wrong first role compounds mistakes; a right one opens doors.</p><div class="module__quiz"><strong>Quiz: Evaluating Offers</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> When evaluating offers, what matters most?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_9_0" value="a"><span><strong>A.</strong> Salary alone</span></label><label class="module__option"><input type="radio" name="q_9_0" value="b"><span><strong>B.</strong> Learning, team, company growth, mission fit, not just salary</span></label><label class="module__option"><input type="radio" name="q_9_0" value="c"><span><strong>C.</strong> The office location</span></label><label class="module__option"><input type="radio" name="q_9_0" value="d"><span><strong>D.</strong> How quickly you can move</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> If you get multiple offers, you should:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_9_1" value="a"><span><strong>A.</strong> Take the highest salary immediately</span></label><label class="module__option"><input type="radio" name="q_9_1" value="b"><span><strong>B.</strong> Compare all factors, consult mentors, decide aligned with your goals</span></label><label class="module__option"><input type="radio" name="q_9_1" value="c"><span><strong>C.</strong> Ask colleagues to pick for you</span></label><label class="module__option"><input type="radio" name="q_9_1" value="d"><span><strong>D.</strong> Flip a coin</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> Red flags in offers include:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_9_2" value="a"><span><strong>A.</strong> None, they all lead to growth</span></label><label class="module__option"><input type="radio" name="q_9_2" value="b"><span><strong>B.</strong> Unclear role, poor team communication, misaligned values, overwork culture</span></label><label class="module__option"><input type="radio" name="q_9_2" value="c"><span><strong>C.</strong> The company is small</span></label><label class="module__option"><input type="radio" name="q_9_2" value="d"><span><strong>D.</strong> They hired you quickly</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
  const questionText = [
  { q: 'When evaluating offers, what matters most?', opts: ['Salary alone', 'Learning, team, company growth, mission fit, not just salary', 'The office location', 'How quickly you can move'] },
  { q: 'If you get multiple offers, you should:', opts: ['Take the highest salary immediately', 'Compare all factors, consult mentors, decide aligned with your goals', 'Ask colleagues to pick for you', 'Flip a coin'] },
  { q: 'Red flags in offers include:', opts: ['None, they all lead to growth', 'Unclear role, poor team communication, misaligned values, overwork culture', 'The company is small', 'They hired you quickly'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_9_0"]:checked')?.value, document.querySelector('input[name="q_9_1"]:checked')?.value, document.querySelector('input[name="q_9_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'career-launch-module-10.html'; }, 1500); } else { let html = `<div class=\"module__quiz-fail\">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style=\"margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px\"><strong>Q${item.index}:</strong> ${item.question}<br><span style=\"color:var(--red)\">Your answer:</span> ${item.userAnswer}<br><span style=\"color:var(--green-800)\">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
