<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 1: Money Mindset - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="finliteracy"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 1 of 10</span><h1 class="display-lg mt-s">Money Mindset & Financial Foundations</h1><p class="lead mt-m">Your relationship with money shapes your financial future. Develop healthy money beliefs, understand your values, and build a foundation for wealth.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="financial-literacy-course.html" class="btn btn--outline">← Back to Course</a><a href="financial-literacy-module-2.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 1, COURSE_ID = 'financial-literacy', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Money Mindset & Financial Foundations</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Identify your beliefs about money</li><li>Understand the connection between mindset and behavior</li><li>Build a foundation for long-term wealth</li></ul></div><p class="module__summary">Money is a tool, not a measure of worth. Scarcity mindset leads to poor decisions; abundance mindset enables growth. Beliefs formed in childhood influence your financial habits. Common myths: money is evil, you can't build wealth, investing is for rich people. Reality: money is neutral, wealth is built systematically, and investing starts with small amounts. First step: examine your money beliefs.</p><div class="module__quiz"><strong>Quiz: Money Mindset</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> What is scarcity mindset about money?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_1_0" value="a"><span><strong>A.</strong> Belief that there's always enough money</span></label><label class="module__option"><input type="radio" name="q_1_0" value="b"><span><strong>B.</strong> Fear that money will run out, leading to hoarding or poor spending</span></label><label class="module__option"><input type="radio" name="q_1_0" value="c"><span><strong>C.</strong> Understanding inflation</span></label><label class="module__option"><input type="radio" name="q_1_0" value="d"><span><strong>D.</strong> Having savings</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> How do childhood beliefs about money affect you?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_1_1" value="a"><span><strong>A.</strong> They don't matter as an adult</span></label><label class="module__option"><input type="radio" name="q_1_1" value="b"><span><strong>B.</strong> They shape your financial habits, spending, and wealth-building behavior</span></label><label class="module__option"><input type="radio" name="q_1_1" value="c"><span><strong>C.</strong> Only if you're poor</span></label><label class="module__option"><input type="radio" name="q_1_1" value="d"><span><strong>D.</strong> Only if you're rich</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> Is investing only for rich people?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_1_2" value="a"><span><strong>A.</strong> Yes, you need a lot of money</span></label><label class="module__option"><input type="radio" name="q_1_2" value="b"><span><strong>B.</strong> No, investing starts with small amounts and compound over time</span></label><label class="module__option"><input type="radio" name="q_1_2" value="c"><span><strong>C.</strong> Only in Nigeria</span></label><label class="module__option"><input type="radio" name="q_1_2" value="d"><span><strong>D.</strong> Never</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return `${cid}_${mid}`; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_1_0"]:checked')?.value, document.querySelector('input[name="q_1_1"]:checked')?.value, document.querySelector('input[name="q_1_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'financial-literacy-module-2.html'; }, 1500); } else { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-fail">You got ${correct}/3. Need 80%.</div>`; } }); updateProgress();
</script></body></html>
