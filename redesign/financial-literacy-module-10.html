<body data-page="fl"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 10 of 10</span><h1 class="display-lg mt-s">Building Long-Term Wealth</h1><p class="lead mt-m">Wealth is built over decades, not overnight. Strategies: live below means, save/invest consistently, build multiple inco...</p></div></div></section>

<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="financial-literacy-module-9.html" class="btn btn--outline">← Previous</a><a href="financial-literacy-module-11.html" class="btn">Next →</a></div></div></section>

<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 10, COURSE_ID = 'financial-literacy', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Building Long-Term Wealth</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Create a wealth-building strategy</li><li>Understand passive income sources</li><li>Think generationally about finances</li></ul></div><p class="module__summary">Wealth is built over decades, not overnight. Strategies: live below means, save/invest consistently, build multiple income streams, leverage compound interest, own assets that generate income. Real estate, business, investments, and side hustles create wealth. Teach the next generation these habits. Wealth protection is as important as wealth creation (insurance, diversification, planning).</p><div class="module__quiz"><strong>Quiz: Building Long-Term Wealth</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> What is passive income?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_10_0" value="a"><span><strong>A.</strong> Money you earn while sleeping</span></label><label class="module__option"><input type="radio" name="q_10_0" value="b"><span><strong>B.</strong> Income from assets/investments without active work</span></label><label class="module__option"><input type="radio" name="q_10_0" value="c"><span><strong>C.</strong> Salary from full-time job</span></label><label class="module__option"><input type="radio" name="q_10_0" value="d"><span><strong>D.</strong> Bonus payments</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> How do wealthy people typically build wealth?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_10_1" value="a"><span><strong>A.</strong> Lottery and gambling</span></label><label class="module__option"><input type="radio" name="q_10_1" value="b"><span><strong>B.</strong> Multiple income streams and investments</span></label><label class="module__option"><input type="radio" name="q_10_1" value="c"><span><strong>C.</strong> Spending a lot</span></label><label class="module__option"><input type="radio" name="q_10_1" value="d"><span><strong>D.</strong> Working one job only</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> Why is diversification important for wealth building?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_10_2" value="a"><span><strong>A.</strong> To make more money immediately</span></label><label class="module__option"><input type="radio" name="q_10_2" value="b"><span><strong>B.</strong> To spread risk and ensure stability</span></label><label class="module__option"><input type="radio" name="q_10_2" value="c"><span><strong>C.</strong> To earn less</span></label><label class="module__option"><input type="radio" name="q_10_2" value="d"><span><strong>D.</strong> It's not important</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'What is passive income?', opts: ['Money you earn while sleeping', 'Income from assets/investments without active work', 'Salary from full-time job', 'Bonus payments'] },
  { q: 'How do wealthy people typically build wealth?', opts: ['Lottery and gambling', 'Multiple income streams and investments', 'Spending a lot', 'Working one job only'] },
  { q: 'Why is diversification important for wealth building?', opts: ['To make more money immediately', 'To spread risk and ensure stability', 'To earn less', 'It\'s not important'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_10_0"]:checked')?.value, document.querySelector('input[name="q_10_1"]:checked')?.value, document.querySelector('input[name="q_10_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'financial-literacy-module-11.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
