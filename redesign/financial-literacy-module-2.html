<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 2 - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="finliteracy"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 2 of 10</span><h1 class="display-lg mt-s">Creating Your First Budget</h1><p class="lead mt-m">Module 2 content.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="financial-literacy-module-1.html" class="btn btn--outline">← Previous Module</a><a href="3.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 2, COURSE_ID = 'financial-literacy', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Creating Your First Budget</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Track income and expenses effectively</li><li>Create a realistic budget using the 50/30/20 rule</li><li>Monitor spending and adjust as needed</li></ul></div><p class="module__summary">A budget is a spending plan that helps you control money instead of money controlling you. Start by tracking where your money actually goes for one month. Then allocate: 50% to needs (rent, food, transport), 30% to wants (entertainment, dining out), 20% to savings and debt repayment. Review monthly and adjust. Use apps or a simple spreadsheet.</p><div class="module__quiz"><strong>Quiz: Budgeting Basics</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> According to the 50/30/20 budgeting rule, what percentage should go to needs?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_2_0" value="a"><span><strong>A.</strong> 30%</span></label><label class="module__option"><input type="radio" name="q_2_0" value="b"><span><strong>B.</strong> 50%</span></label><label class="module__option"><input type="radio" name="q_2_0" value="c"><span><strong>C.</strong> 70%</span></label><label class="module__option"><input type="radio" name="q_2_0" value="d"><span><strong>D.</strong> 80%</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> What is the first step to creating a budget?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_2_1" value="a"><span><strong>A.</strong> Set unrealistic savings goals</span></label><label class="module__option"><input type="radio" name="q_2_1" value="b"><span><strong>B.</strong> Track where your money actually goes for a month</span></label><label class="module__option"><input type="radio" name="q_2_1" value="c"><span><strong>C.</strong> Cut all discretionary spending immediately</span></label><label class="module__option"><input type="radio" name="q_2_1" value="d"><span><strong>D.</strong> Only track large expenses</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> Which of these is typically considered a "want" in budgeting?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_2_2" value="a"><span><strong>A.</strong> Rent or mortgage</span></label><label class="module__option"><input type="radio" name="q_2_2" value="b"><span><strong>B.</strong> Electricity bill</span></label><label class="module__option"><input type="radio" name="q_2_2" value="c"><span><strong>C.</strong> Dining out for entertainment</span></label><label class="module__option"><input type="radio" name="q_2_2" value="d"><span><strong>D.</strong> Transportation to work</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'c'] };
const questionText = [
  { q: 'According to the 50/30/20 budgeting rule, what percentage should go to needs?', opts: ['30%', '50%', '70%', '80%'] },
  { q: 'What is the first step to creating a budget?', opts: ['Set unrealistic savings goals', 'Track where your money actually goes for a month', 'Cut all discretionary spending immediately', 'Only track large expenses'] },
  { q: 'Which of these is typically considered a "want" in budgeting?', opts: ['Rent or mortgage', 'Electricity bill', 'Dining out for entertainment', 'Transportation to work'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_2_0"]:checked')?.value, document.querySelector('input[name="q_2_1"]:checked')?.value, document.querySelector('input[name="q_2_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-pass">✓ Passed! ' + correct + '/3 correct.</div>'; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'financial-literacy-module-3.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
