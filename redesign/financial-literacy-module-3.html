<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 3: Managing Your First Salary - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="fl"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 3 of 10</span><h1 class="display-lg mt-s">Managing Your First Salary</h1><p class="lead mt-m">Your first salary is exciting—and risky if not managed well. Understand gross vs net pay (deductions, taxes, insurance)....</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="financial-literacy-module-2.html" class="btn btn--outline">← Previous</a><a href="financial-literacy-module-4.html" class="btn">Next →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 3, COURSE_ID = 'financial-literacy', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Managing Your First Salary</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Calculate take-home pay vs gross salary</li><li>Plan how to allocate your first salary</li><li>Avoid common spending mistakes</li></ul></div><p class="module__summary">Your first salary is exciting—and risky if not managed well. Understand gross vs net pay (deductions, taxes, insurance). Before spending, allocate: 50% needs, 30% wants, 20% savings. Pay yourself first—automate savings. Avoid lifestyle inflation (upgrading everything because you earn more). Build emergency fund before investing.</p><div class="module__quiz"><strong>Quiz: Managing Your First Salary</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> What is the difference between gross and net salary?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_3_0" value="a"><span><strong>A.</strong> Gross is higher; net is after deductions</span></label><label class="module__option"><input type="radio" name="q_3_0" value="b"><span><strong>B.</strong> They are the same</span></label><label class="module__option"><input type="radio" name="q_3_0" value="c"><span><strong>C.</strong> Gross is lower; net is the actual amount</span></label><label class="module__option"><input type="radio" name="q_3_0" value="d"><span><strong>D.</strong> Gross includes bonuses only</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> What does "pay yourself first" mean?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_3_1" value="a"><span><strong>A.</strong> Spend money on yourself before bills</span></label><label class="module__option"><input type="radio" name="q_3_1" value="b"><span><strong>B.</strong> Save a portion of income before spending</span></label><label class="module__option"><input type="radio" name="q_3_1" value="c"><span><strong>C.</strong> Negotiate higher salary</span></label><label class="module__option"><input type="radio" name="q_3_1" value="d"><span><strong>D.</strong> Avoid paying taxes</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> What is lifestyle inflation?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_3_2" value="a"><span><strong>A.</strong> Increasing prices in the economy</span></label><label class="module__option"><input type="radio" name="q_3_2" value="b"><span><strong>B.</strong> Increasing spending as income increases</span></label><label class="module__option"><input type="radio" name="q_3_2" value="c"><span><strong>C.</strong> Buying cheaper products</span></label><label class="module__option"><input type="radio" name="q_3_2" value="d"><span><strong>D.</strong> Reducing expenses</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['a', 'b', 'b'] };
const questionText = [
  { q: 'What is the difference between gross and net salary?', opts: ['Gross is higher; net is after deductions', 'They are the same', 'Gross is lower; net is the actual amount', 'Gross includes bonuses only'] },
  { q: 'What does "pay yourself first" mean?', opts: ['Spend money on yourself before bills', 'Save a portion of income before spending', 'Negotiate higher salary', 'Avoid paying taxes'] },
  { q: 'What is lifestyle inflation?', opts: ['Increasing prices in the economy', 'Increasing spending as income increases', 'Buying cheaper products', 'Reducing expenses'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_3_0"]:checked')?.value, document.querySelector('input[name="q_3_1"]:checked')?.value, document.querySelector('input[name="q_3_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'financial-literacy-module-4.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
