<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 4: Understanding Debt & Credit - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="fl"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 4 of 10</span><h1 class="display-lg mt-s">Understanding Debt & Credit</h1><p class="lead mt-m">Credit is borrowed money you must repay. Good credit (paying on time) lowers loan interest rates, saving thousands. Cred...</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="financial-literacy-module-3.html" class="btn btn--outline">← Previous</a><a href="financial-literacy-module-5.html" class="btn">Next →</a></div></div></section>

<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 4, COURSE_ID = 'financial-literacy', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Understanding Debt & Credit</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Understand credit scores and how they work</li><li>Use debt responsibly</li><li>Build credit history wisely</li></ul></div><p class="module__summary">Credit is borrowed money you must repay. Good credit (paying on time) lowers loan interest rates, saving thousands. Credit score (300-850) is based on: payment history (35%), credit utilization (30%), credit history length (15%), credit mix (10%), new inquiries (10%). Start with small credit card purchases you pay in full. Avoid high-interest loans. Never max out credit cards.</p><div class="module__quiz"><strong>Quiz: Understanding Debt & Credit</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> What is the most important factor in your credit score?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_4_0" value="a"><span><strong>A.</strong> Credit card limits</span></label><label class="module__option"><input type="radio" name="q_4_0" value="b"><span><strong>B.</strong> Payment history (35%)</span></label><label class="module__option"><input type="radio" name="q_4_0" value="c"><span><strong>C.</strong> Monthly income</span></label><label class="module__option"><input type="radio" name="q_4_0" value="d"><span><strong>D.</strong> Age</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> What does credit utilization mean?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_4_1" value="a"><span><strong>A.</strong> Using credit cards for emergencies only</span></label><label class="module__option"><input type="radio" name="q_4_1" value="b"><span><strong>B.</strong> The percentage of available credit you're using</span></label><label class="module__option"><input type="radio" name="q_4_1" value="c"><span><strong>C.</strong> The number of credit cards</span></label><label class="module__option"><input type="radio" name="q_4_1" value="d"><span><strong>D.</strong> Your credit score</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> How should you build credit as a young person?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_4_2" value="a"><span><strong>A.</strong> Get into debt immediately</span></label><label class="module__option"><input type="radio" name="q_4_2" value="b"><span><strong>B.</strong> Make small purchases and pay in full on time</span></label><label class="module__option"><input type="radio" name="q_4_2" value="c"><span><strong>C.</strong> Avoid credit cards completely</span></label><label class="module__option"><input type="radio" name="q_4_2" value="d"><span><strong>D.</strong> Max out credit cards</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'What is the most important factor in your credit score?', opts: ['Credit card limits', 'Payment history (35%)', 'Monthly income', 'Age'] },
  { q: 'What does credit utilization mean?', opts: ['Using credit cards for emergencies only', 'The percentage of available credit you\'re using', 'The number of credit cards', 'Your credit score'] },
  { q: 'How should you build credit as a young person?', opts: ['Get into debt immediately', 'Make small purchases and pay in full on time', 'Avoid credit cards completely', 'Max out credit cards'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_4_0"]:checked')?.value, document.querySelector('input[name="q_4_1"]:checked')?.value, document.querySelector('input[name="q_4_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'financial-literacy-module-5.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
