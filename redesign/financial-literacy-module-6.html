<body data-page="fl"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 6 of 10</span><h1 class="display-lg mt-s">Investment Basics for Beginners</h1><p class="lead mt-m">Investing grows wealth over time through compound interest. Common options: stocks (own shares in companies), bonds (loa...</p></div></div></section>

<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 6, COURSE_ID = 'financial-literacy', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Investment Basics for Beginners</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Understand stocks, bonds, and mutual funds</li><li>Learn the power of compound interest</li><li>Start investing for your future</li></ul></div><p class="module__summary">Investing grows wealth over time through compound interest. Common options: stocks (own shares in companies), bonds (loans to governments/companies), mutual funds (professionally managed portfolios), index funds (low-cost, diversified). Start small. Diversify (don't put all money in one thing). Think long-term. Risk increases with potential reward. Young people can take more risk due to time horizon.</p><div class="module__quiz"><strong>Quiz: Investment Basics for Beginners</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> What is compound interest?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_6_0" value="a"><span><strong>A.</strong> Interest charged on late payments</span></label><label class="module__option"><input type="radio" name="q_6_0" value="b"><span><strong>B.</strong> Interest earning interest over time</span></label><label class="module__option"><input type="radio" name="q_6_0" value="c"><span><strong>C.</strong> A type of loan</span></label><label class="module__option"><input type="radio" name="q_6_0" value="d"><span><strong>D.</strong> Same as simple interest</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> Which investment typically has lower risk?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_6_1" value="a"><span><strong>A.</strong> Individual stocks</span></label><label class="module__option"><input type="radio" name="q_6_1" value="b"><span><strong>B.</strong> Bonds</span></label><label class="module__option"><input type="radio" name="q_6_1" value="c"><span><strong>C.</strong> Penny stocks</span></label><label class="module__option"><input type="radio" name="q_6_1" value="d"><span><strong>D.</strong> Cryptocurrencies</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> Why should you diversify investments?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_6_2" value="a"><span><strong>A.</strong> To confuse yourself</span></label><label class="module__option"><input type="radio" name="q_6_2" value="b"><span><strong>B.</strong> To spread risk across different assets</span></label><label class="module__option"><input type="radio" name="q_6_2" value="c"><span><strong>C.</strong> To make more money immediately</span></label><label class="module__option"><input type="radio" name="q_6_2" value="d"><span><strong>D.</strong> It's not necessary</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'What is compound interest?', opts: ['Interest charged on late payments', 'Interest earning interest over time', 'A type of loan', 'Same as simple interest'] },
  { q: 'Which investment typically has lower risk?', opts: ['Individual stocks', 'Bonds', 'Penny stocks', 'Cryptocurrencies'] },
  { q: 'Why should you diversify investments?', opts: ['To confuse yourself', 'To spread risk across different assets', 'To make more money immediately', 'It\'s not necessary'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_6_0"]:checked')?.value, document.querySelector('input[name="q_6_1"]:checked')?.value, document.querySelector('input[name="q_6_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'financial-literacy-module-7.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
