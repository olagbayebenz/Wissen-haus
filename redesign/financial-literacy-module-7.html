<body data-page="fl"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 7 of 10</span><h1 class="display-lg mt-s">Retirement Planning Starts Now</h1><p class="lead mt-m">Retirement planning isn't just for old people—start now. Time is your biggest asset (compound interest). In Nigeria: con...</p></div></div></section>

<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="financial-literacy-module-6.html" class="btn btn--outline">← Previous</a><a href="financial-literacy-module-8.html" class="btn">Next →</a></div></div></section>

<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 7, COURSE_ID = 'financial-literacy', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Retirement Planning Starts Now</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Understand retirement accounts and options</li><li>Calculate retirement needs</li><li>Start saving for retirement early</li></ul></div><p class="module__summary">Retirement planning isn't just for old people—start now. Time is your biggest asset (compound interest). In Nigeria: contribute to pension schemes (mandatory for employees), invest in real estate, build a side business. Calculate how much you'll need based on desired lifestyle. The earlier you start, the less you need to contribute monthly due to compound growth.</p><div class="module__quiz"><strong>Quiz: Retirement Planning Starts Now</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> Why is it important to start retirement planning early?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_7_0" value="a"><span><strong>A.</strong> You have nothing else to do</span></label><label class="module__option"><input type="radio" name="q_7_0" value="b"><span><strong>B.</strong> Compound interest works better over longer periods</span></label><label class="module__option"><input type="radio" name="q_7_0" value="c"><span><strong>C.</strong> Retirement is coming soon</span></label><label class="module__option"><input type="radio" name="q_7_0" value="d"><span><strong>D.</strong> You need to worry now</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> What is one advantage of starting retirement savings at 25 vs 35?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_7_1" value="a"><span><strong>A.</strong> You'll look smarter</span></label><label class="module__option"><input type="radio" name="q_7_1" value="b"><span><strong>B.</strong> More time for compound growth, need to contribute less monthly</span></label><label class="module__option"><input type="radio" name="q_7_1" value="c"><span><strong>C.</strong> No advantage</span></label><label class="module__option"><input type="radio" name="q_7_1" value="d"><span><strong>D.</strong> Retirement accounts mature faster</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> Which is a retirement savings option in Nigeria?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_7_2" value="a"><span><strong>A.</strong> Only foreign investments</span></label><label class="module__option"><input type="radio" name="q_7_2" value="b"><span><strong>B.</strong> Pension schemes and real estate</span></label><label class="module__option"><input type="radio" name="q_7_2" value="c"><span><strong>C.</strong> Keeping money in a box</span></label><label class="module__option"><input type="radio" name="q_7_2" value="d"><span><strong>D.</strong> Lottery tickets</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'Why is it important to start retirement planning early?', opts: ['You have nothing else to do', 'Compound interest works better over longer periods', 'Retirement is coming soon', 'You need to worry now'] },
  { q: 'What is one advantage of starting retirement savings at 25 vs 35?', opts: ['You\'ll look smarter', 'More time for compound growth, need to contribute less monthly', 'No advantage', 'Retirement accounts mature faster'] },
  { q: 'Which is a retirement savings option in Nigeria?', opts: ['Only foreign investments', 'Pension schemes and real estate', 'Keeping money in a box', 'Lottery tickets'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_7_0"]:checked')?.value, document.querySelector('input[name="q_7_1"]:checked')?.value, document.querySelector('input[name="q_7_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'financial-literacy-module-8.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
