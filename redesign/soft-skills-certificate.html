<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Certificate - Wissen-Haus</title>
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="softskills">
<main id="main">

<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)">
  <div class="wrap">
    <div class="reveal">
      <span class="eyebrow">Congratulations!</span>
      <h1 class="display-lg mt-s">You've Completed All 6 Modules</h1>
      <p class="lead mt-m">Your certificate is ready to download and add to LinkedIn.</p>
    </div>
  </div>
</section>

<section class="section" id="certificateSection">
  <div class="wrap">
    <div class="certificate" id="certificate"></div>
  </div>
</section>

<section class="section section--tight">
  <div class="wrap">
    <div style="text-align:center;margin-top:32px">
      <a href="community.html" class="btn">← Back to Community Hub</a>
    </div>
  </div>
</section>

</main>

<script src="assets/js/auth.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/streak.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
  if (!user) { window.location.href = 'login.html'; } else {
    const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}');
    const progress = allProgress[user.email] || { completedModules: [], certificateId: null, certificateIssuedAt: null };

    if (progress.completedModules.length !== 6 && !window.location.search.includes('preview')) {
      document.getElementById('certificateSection').innerHTML = '<div class="wrap"><p style="text-align:center;color:var(--red);font-size:1.1rem;">You haven\'t completed all modules yet. <a href="soft-skills-course.html">Continue learning →</a></p><p style="text-align:center;margin-top:24px"><a href="?preview=true" style="color:var(--green-800);text-decoration:underline;">View preview →</a></p></div>';
    } else {
      // Generate certificate ID if needed (for preview or completion)
      if (!progress.certificateId) {
        progress.certificateId = 'WH-SSC-' + Date.now().toString(36).toUpperCase().slice(-8);
        progress.certificateIssuedAt = new Date().toISOString();
        allProgress[user.email] = progress;
        localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress));
      }

      const issuedDate = new Date(progress.certificateIssuedAt || new Date());
      const dateStr = issuedDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

      document.getElementById('certificate').innerHTML = `
        <div style="max-width: 950px; margin: 0 auto">
          <!-- Certificate Container -->
          <div style="padding: 80px 60px; border: 8px double var(--green-800); background: linear-gradient(135deg, rgba(15, 45, 29, 0.01), rgba(200, 160, 80, 0.01)); position: relative; box-shadow: inset 0 0 20px rgba(15, 45, 29, 0.05)">

            <!-- Top Decorative Element -->
            <div style="text-align: center; margin-bottom: 40px">
              <img src="assets/img/logo.png" alt="Logo" style="height: 50px; opacity: 0.8">
            </div>

            <!-- Title -->
            <div style="text-align: center; margin-bottom: 50px">
              <p style="color: var(--green-800); font-size: 0.9rem; letter-spacing: 3px; margin: 0; font-weight: 700">~ CERTIFICATE OF ~</p>
              <h1 style="color: var(--green-800); font-size: 3.5rem; margin: 12px 0; font-weight: 900; letter-spacing: 4px; font-family: var(--ff-display)">ACHIEVEMENT</h1>
              <div style="border-bottom: 3px solid var(--green-800); width: 150px; margin: 16px auto"></div>
            </div>

            <!-- Body -->
            <div style="text-align: center; margin-bottom: 50px">
              <p style="color: var(--ink-60); font-size: 1rem; margin: 0 0 16px; letter-spacing: 1px">Presented to</p>
              <h2 style="color: var(--green-800); font-size: 2.8rem; margin: 0 0 32px; font-weight: 900; font-family: var(--ff-display); text-transform: uppercase">${user.name}</h2>

              <p style="color: var(--ink); font-size: 1.05rem; margin: 0 0 12px; line-height: 1.8">
                For the successful completion of
              </p>
              <p style="color: var(--ink); font-size: 1.3rem; margin: 0 0 40px; font-weight: 700; font-family: var(--ff-display)">
                Soft Skills for the Modern Workplace
              </p>

              <p style="color: var(--ink-60); font-size: 0.95rem; max-width: 700px; margin: 0 auto; line-height: 1.7">
                In recognition of mastering essential professional competencies including communication, teamwork, time management, problem-solving, adaptability, and professional branding.
              </p>
            </div>

            <!-- Signature & Details Grid -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 60px; margin: 60px 0; align-items: flex-end">
              <!-- Signature -->
              <div style="text-align: center; padding-top: 24px; border-top: 2px solid var(--ink)">
                <div style="color: var(--ink); font-size: 1.5rem; font-style: italic; font-weight: 400; margin-bottom: 16px; letter-spacing: -0.5px; font-family: cursive; opacity: 0.9; line-height: 1.2">Benz Olagbaye</div>
                <p style="color: var(--ink); font-weight: 700; font-size: 0.85rem; margin: 0 0 4px">Founder & Executive Director</p>
                <p style="color: var(--ink-60); font-size: 0.8rem; margin: 0">Wissen-Haus</p>
              </div>

              <!-- Date & ID -->
              <div style="text-align: center">
                <div style="margin-bottom: 24px">
                  <p style="color: var(--ink-60); font-size: 0.85rem; margin: 0 0 4px; text-transform: uppercase; letter-spacing: 1px">Date Issued</p>
                  <p style="color: var(--ink); font-weight: 700; font-size: 1rem; margin: 0">${dateStr}</p>
                </div>
                <div>
                  <p style="color: var(--ink-60); font-size: 0.85rem; margin: 0 0 4px; text-transform: uppercase; letter-spacing: 1px">Certificate ID</p>
                  <p style="color: var(--green-800); font-family: var(--ff-mono); font-weight: 700; font-size: 0.95rem; margin: 0; letter-spacing: 2px">${progress.certificateId}</p>
                </div>
              </div>
            </div>

            <!-- Bottom Line -->
            <div style="border-top: 2px solid var(--green-800); margin-top: 40px; padding-top: 20px">
              <p style="color: var(--ink-60); font-size: 0.8rem; text-align: center; margin: 0; font-style: italic">
                This certificate is awarded in recognition of exceptional dedication and achievement
              </p>
            </div>
          </div>
        </div>

        <!-- Buttons -->
        <div style="margin-top: 40px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap">
          <button onclick="linkedInShare()" style="padding: 12px 28px; background: #0A66C2; color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 600; font-size: 0.95rem">Add to LinkedIn</button>
          <button onclick="window.print()" style="padding: 12px 28px; background: var(--green-800); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 600; font-size: 0.95rem">Print / Save as PDF</button>
        </div>
      `;

      window.linkedInShare = function() {
        const url = encodeURIComponent(window.location.href);
        const certId = progress.certificateId;
        const linkedInUrl = `https://www.linkedin.com/profile/add?startTask=CERTIFICATION_NAME&name=Soft%20Skills%20for%20the%20Modern%20Workplace&organizationName=Wissen-Haus%20Youth%20Empowerment%20Foundation&issueYear=${new Date().getFullYear()}&issueMonth=${String(new Date().getMonth() + 1).padStart(2, '0')}&certUrl=${url}&certId=${certId}`;
        window.open(linkedInUrl, '_blank');
      };
    }
  }
</script>
</body>
</html>
