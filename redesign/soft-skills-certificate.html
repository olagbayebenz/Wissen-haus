<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Certificate - Wissen-Haus</title>
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="softskills">
<main id="main">

<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)">
  <div class="wrap">
    <div class="reveal">
      <span class="eyebrow">Congratulations!</span>
      <h1 class="display-lg mt-s">You've Completed All 6 Modules</h1>
      <p class="lead mt-m">Your certificate is ready to download and add to LinkedIn.</p>
    </div>
  </div>
</section>

<section class="section" id="certificateSection">
  <div class="wrap">
    <div class="certificate" id="certificate"></div>
  </div>
</section>

<section class="section section--tight">
  <div class="wrap">
    <div style="text-align:center;margin-top:32px">
      <a href="community.html" class="btn">← Back to Community Hub</a>
    </div>
  </div>
</section>

</main>

<script src="assets/js/auth.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/streak.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
  if (!user) { window.location.href = 'login.html'; } else {
    const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}');
    const progress = allProgress[user.email] || { completedModules: [], certificateId: null, certificateIssuedAt: null };

    if (progress.completedModules.length !== 6 && !window.location.search.includes('preview')) {
      document.getElementById('certificateSection').innerHTML = '<div class="wrap"><p style="text-align:center;color:var(--red);font-size:1.1rem;">You haven\'t completed all modules yet. <a href="soft-skills-course.html">Continue learning →</a></p><p style="text-align:center;margin-top:24px"><a href="?preview=true" style="color:var(--green-800);text-decoration:underline;">View preview →</a></p></div>';
    } else {
      // Generate certificate ID if needed (for preview or completion)
      if (!progress.certificateId) {
        progress.certificateId = 'WH-SSC-' + Date.now().toString(36).toUpperCase().slice(-8);
        progress.certificateIssuedAt = new Date().toISOString();
        allProgress[user.email] = progress;
        localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress));
      }

      const issuedDate = new Date(progress.certificateIssuedAt || new Date());
      const dateStr = issuedDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

      document.getElementById('certificate').innerHTML = `
        <div style="text-align: center; padding: 64px 48px; border: 4px solid var(--green-800); border-radius: 4px; background: linear-gradient(135deg, rgba(15, 45, 29, 0.02), rgba(200, 160, 80, 0.02)); position: relative; max-width: 900px; margin: 0 auto; font-family: var(--ff-display)">

          <!-- Logo & Organization -->
          <div style="margin-bottom: 32px">
            <img src="assets/img/logo.png" alt="Wissen-Haus Logo" style="height: 60px; margin-bottom: 12px">
            <div style="color: var(--green-800); font-size: 1.3rem; font-weight: 900">WISSEN-HAUS</div>
            <div style="color: var(--ink-60); font-size: 0.9rem; letter-spacing: 1px">YOUTH EMPOWERMENT FOUNDATION</div>
          </div>

          <!-- Divider -->
          <div style="border-top: 3px solid var(--green-800); margin: 32px 0"></div>

          <!-- Certificate Title -->
          <h2 style="color: var(--green-800); font-size: 3rem; margin: 32px 0 8px; font-weight: 900; letter-spacing: 2px">CERTIFICATE</h2>
          <p style="color: var(--ink-60); font-size: 1.1rem; margin: 0 0 32px; font-weight: 600">OF COMPLETION</p>

          <!-- Main Text -->
          <p style="color: var(--ink); margin: 0 0 8px; font-size: 1.1rem">This is proudly presented to</p>
          <h3 style="color: var(--green-800); font-size: 2.2rem; margin: 0 0 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px">${user.name}</h3>

          <p style="color: var(--ink); margin: 0 0 8px; font-size: 1rem">for successfully completing</p>
          <h4 style="color: var(--ink); font-size: 1.6rem; margin: 0 0 32px; font-weight: 800">Soft Skills for the Modern Workplace</h4>

          <p style="color: var(--ink-60); margin: 0 0 40px; font-size: 0.95rem; line-height: 1.6">
            This course equipped you with essential professional skills in communication, teamwork, time management, problem-solving, adaptability, and professional branding. These competencies are recognized as fundamental to success in any career.
          </p>

          <!-- Signatures & Details -->
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin: 48px 0; align-items: flex-end">
            <!-- Left: Founder Signature -->
            <div style="text-align: center; border-top: 2px solid var(--ink); padding-top: 12px">
              <div style="color: var(--ink); font-size: 2.8rem; font-style: italic; font-weight: 300; margin-bottom: 12px; letter-spacing: -1px; font-family: Georgia, serif; text-shadow: 0.5px 0.5px 0px rgba(15, 45, 29, 0.1)">Benz Olagbaye</div>
              <div style="color: var(--ink-60); font-size: 0.85rem; font-weight: 500">Founder & Executive Director</div>
              <div style="color: var(--ink-60); font-size: 0.85rem">Wissen-Haus Youth Empowerment Foundation</div>
            </div>

            <!-- Right: Date & Certificate ID -->
            <div style="text-align: center">
              <div style="color: var(--ink-60); font-size: 0.9rem; margin-bottom: 4px">Issued on</div>
              <div style="color: var(--ink); font-weight: 600; font-size: 1rem; margin-bottom: 16px">${dateStr}</div>
              <div style="color: var(--ink-60); font-size: 0.9rem; margin-bottom: 4px">Certificate ID</div>
              <div style="color: var(--green-800); font-family: var(--ff-mono); font-weight: 700; font-size: 1rem; letter-spacing: 1px">${progress.certificateId}</div>
            </div>
          </div>

          <!-- Bottom Divider -->
          <div style="border-top: 3px solid var(--green-800); margin: 32px 0"></div>

          <!-- Footer -->
          <p style="color: var(--ink-60); font-size: 0.85rem; margin: 24px 0 0">
            This certificate recognizes the successful completion of all course requirements and mastery of essential soft skills for professional development.
          </p>
        </div>

        <!-- Buttons -->
        <div style="margin-top: 48px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap">
          <button onclick="linkedInShare()" style="padding: 14px 32px; background: #0A66C2; color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 600; font-size: 1rem">Add to LinkedIn</button>
          <button onclick="window.print()" style="padding: 14px 32px; background: var(--green-800); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 600; font-size: 1rem">Print / Save as PDF</button>
        </div>
      `;

      window.linkedInShare = function() {
        const url = encodeURIComponent(window.location.href);
        const certId = progress.certificateId;
        const linkedInUrl = `https://www.linkedin.com/profile/add?startTask=CERTIFICATION_NAME&name=Soft%20Skills%20for%20the%20Modern%20Workplace&organizationName=Wissen-Haus%20Youth%20Empowerment%20Foundation&issueYear=${new Date().getFullYear()}&issueMonth=${String(new Date().getMonth() + 1).padStart(2, '0')}&certUrl=${url}&certId=${certId}`;
        window.open(linkedInUrl, '_blank');
      };
    }
  }
</script>
</body>
</html>
