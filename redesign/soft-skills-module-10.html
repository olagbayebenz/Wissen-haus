<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Module 10: Stress Management & Resilience - Wissen-Haus</title>
<meta name="description" content="Build resilience: manage stress, recover from setbacks, and thrive under pressure.">
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/css/styles.css">
<noscript><style>.reveal{opacity:1!important;transform:none!important}</style></noscript>
</head>
<body data-page="softskills">
<noscript><div style="background:#0F2D1D;color:#fff;padding:12px 20px;text-align:center;font-family:sans-serif"><a href="community.html" style="color:#fff;margin:0 8px">Back to Community</a></div></noscript>

<main id="main">

<!-- PAGE HERO -->
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)">
  <div class="wrap">
    <div class="reveal">
      <span class="eyebrow">Module 10 of 10</span>
      <h1 class="display-lg mt-s">Stress Management & Resilience</h1>
      <p class="lead mt-m">Every career has challenging moments. Learn to manage stress healthily, bounce back from setbacks, and build the resilience that separates sustainable success from burnout.</p>
    </div>
  </div>
</section>

<!-- PROGRESS BAR -->
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0">
  <div class="wrap">
    <div class="course-progress">
      <div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div>
      <div class="course-progress__bar">
        <div class="course-progress__fill" id="progressFill"></div>
      </div>
    </div>
  </div>
</section>

<!-- MODULE CONTENT -->
<section class="section">
  <div class="wrap">
    <div class="module-single" id="moduleContent"></div>
  </div>
</section>

<!-- NAVIGATION -->
<section class="section section--tight">
  <div class="wrap">
    <div class="module-nav">
      <a href="soft-skills-course.html" class="btn btn--outline">← Back to Course</a>
      <a href="soft-skills-certificate.html" class="btn">Get Certificate →</a>
    </div>
  </div>
</section>

</main>

<script src="assets/js/auth.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/streak.js"></script>
<script>
  const MODULE_ID = 10;
  const TOTAL_MODULES = 10;

  document.getElementById('moduleContent').innerHTML = `
    <article class="module">
      <div class="module__header">
        <h2 class="module__title">Stress Management & Resilience</h2>
      </div>
      <div class="module__body">
        <div class="module__objectives">
          <strong>Learning Objectives</strong>
          <ul>
            <li>Recognize stress signals and manage your physical and emotional responses</li>
            <li>Develop resilience and bounce back from setbacks</li>
            <li>Build sustainable habits that support long-term success and well-being</li>
          </ul>
        </div>
        <p class="module__summary">Stress is inevitable, but how you respond determines your resilience and long-term success. This final module covers recognizing your stress signals early, using evidence-based techniques (breathing, exercise, time management, social support) to manage stress, and building psychological resilience—the ability to recover and learn from failure. You'll also explore how to set boundaries, ask for help, and create sustainable habits that allow you to thrive without burning out.</p>

        <div class="module__quiz">
          <strong>Quiz: Stress Management & Resilience</strong>

          <div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> Which is a healthy way to manage work stress?</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_10_0" value="a">
                <span><strong>A.</strong> Work longer hours to outpace the stress</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_10_0" value="b">
                <span><strong>B.</strong> Take breaks, exercise, sleep well, and talk to trusted people</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_10_0" value="c">
                <span><strong>C.</strong> Avoid the situation entirely</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_10_0" value="d">
                <span><strong>D.</strong> Never ask for help</span>
              </label>
            </div>
          </div>

          <div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> Resilience means:</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_10_1" value="a">
                <span><strong>A.</strong> Never feeling stressed or upset</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_10_1" value="b">
                <span><strong>B.</strong> Experiencing setbacks but recovering, learning, and growing stronger</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_10_1" value="c">
                <span><strong>C.</strong> Ignoring problems until they go away</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_10_1" value="d">
                <span><strong>D.</strong> Being tough and not showing emotion</span>
              </label>
            </div>
          </div>

          <div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> What is an important boundary to set for sustainable success?</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_10_2" value="a">
                <span><strong>A.</strong> Working 24/7 to prove commitment</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_10_2" value="b">
                <span><strong>B.</strong> Protecting time for rest, hobbies, relationships, and health</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_10_2" value="c">
                <span><strong>C.</strong> Saying yes to every request</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_10_2" value="d">
                <span><strong>D.</strong> Never taking vacation</span>
              </label>
            </div>
          </div>

          <button class="module__submit-btn" id="submitBtn">Submit Quiz</button>
          <div class="module__quiz-result" id="quizResult"></div>
        </div>
      </div>
    </article>
  `;

  const answers = { correct: ['b', 'b', 'b'] };
  const questionText = [
  { q: 'What is the best strategy for managing stress at work?', opts: ['Ignore it', 'Identify triggers, build healthy habits, seek support', 'Work more hours', 'Never take breaks'] },
  { q: 'How can you build resilience?', opts: ['Never face challenges', 'Learn from setbacks, develop coping strategies, seek mentorship', 'Give up easily', 'Avoid difficult tasks'] },
  { q: 'When should you take time for self-care?', opts: ['Never, always work', 'Regularly to maintain health and performance', 'Only on weekends', 'Time is too precious'] }
];
  const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');

  function getCourseProgress() {
    const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}');
    return allProgress[user.email] || { completedModules: [], certificateId: null, certificateIssuedAt: null };
  }

  function saveCourseProgress(progress) {
    const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}');
    allProgress[user.email] = progress;
    localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress));
  }

  function updateProgress() {
    const progress = getCourseProgress();
    const completed = progress.completedModules.length;
    document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`;
    document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%';
  }

  document.getElementById('submitBtn').addEventListener('click', function() {
    const userAnswers = [
      document.querySelector('input[name="q_10_0"]:checked')?.value,
      document.querySelector('input[name="q_10_1"]:checked')?.value,
      document.querySelector('input[name="q_10_2"]:checked')?.value
    ];

    if (userAnswers.includes(undefined)) {
      document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions before submitting.</div>';
      return;
    }

    let correct = 0;
    userAnswers.forEach((ans, idx) => {
      if (ans === answers.correct[idx]) correct++;
    });

    const percentage = (correct / 3) * 100;
    const passed = percentage >= 80;
    const resultDiv = document.getElementById('quizResult');

    if (passed) {
      resultDiv.innerHTML = `<div class="module__quiz-pass">✓ Passed! You got ${correct}/3 correct. Well done!</div>`;
      this.disabled = true;
      this.textContent = 'Completed ✓';

      const progress = getCourseProgress();
      if (!progress.completedModules.includes(MODULE_ID)) {
        progress.completedModules.push(MODULE_ID);
      }
      saveCourseProgress(progress);
      updateProgress();
    } else {
      resultDiv.innerHTML = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!</div>`;
    }
  });

  updateProgress();
</script>
</body>
</html>
