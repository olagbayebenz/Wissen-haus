<!DOCTYPE html>

<head>

<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="softskills">
<main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 3 of 6</span><h1 class="display-lg mt-s">Time Management & Productivity</h1><p class="lead mt-m">Productivity isn't about doing more—it's about doing what matters most with intention. Learn proven prioritization methods, build focused work habits, and maintain balance to avoid burnout.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 6 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="soft-skills-module-2.html" class="btn btn--outline">← Previous</a><a href="soft-skills-module-4.html" class="btn">Next →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/streak.js"></script>
<script>
const MODULE_ID = 3, TOTAL_MODULES = 6;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Time Management & Productivity</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Prioritize tasks using a clear framework</li><li>Protect deep work time and minimize distractions</li><li>Recognize burnout signs and practice sustainable productivity</li></ul></div><p class="module__summary">Productivity isn't about doing more—it's about doing what matters most with intention. Learn proven prioritization methods, build focused work habits, and maintain balance to avoid burnout.</p><div class="module__quiz"><strong>Quiz: Time Management</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> Which task should you prioritize first?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_3_0" value="a"><span><strong>A.</strong> Urgent AND Important</span></label><label class="module__option"><input type="radio" name="q_3_0" value="b"><span><strong>B.</strong> Important but NOT Urgent</span></label><label class="module__option"><input type="radio" name="q_3_0" value="c"><span><strong>C.</strong> Urgent but NOT Important</span></label><label class="module__option"><input type="radio" name="q_3_0" value="d"><span><strong>D.</strong> Neither</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> What is "deep work"?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_3_1" value="a"><span><strong>A.</strong> Working longer hours</span></label><label class="module__option"><input type="radio" name="q_3_1" value="b"><span><strong>B.</strong> Focused, distraction-free time on complex tasks</span></label><label class="module__option"><input type="radio" name="q_3_1" value="c"><span><strong>C.</strong> Multitasking</span></label><label class="module__option"><input type="radio" name="q_3_1" value="d"><span><strong>D.</strong> Responding to messages immediately</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> Early signs of burnout include:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_3_2" value="a"><span><strong>A.</strong> Feeling energized</span></label><label class="module__option"><input type="radio" name="q_3_2" value="b"><span><strong>B.</strong> Chronic fatigue, loss of motivation, difficulty concentrating</span></label><label class="module__option"><input type="radio" name="q_3_2" value="c"><span><strong>C.</strong> Clear boundaries</span></label><label class="module__option"><input type="radio" name="q_3_2" value="d"><span><strong>D.</strong> Regular vacation</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['a', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || { completedModules: [], certificateId: null, certificateIssuedAt: null }; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function updateProgress() { const progress = getCourseProgress(); const completed = progress.completedModules.length; document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_3_0"]:checked')?.value, document.querySelector('input[name="q_3_1"]:checked')?.value, document.querySelector('input[name="q_3_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct.</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); if (!progress.completedModules.includes(MODULE_ID)) { progress.completedModules.push(MODULE_ID); } saveCourseProgress(progress); updateProgress(); } else { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-fail">You got ${correct}/3. Need 80%.</div>`; } }); updateProgress();
</script>
</body>
</html>
