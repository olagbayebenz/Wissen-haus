<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 4: Problem-Solving - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="softskills"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 4 of 6</span><h1 class="display-lg mt-s">Problem-Solving & Critical Thinking</h1><p class="lead mt-m">Every professional faces unexpected challenges. Develop a structured approach to problem-solving that moves beyond surface-level fixes to real, lasting solutions.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 6 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="soft-skills-module-3.html" class="btn btn--outline">← Previous</a><a href="soft-skills-module-5.html" class="btn">Next →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script>
<script>
const MODULE_ID = 4, TOTAL_MODULES = 6;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Problem-Solving & Critical Thinking</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Break complex problems into manageable parts</li><li>Identify root causes, not just symptoms</li><li>Make informed decisions when facing uncertainty</li></ul></div><p class="module__summary">Every professional faces unexpected challenges. Develop a structured approach to problem-solving that moves beyond surface-level fixes to real, lasting solutions.</p><div class="module__quiz"><strong>Quiz: Problem-Solving</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> A course has 40% dropout. "Students aren't motivated" is a:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_4_0" value="a"><span><strong>A.</strong> Root cause</span></label><label class="module__option"><input type="radio" name="q_4_0" value="b"><span><strong>B.</strong> Symptom</span></label><label class="module__option"><input type="radio" name="q_4_0" value="c"><span><strong>C.</strong> Solution</span></label><label class="module__option"><input type="radio" name="q_4_0" value="d"><span><strong>D.</strong> Not relevant</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> The best way to find root cause is to:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_4_1" value="a"><span><strong>A.</strong> Assume the first explanation</span></label><label class="module__option"><input type="radio" name="q_4_1" value="b"><span><strong>B.</strong> Ask "Why?" repeatedly</span></label><label class="module__option"><input type="radio" name="q_4_1" value="c"><span><strong>C.</strong> Treat the symptom</span></label><label class="module__option"><input type="radio" name="q_4_1" value="d"><span><strong>D.</strong> Ignore the problem</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> When making decisions under uncertainty:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_4_2" value="a"><span><strong>A.</strong> Guess and hope</span></label><label class="module__option"><input type="radio" name="q_4_2" value="b"><span><strong>B.</strong> Gather info, consider options, accept risk</span></label><label class="module__option"><input type="radio" name="q_4_2" value="c"><span><strong>C.</strong> Wait for perfect info</span></label><label class="module__option"><input type="radio" name="q_4_2" value="d"><span><strong>D.</strong> Let others decide</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || { completedModules: [], certificateId: null, certificateIssuedAt: null }; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function updateProgress() { const progress = getCourseProgress(); const completed = progress.completedModules.length; document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_4_0"]:checked')?.value, document.querySelector('input[name="q_4_1"]:checked')?.value, document.querySelector('input[name="q_4_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct.</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); if (!progress.completedModules.includes(MODULE_ID)) { progress.completedModules.push(MODULE_ID); } saveCourseProgress(progress); updateProgress(); } else { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-fail">You got ${correct}/3. Need 80%.</div>`; } }); updateProgress();
</script></body></html>
