<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 5: Adaptability - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="softskills"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 5 of 6</span><h1 class="display-lg mt-s">Adaptability & Growth Mindset</h1><p class="lead mt-m">The only constant in modern work is change. Build mental resilience, adopt a growth mindset, and learn to see challenges as chances to develop new capabilities.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 6 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="soft-skills-module-4.html" class="btn btn--outline">← Previous</a><a href="soft-skills-module-6.html" class="btn">Next →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script>
<script>
const MODULE_ID = 5, TOTAL_MODULES = 6;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Adaptability & Growth Mindset</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Embrace change as an opportunity to learn</li><li>Extract lessons from failure without shame</li><li>Stay resourceful when plans fall apart</li></ul></div><p class="module__summary">The only constant in modern work is change. Build mental resilience, adopt a growth mindset, and learn to see challenges as chances to develop new capabilities.</p><div class="module__quiz"><strong>Quiz: Adaptability</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> A growth mindset means believing:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_5_0" value="a"><span><strong>A.</strong> Abilities are fixed</span></label><label class="module__option"><input type="radio" name="q_5_0" value="b"><span><strong>B.</strong> You can develop skills through effort</span></label><label class="module__option"><input type="radio" name="q_5_0" value="c"><span><strong>C.</strong> Failure defines you</span></label><label class="module__option"><input type="radio" name="q_5_0" value="d"><span><strong>D.</strong> Challenges are threats</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> When you fail, the best response is:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_5_1" value="a"><span><strong>A.</strong> Give up</span></label><label class="module__option"><input type="radio" name="q_5_1" value="b"><span><strong>B.</strong> Analyze lessons and try again differently</span></label><label class="module__option"><input type="radio" name="q_5_1" value="c"><span><strong>C.</strong> Blame others</span></label><label class="module__option"><input type="radio" name="q_5_1" value="d"><span><strong>D.</strong> Pretend it didn't happen</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> How should you respond to unexpected change?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_5_2" value="a"><span><strong>A.</strong> Resist it</span></label><label class="module__option"><input type="radio" name="q_5_2" value="b"><span><strong>B.</strong> See it as an opportunity to learn</span></label><label class="module__option"><input type="radio" name="q_5_2" value="c"><span><strong>C.</strong> Panic</span></label><label class="module__option"><input type="radio" name="q_5_2" value="d"><span><strong>D.</strong> Blame the organization</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'A growth mindset means believing:', opts: ['Abilities are fixed', 'You can develop skills through effort', 'Failure defines you', 'Challenges are threats'] },
  { q: 'When you fail, the best response is:', opts: ['Give up', 'Analyze lessons and try again differently', 'Blame others', 'Pretend it didn\'t happen'] },
  { q: 'How should you respond to unexpected change?', opts: ['Resist it', 'See it as an opportunity to learn', 'Panic', 'Blame the organization'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || { completedModules: [], certificateId: null, certificateIssuedAt: null }; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function updateProgress() { const progress = getCourseProgress(); const completed = progress.completedModules.length; document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_5_0"]:checked')?.value, document.querySelector('input[name="q_5_1"]:checked')?.value, document.querySelector('input[name="q_5_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct.</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); if (!progress.completedModules.includes(MODULE_ID)) { progress.completedModules.push(MODULE_ID); } saveCourseProgress(progress); updateProgress(); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
