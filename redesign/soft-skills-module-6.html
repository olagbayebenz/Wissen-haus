<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 6: Professional Branding - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="softskills"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 6 of 6</span><h1 class="display-lg mt-s">Professional Branding & Your Story</h1><p class="lead mt-m">Your brand is how the world knows you. Learn to tell your story clearly, build a professional presence that reflects your values, and position yourself for opportunities.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 6 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="soft-skills-module-5.html" class="btn btn--outline">← Previous Module</a><a href="soft-skills-certificate.html" class="btn">View Certificate →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script>
<script>
const MODULE_ID = 6, TOTAL_MODULES = 6;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Professional Branding & Your Story</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Craft a compelling personal narrative</li><li>Build and maintain a professional online presence</li><li>Present yourself authentically in interviews and networking</li></ul></div><p class="module__summary">Your brand is how the world knows you. Learn to tell your story clearly, build a professional presence that reflects your values, and position yourself for opportunities.</p><div class="module__quiz"><strong>Quiz: Professional Branding</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> Your professional brand should include:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_6_0" value="a"><span><strong>A.</strong> Only job title</span></label><label class="module__option"><input type="radio" name="q_6_0" value="b"><span><strong>B.</strong> Skills, values, unique perspective, what you care about</span></label><label class="module__option"><input type="radio" name="q_6_0" value="c"><span><strong>C.</strong> Exaggerations</span></label><label class="module__option"><input type="radio" name="q_6_0" value="d"><span><strong>D.</strong> Only technical skills</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> When networking, you should:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_6_1" value="a"><span><strong>A.</strong> Tell generic stories</span></label><label class="module__option"><input type="radio" name="q_6_1" value="b"><span><strong>B.</strong> Share specific stories that show skills & values authentically</span></label><label class="module__option"><input type="radio" name="q_6_1" value="c"><span><strong>C.</strong> Never mention personal experiences</span></label><label class="module__option"><input type="radio" name="q_6_1" value="d"><span><strong>D.</strong> Pretend to be someone else</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> Your LinkedIn profile should:</p><div class="module__options"><label class="module__option"><input type="radio" name="q_6_2" value="a"><span><strong>A.</strong> Be outdated</span></label><label class="module__option"><input type="radio" name="q_6_2" value="b"><span><strong>B.</strong> Reflect your identity, accomplishments, and goals</span></label><label class="module__option"><input type="radio" name="q_6_2" value="c"><span><strong>C.</strong> Copy someone else's</span></label><label class="module__option"><input type="radio" name="q_6_2" value="d"><span><strong>D.</strong> Only list job titles</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'Your professional brand should include:', opts: ['Only job title', 'Skills, values, unique perspective, what you care about', 'Exaggerations', 'Only technical skills'] },
  { q: 'When networking, you should:', opts: ['Tell generic stories', 'Share specific stories that show skills & values authentically', 'Never mention personal experiences', 'Pretend to be someone else'] },
  { q: 'Your LinkedIn profile should:', opts: ['Be outdated', 'Reflect your identity, accomplishments, and goals', 'Copy someone else\'s', 'Only list job titles'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || { completedModules: [], certificateId: null, certificateIssuedAt: null }; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function updateProgress() { const progress = getCourseProgress(); const completed = progress.completedModules.length; document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_6_0"]:checked')?.value, document.querySelector('input[name="q_6_1"]:checked')?.value, document.querySelector('input[name="q_6_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading your certificate...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); if (!progress.completedModules.includes(MODULE_ID)) { progress.completedModules.push(MODULE_ID); } saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'soft-skills-certificate.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
