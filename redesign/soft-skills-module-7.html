<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Module 7: Conflict Resolution - Wissen-Haus</title>
<meta name="description" content="Learn conflict resolution: navigate disagreements, find win-win solutions, and strengthen relationships.">
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/css/styles.css">
<noscript><style>.reveal{opacity:1!important;transform:none!important}</style></noscript>
</head>
<body data-page="softskills">
<noscript><div style="background:#0F2D1D;color:#fff;padding:12px 20px;text-align:center;font-family:sans-serif"><a href="community.html" style="color:#fff;margin:0 8px">Back to Community</a></div></noscript>

<main id="main">

<!-- PAGE HERO -->
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)">
  <div class="wrap">
    <div class="reveal">
      <span class="eyebrow">Module 7 of 10</span>
      <h1 class="display-lg mt-s">Conflict Resolution</h1>
      <p class="lead mt-m">Disagreements are inevitable at work. Learn to address conflicts directly, listen to opposing views, and find solutions that strengthen relationships rather than damage them.</p>
    </div>
  </div>
</section>

<!-- PROGRESS BAR -->
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0">
  <div class="wrap">
    <div class="course-progress">
      <div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div>
      <div class="course-progress__bar">
        <div class="course-progress__fill" id="progressFill"></div>
      </div>
    </div>
  </div>
</section>

<!-- MODULE CONTENT -->
<section class="section">
  <div class="wrap">
    <div class="module-single" id="moduleContent"></div>
  </div>
</section>

<!-- NAVIGATION -->
<section class="section section--tight">
  <div class="wrap">
    <div class="module-nav">
      <a href="soft-skills-course.html" class="btn btn--outline">← Back to Course</a>
      <a href="soft-skills-module-8.html" class="btn">Next Module →</a>
    </div>
  </div>
</section>

</main>

<script src="assets/js/auth.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/streak.js"></script>
<script>
  const MODULE_ID = 7;
  const TOTAL_MODULES = 10;

  document.getElementById('moduleContent').innerHTML = `
    <article class="module">
      <div class="module__header">
        <h2 class="module__title">Conflict Resolution</h2>
      </div>
      <div class="module__body">
        <div class="module__objectives">
          <strong>Learning Objectives</strong>
          <ul>
            <li>Navigate disagreements with composure and professionalism</li>
            <li>Understand different conflict styles and when to use them</li>
            <li>Find win-win solutions that preserve relationships</li>
          </ul>
        </div>
        <p class="module__summary">Conflict is a natural part of any workplace, but handling it poorly can damage careers and relationships. This module teaches you how to address disagreements head-on, listen to opposing viewpoints without becoming defensive, and negotiate solutions where everyone feels heard. You'll learn when to compromise, when to collaborate, and when to know your boundaries.</p>

        <div class="module__quiz">
          <strong>Quiz: Conflict Resolution</strong>

          <div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> When facing a conflict with a colleague, the first step should be to:</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_7_0" value="a">
                <span><strong>A.</strong> Tell your manager immediately</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_7_0" value="b">
                <span><strong>B.</strong> Have a private conversation and try to understand their perspective</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_7_0" value="c">
                <span><strong>C.</strong> Avoid the person and hope it resolves on its own</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_7_0" value="d">
                <span><strong>D.</strong> Express your frustration publicly so others understand</span>
              </label>
            </div>
          </div>

          <div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> In conflict resolution, a "win-win" solution means:</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_7_1" value="a">
                <span><strong>A.</strong> You get everything you wanted</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_7_1" value="b">
                <span><strong>B.</strong> Both parties' core needs are addressed, even if compromises are made</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_7_1" value="c">
                <span><strong>C.</strong> Someone has to lose for you to win</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_7_1" value="d">
                <span><strong>D.</strong> Conflicts are impossible to resolve fairly</span>
              </label>
            </div>
          </div>

          <div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> Which of these is NOT a healthy way to handle conflict?</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_7_2" value="a">
                <span><strong>A.</strong> Use "I" statements to express your feelings ("I felt frustrated when...")</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_7_2" value="b">
                <span><strong>B.</strong> Bring up past grievances unrelated to the current issue</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_7_2" value="c">
                <span><strong>C.</strong> Listen actively to understand the other person's point of view</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_7_2" value="d">
                <span><strong>D.</strong> Propose specific solutions you can both agree on</span>
              </label>
            </div>
          </div>

          <button class="module__submit-btn" id="submitBtn">Submit Quiz</button>
          <div class="module__quiz-result" id="quizResult"></div>
        </div>
      </div>
    </article>
  `;

  const answers = { correct: ['b', 'b', 'b'] };
  const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');

  function getCourseProgress() {
    const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}');
    return allProgress[user.email] || { completedModules: [], certificateId: null, certificateIssuedAt: null };
  }

  function saveCourseProgress(progress) {
    const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}');
    allProgress[user.email] = progress;
    localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress));
  }

  function updateProgress() {
    const progress = getCourseProgress();
    const completed = progress.completedModules.length;
    document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`;
    document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%';
  }

  document.getElementById('submitBtn').addEventListener('click', function() {
    const userAnswers = [
      document.querySelector('input[name="q_7_0"]:checked')?.value,
      document.querySelector('input[name="q_7_1"]:checked')?.value,
      document.querySelector('input[name="q_7_2"]:checked')?.value
    ];

    if (userAnswers.includes(undefined)) {
      document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions before submitting.</div>';
      return;
    }

    let correct = 0;
    userAnswers.forEach((ans, idx) => {
      if (ans === answers.correct[idx]) correct++;
    });

    const percentage = (correct / 3) * 100;
    const passed = percentage >= 80;
    const resultDiv = document.getElementById('quizResult');

    if (passed) {
      resultDiv.innerHTML = `<div class="module__quiz-pass">✓ Passed! You got ${correct}/3 correct. Well done!</div>`;
      this.disabled = true;
      this.textContent = 'Completed ✓';

      const progress = getCourseProgress();
      if (!progress.completedModules.includes(MODULE_ID)) {
        progress.completedModules.push(MODULE_ID);
      }
      saveCourseProgress(progress);
      updateProgress();
    } else {
      resultDiv.innerHTML = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!</div>`;
    }
  });

  updateProgress();
</script>
</body>
</html>
