<meta name="description" content="Develop leadership skills: inspire others, build credibility, and lead from any position.">

</head>
<body data-page="softskills">
<noscript><div style="background:#0F2D1D;color:#fff;padding:12px 20px;text-align:center;font-family:sans-serif"><a href="community.html" style="color:#fff;margin:0 8px">Back to Community</a></div></noscript>

<main id="main">

<!-- PAGE HERO -->
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)">
  <div class="wrap">
    <div class="reveal">
      <span class="eyebrow">Module 9 of 10</span>
      <h1 class="display-lg mt-s">Leadership & Influence</h1>
      <p class="lead mt-m">Leadership isn't just a title—it's the ability to inspire and influence others. Learn to build credibility, motivate teams, and lead from any position in your organization.</p>
    </div>
  </div>
</section>

<!-- PROGRESS BAR -->
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0">
  <div class="wrap">
    <div class="course-progress">
      <div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div>
      <div class="course-progress__bar">
        <div class="course-progress__fill" id="progressFill"></div>
      </div>
    </div>
  </div>
</section>

<!-- MODULE CONTENT -->
<section class="section">
  <div class="wrap">
    <div class="module-single" id="moduleContent"></div>
  </div>
</section>

<!-- NAVIGATION -->
<section class="section section--tight">
  <div class="wrap">
    <div class="module-nav">
      <a href="soft-skills-course.html" class="btn btn--outline">← Back to Course</a>
      <a href="soft-skills-module-10.html" class="btn">Next Module →</a>
    </div>
  </div>
</section>

</main>

<script src="assets/js/auth.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/streak.js"></script>
<script>
  const MODULE_ID = 9;
  const TOTAL_MODULES = 10;

  document.getElementById('moduleContent').innerHTML = `
    <article class="module">
      <div class="module__header">
        <h2 class="module__title">Leadership & Influence</h2>
      </div>
      <div class="module__body">
        <div class="module__objectives">
          <strong>Learning Objectives</strong>
          <ul>
            <li>Build credibility and trust with peers and leaders</li>
            <li>Inspire and motivate others toward shared goals</li>
            <li>Exercise influence without formal authority</li>
          </ul>
        </div>
        <p class="module__summary">The most effective leaders inspire others through authenticity, competence, and clear vision—not through titles alone. This module covers how to build credibility through consistent delivery, communicate your vision compellingly, develop people around you, and exercise influence whether you're a team member, team lead, or executive. You'll learn that leadership is a choice you make daily, not a position you achieve.</p>

        <div class="module__quiz">
          <strong>Quiz: Leadership & Influence</strong>

          <div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> What is the foundation of leadership credibility?</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_9_0" value="a">
                <span><strong>A.</strong> Talking a lot in meetings</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_9_0" value="b">
                <span><strong>B.</strong> Consistent follow-through, delivering on commitments, and admitting mistakes</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_9_0" value="c">
                <span><strong>C.</strong> Having a fancy job title</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_9_0" value="d">
                <span><strong>D.</strong> Being liked by everyone</span>
              </label>
            </div>
          </div>

          <div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> Which is an example of influencing without formal authority?</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_9_1" value="a">
                <span><strong>A.</strong> Forcing your ideas on colleagues</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_9_1" value="b">
                <span><strong>B.</strong> Collaborating with peers, building allies, and making a compelling case for your ideas</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_9_1" value="c">
                <span><strong>C.</strong> Waiting for permission before sharing ideas</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_9_1" value="d">
                <span><strong>D.</strong> Complaining about decisions behind closed doors</span>
              </label>
            </div>
          </div>

          <div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> A good leader develops others by:</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_9_2" value="a">
                <span><strong>A.</strong> Keeping people dependent on their decisions</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_9_2" value="b">
                <span><strong>B.</strong> Delegating challenging work, providing feedback, and creating growth opportunities</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_9_2" value="c">
                <span><strong>C.</strong> Micromanaging to ensure quality</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_9_2" value="d">
                <span><strong>D.</strong> Hoarding knowledge and opportunities</span>
              </label>
            </div>
          </div>

          <button class="module__submit-btn" id="submitBtn">Submit Quiz</button>
          <div class="module__quiz-result" id="quizResult"></div>
        </div>
      </div>
    </article>
  `;

  const answers = { correct: ['b', 'b', 'b'] };
  const questionText = [
  { q: 'What is a key quality of good leaders?', opts: ['Being the smartest person', 'Developing others and inspiring action', 'Doing all the work', 'Keeping information to yourself'] },
  { q: 'Can you lead without a formal title?', opts: ['No, only managers lead', 'Yes, through influence and initiative', 'Only executives lead', 'Leadership requires authority'] },
  { q: 'How do you influence others as an individual contributor?', opts: ['You can\'t', 'Show results, develop trust, take initiative', 'Wait for promotion', 'Follow orders only'] }
];
  const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');

  function getCourseProgress() {
    const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}');
    return allProgress[user.email] || { completedModules: [], certificateId: null, certificateIssuedAt: null };
  }

  function saveCourseProgress(progress) {
    const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}');
    allProgress[user.email] = progress;
    localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress));
  }

  function updateProgress() {
    const progress = getCourseProgress();
    const completed = progress.completedModules.length;
    document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`;
    document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%';
  }

  document.getElementById('submitBtn').addEventListener('click', function() {
    const userAnswers = [
      document.querySelector('input[name="q_9_0"]:checked')?.value,
      document.querySelector('input[name="q_9_1"]:checked')?.value,
      document.querySelector('input[name="q_9_2"]:checked')?.value
    ];

    if (userAnswers.includes(undefined)) {
      document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions before submitting.</div>';
      return;
    }

    let correct = 0;
    userAnswers.forEach((ans, idx) => {
      if (ans === answers.correct[idx]) correct++;
    });

    const percentage = (correct / 3) * 100;
    const passed = percentage >= 80;
    const resultDiv = document.getElementById('quizResult');

    if (passed) {
      resultDiv.innerHTML = `<div class="module__quiz-pass">✓ Passed! You got ${correct}/3 correct. Well done!</div>`;
      this.disabled = true;
      this.textContent = 'Completed ✓';

      const progress = getCourseProgress();
      if (!progress.completedModules.includes(MODULE_ID)) {
        progress.completedModules.push(MODULE_ID);
      }
      saveCourseProgress(progress);
      updateProgress();
    } else {
      resultDiv.innerHTML = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!</div>`;
    }
  });

  updateProgress();
</script>
</body>
</html>
