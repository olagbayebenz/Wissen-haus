<body data-page="wr"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 10 of 10</span><h1 class="display-lg mt-s">Leadership Mindset & Career Advancement</h1><p class="lead mt-m">Leadership isn't a title—it's mindset and actions. Lead from any position: take initiative, solve problems, develop othe...</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="workplace-readiness-module-9.html" class="btn btn--outline">← Previous</a><a href="workplace-readiness-module-11.html" class="btn">Next →</a></div></div></section>

<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 10, COURSE_ID = 'workplace-readiness', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Leadership Mindset & Career Advancement</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Develop leadership skills at any level</li><li>Position yourself for advancement</li><li>Influence without authority</li></ul></div><p class="module__summary">Leadership isn't a title—it's mindset and actions. Lead from any position: take initiative, solve problems, develop others, own your mistakes, celebrate team wins. Build reputation through results and character. Visibility matters—share wins, volunteer for stretch projects, mentor juniors. Continuous learning: read, attend workshops, learn from leaders around you. Leadership accelerates your career.</p><div class="module__quiz"><strong>Quiz: Leadership Mindset & Career Advancement</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> What is leadership at the individual contributor level?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_10_0" value="a"><span><strong>A.</strong> Doing only your job</span></label><label class="module__option"><input type="radio" name="q_10_0" value="b"><span><strong>B.</strong> Taking initiative, solving problems, influencing others</span></label><label class="module__option"><input type="radio" name="q_10_0" value="c"><span><strong>C.</strong> Waiting for promotion</span></label><label class="module__option"><input type="radio" name="q_10_0" value="d"><span><strong>D.</strong> Blaming management</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> How can you advance your career proactively?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_10_1" value="a"><span><strong>A.</strong> Wait for opportunities</span></label><label class="module__option"><input type="radio" name="q_10_1" value="b"><span><strong>B.</strong> Volunteer for stretch projects, build visibility, seek feedback</span></label><label class="module__option"><input type="radio" name="q_10_1" value="c"><span><strong>C.</strong> Job hop every year</span></label><label class="module__option"><input type="radio" name="q_10_1" value="d"><span><strong>D.</strong> Never change jobs</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> What's the fastest way to develop as a leader?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_10_2" value="a"><span><strong>A.</strong> Read books only</span></label><label class="module__option"><input type="radio" name="q_10_2" value="b"><span><strong>B.</strong> Observe good leaders, get mentor, apply lessons, reflect</span></label><label class="module__option"><input type="radio" name="q_10_2" value="c"><span><strong>C.</strong> Natural talent is all that matters</span></label><label class="module__option"><input type="radio" name="q_10_2" value="d"><span><strong>D.</strong> Wait for training course</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'What is leadership at the individual contributor level?', opts: ['Doing only your job', 'Taking initiative, solving problems, influencing others', 'Waiting for promotion', 'Blaming management'] },
  { q: 'How can you advance your career proactively?', opts: ['Wait for opportunities', 'Volunteer for stretch projects, build visibility, seek feedback', 'Job hop every year', 'Never change jobs'] },
  { q: 'What\'s the fastest way to develop as a leader?', opts: ['Read books only', 'Observe good leaders, get mentor, apply lessons, reflect', 'Natural talent is all that matters', 'Wait for training course'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_10_0"]:checked')?.value, document.querySelector('input[name="q_10_1"]:checked')?.value, document.querySelector('input[name="q_10_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'workplace-readiness-module-11.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
