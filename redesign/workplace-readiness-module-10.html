<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 10 - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="workplace"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 10 of 10</span><h1 class="display-lg mt-s">Leadership Mindset & Advancement</h1><p class="lead mt-m">Develop a leadership mindset, understand advancement paths, and position yourself for senior roles and strategic impact.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="workplace-readiness-module-9.html" class="btn btn--outline">← Previous Module</a><a href="workplace-readiness-certificate.html" class="btn">View Certificate →</a></div></div></section>

<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 10, COURSE_ID = 'workplace-readiness', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Leadership Mindset & Advancement</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Develop a strategic leadership mindset and vision</li><li>Understand advancement paths and succession planning</li><li>Build influence, inspire teams, and drive organizational impact</li></ul></div><p class="module__summary">The difference between managers and leaders is mindset. This module covers how to think strategically about your career trajectory, how to demonstrate leadership at every level (not just in official positions), how to build genuine influence through integrity and impact, and how to navigate advancement opportunities. You'll learn about succession planning, finding mentors in senior positions, building your executive presence, and how to prepare for roles you haven't held yet. This is about positioning yourself for long-term organizational leadership and impact.</p><div class="module__quiz"><strong>Quiz: Leadership Mindset & Advancement</strong><div class="module__question"><p class="module__question-text"><strong>Q1:</strong> What is the key difference between management and leadership?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_0" value="a"><span><strong>A.</strong> They are the same thing</span></label><label class="module__option"><input type="radio" name="q_10_0" value="b"><span><strong>B.</strong> Management organizes systems; leadership inspires vision and drives change</span></label><label class="module__option"><input type="radio" name="q_10_0" value="c"><span><strong>C.</strong> Only executives can be leaders</span></label><label class="module__option"><input type="radio" name="q_10_0" value="d"><span><strong>D.</strong> Leadership requires a formal title</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q2:</strong> How can you demonstrate leadership without an official management title?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_1" value="a"><span><strong>A.</strong> You can't—you need to wait for promotion</span></label><label class="module__option"><input type="radio" name="q_10_1" value="b"><span><strong>B.</strong> Take ownership of key projects, mentor peers, drive innovation, and solve problems others avoid</span></label><label class="module__option"><input type="radio" name="q_10_1" value="c"><span><strong>C.</strong> Focus only on individual tasks</span></label><label class="module__option"><input type="radio" name="q_10_1" value="d"><span><strong>D.</strong> Compete with colleagues to stand out</span></label></div></div><div class="module__question"><p class="module__question-text"><strong>Q3:</strong> What role does a mentor play in career advancement?</p><div class="module__options"><label class="module__option"><input type="radio" name="q_10_2" value="a"><span><strong>A.</strong> Mentors guarantee promotions</span></label><label class="module__option"><input type="radio" name="q_10_2" value="b"><span><strong>B.</strong> Mentors provide guidance, expose you to opportunities, advocate for you, and help you navigate politics</span></label><label class="module__option"><input type="radio" name="q_10_2" value="c"><span><strong>C.</strong> Mentors are optional</span></label><label class="module__option"><input type="radio" name="q_10_2" value="d"><span><strong>D.</strong> Only junior staff need mentors</span></label></div></div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
  const questionText = [
  { q: 'What is the key difference between management and leadership?', opts: ['They are the same thing', 'Management organizes systems; leadership inspires vision and drives change', 'Only executives can be leaders', 'Leadership requires a formal title'] },
  { q: 'How can you demonstrate leadership without an official management title?', opts: ['You can\'t—you need to wait for promotion', 'Take ownership of key projects, mentor peers, drive innovation, and solve problems others avoid', 'Focus only on individual tasks', 'Compete with colleagues to stand out'] },
  { q: 'What role does a mentor play in career advancement?', opts: ['Mentors guarantee promotions', 'Mentors provide guidance, expose you to opportunities, advocate for you, and help you navigate politics', 'Mentors are optional', 'Only junior staff need mentors'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_10_0"]:checked')?.value, document.querySelector('input[name="q_10_1"]:checked')?.value, document.querySelector('input[name="q_10_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-pass">✓ Passed!</div>'; this.disabled = true; setTimeout(() => { window.location.href = 'workplace-readiness-certificate.html'; }, 1500); const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); } else { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Got ' + correct + '/3. Need 80%.</div>'; } }); updateProgress();
</script></body></html>
