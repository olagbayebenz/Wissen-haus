<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 2: Communication in the Workplace - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="wr"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 2 of 10</span><h1 class="display-lg mt-s">Communication in the Workplace</h1><p class="lead mt-m">Workplace communication isn't just talking—it's clarity, respect, and listening. Email: be concise, professional, clear ...</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="workplace-readiness-module-1.html" class="btn btn--outline">← Previous</a><a href="workplace-readiness-module-3.html" class="btn">Next →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 2, COURSE_ID = 'workplace-readiness', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Communication in the Workplace</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Communicate clearly and professionally</li><li>Listen actively in conversations</li><li>Navigate difficult conversations effectively</li></ul></div><p class="module__summary">Workplace communication isn't just talking—it's clarity, respect, and listening. Email: be concise, professional, clear subject lines. Meetings: listen more than you talk, ask clarifying questions. Difficult convos: be direct but kind, focus on behavior not character. Regular 1-on-1s with managers build trust. Written communication lasts—think before you send.</p><div class="module__quiz"><strong>Quiz: Communication in the Workplace</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> What makes professional email communication effective?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_2_0" value="a"><span><strong>A.</strong> Long emails with lots of details</span></label><label class="module__option"><input type="radio" name="q_2_0" value="b"><span><strong>B.</strong> Concise message, clear subject, professional tone</span></label><label class="module__option"><input type="radio" name="q_2_0" value="c"><span><strong>C.</strong> Casual language and jokes</span></label><label class="module__option"><input type="radio" name="q_2_0" value="d"><span><strong>D.</strong> Sending at midnight</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> What should you prioritize in workplace meetings?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_2_1" value="a"><span><strong>A.</strong> Talking as much as possible</span></label><label class="module__option"><input type="radio" name="q_2_1" value="b"><span><strong>B.</strong> Listening actively and asking clarifying questions</span></label><label class="module__option"><input type="radio" name="q_2_1" value="c"><span><strong>C.</strong> Looking at your phone</span></label><label class="module__option"><input type="radio" name="q_2_1" value="d"><span><strong>D.</strong> Arriving late</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> When having a difficult conversation at work, focus on:</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_2_2" value="a"><span><strong>A.</strong> The person's character</span></label><label class="module__option"><input type="radio" name="q_2_2" value="b"><span><strong>B.</strong> Specific behaviors and impact</span></label><label class="module__option"><input type="radio" name="q_2_2" value="c"><span><strong>C.</strong> Getting angry</span></label><label class="module__option"><input type="radio" name="q_2_2" value="d"><span><strong>D.</strong> Avoiding the topic</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'What makes professional email communication effective?', opts: ['Long emails with lots of details', 'Concise message, clear subject, professional tone', 'Casual language and jokes', 'Sending at midnight'] },
  { q: 'What should you prioritize in workplace meetings?', opts: ['Talking as much as possible', 'Listening actively and asking clarifying questions', 'Looking at your phone', 'Arriving late'] },
  { q: 'When having a difficult conversation at work, focus on:', opts: ['The person\'s character', 'Specific behaviors and impact', 'Getting angry', 'Avoiding the topic'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_2_0"]:checked')?.value, document.querySelector('input[name="q_2_1"]:checked')?.value, document.querySelector('input[name="q_2_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'workplace-readiness-module-3.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
