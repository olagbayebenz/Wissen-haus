<body data-page="wr"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 3 of 10</span><h1 class="display-lg mt-s">Time Management & Productivity</h1><p class="lead mt-m">Time management is about priorities, not just schedules. Use urgent/important matrix: important but not urgent tasks cre...</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>

<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="workplace-readiness-module-2.html" class="btn btn--outline">← Previous</a><a href="workplace-readiness-module-4.html" class="btn">Next →</a></div></div></section>

<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 3, COURSE_ID = 'workplace-readiness', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Time Management & Productivity</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Prioritize tasks effectively</li><li>Manage energy and avoid burnout</li><li>Build sustainable productivity habits</li></ul></div><p class="module__summary">Time management is about priorities, not just schedules. Use urgent/important matrix: important but not urgent tasks create success. Batch similar tasks. Block deep work time. Say no to time-wasters. Energy management matters: peak hours for hard work, routine tasks when tired. Breaks boost productivity. Protect time like you protect money.</p><div class="module__quiz"><strong>Quiz: Time Management & Productivity</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> What is the urgent/important matrix for?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_3_0" value="a"><span><strong>A.</strong> Scheduling meetings</span></label><label class="module__option"><input type="radio" name="q_3_0" value="b"><span><strong>B.</strong> Prioritizing tasks by impact vs urgency</span></label><label class="module__option"><input type="radio" name="q_3_0" value="c"><span><strong>C.</strong> Measuring productivity</span></label><label class="module__option"><input type="radio" name="q_3_0" value="d"><span><strong>D.</strong> Planning vacations</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> When should you tackle your most challenging work?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_3_1" value="a"><span><strong>A.</strong> End of day when tired</span></label><label class="module__option"><input type="radio" name="q_3_1" value="b"><span><strong>B.</strong> During your peak energy hours</span></label><label class="module__option"><input type="radio" name="q_3_1" value="c"><span><strong>C.</strong> Whenever convenient</span></label><label class="module__option"><input type="radio" name="q_3_1" value="d"><span><strong>D.</strong> Late at night</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> What is time blocking?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_3_2" value="a"><span><strong>A.</strong> Avoiding work</span></label><label class="module__option"><input type="radio" name="q_3_2" value="b"><span><strong>B.</strong> Scheduling dedicated time for specific tasks</span></label><label class="module__option"><input type="radio" name="q_3_2" value="c"><span><strong>C.</strong> Taking more breaks</span></label><label class="module__option"><input type="radio" name="q_3_2" value="d"><span><strong>D.</strong> Multitasking</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'What is the urgent/important matrix for?', opts: ['Scheduling meetings', 'Prioritizing tasks by impact vs urgency', 'Measuring productivity', 'Planning vacations'] },
  { q: 'When should you tackle your most challenging work?', opts: ['End of day when tired', 'During your peak energy hours', 'Whenever convenient', 'Late at night'] },
  { q: 'What is time blocking?', opts: ['Avoiding work', 'Scheduling dedicated time for specific tasks', 'Taking more breaks', 'Multitasking'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_3_0"]:checked')?.value, document.querySelector('input[name="q_3_1"]:checked')?.value, document.querySelector('input[name="q_3_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'workplace-readiness-module-4.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
