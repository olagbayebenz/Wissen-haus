<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 5: Problem-Solving & Decision-Making - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="wr"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 5 of 10</span><h1 class="display-lg mt-s">Problem-Solving & Decision-Making</h1><p class="lead mt-m">Problems are inevitable; panic is optional. Framework: define problem clearly (not symptoms), gather info, generate solu...</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="workplace-readiness-module-4.html" class="btn btn--outline">← Previous</a><a href="workplace-readiness-module-6.html" class="btn">Next →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 5, COURSE_ID = 'workplace-readiness', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Problem-Solving & Decision-Making</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Use structured approaches to solve problems</li><li>Make decisions with incomplete information</li><li>Learn from mistakes</li></ul></div><p class="module__summary">Problems are inevitable; panic is optional. Framework: define problem clearly (not symptoms), gather info, generate solutions, evaluate trade-offs, decide, implement, review. Decisions rarely have perfect information—gather enough, then decide. Perfectionism paralyzes. Document decisions and reasoning. After-action reviews turn mistakes into lessons. Involve others for diverse perspectives.</p><div class="module__quiz"><strong>Quiz: Problem-Solving & Decision-Making</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> When defining a problem, what should you avoid?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_5_0" value="a"><span><strong>A.</strong> Understanding the real issue</span></label><label class="module__option"><input type="radio" name="q_5_0" value="b"><span><strong>B.</strong> Confusing symptoms with root cause</span></label><label class="module__option"><input type="radio" name="q_5_0" value="c"><span><strong>C.</strong> Asking questions</span></label><label class="module__option"><input type="radio" name="q_5_0" value="d"><span><strong>D.</strong> Involving others</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> How should you handle decisions with incomplete information?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_5_1" value="a"><span><strong>A.</strong> Avoid making them</span></label><label class="module__option"><input type="radio" name="q_5_1" value="b"><span><strong>B.</strong> Gather enough info, then decide confidently</span></label><label class="module__option"><input type="radio" name="q_5_1" value="c"><span><strong>C.</strong> Wait forever for perfect info</span></label><label class="module__option"><input type="radio" name="q_5_1" value="d"><span><strong>D.</strong> Guess randomly</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> What is the purpose of an after-action review?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_5_2" value="a"><span><strong>A.</strong> Blame people</span></label><label class="module__option"><input type="radio" name="q_5_2" value="b"><span><strong>B.</strong> Learn from outcomes and improve</span></label><label class="module__option"><input type="radio" name="q_5_2" value="c"><span><strong>C.</strong> Forget it happened</span></label><label class="module__option"><input type="radio" name="q_5_2" value="d"><span><strong>D.</strong> Celebrate only wins</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'When defining a problem, what should you avoid?', opts: ['Understanding the real issue', 'Confusing symptoms with root cause', 'Asking questions', 'Involving others'] },
  { q: 'How should you handle decisions with incomplete information?', opts: ['Avoid making them', 'Gather enough info, then decide confidently', 'Wait forever for perfect info', 'Guess randomly'] },
  { q: 'What is the purpose of an after-action review?', opts: ['Blame people', 'Learn from outcomes and improve', 'Forget it happened', 'Celebrate only wins'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_5_0"]:checked')?.value, document.querySelector('input[name="q_5_1"]:checked')?.value, document.querySelector('input[name="q_5_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'workplace-readiness-module-6.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
