<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 6 - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="workplace"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 6 of 10</span><h1 class="display-lg mt-s">Feedback, Criticism & Growth</h1><p class="lead mt-m">Module 6 content.</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="workplace-readiness-module-5.html" class="btn btn--outline">← Previous Module</a><a href="7.html" class="btn">Next Module →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 6, COURSE_ID = 'workplace-readiness', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = '<article class="module"><div class="module__body"><h2>Feedback, Criticism & Growth</h2><p>Module 6 content for Feedback, Criticism & Growth</p><div class="module__quiz"><strong>Quiz</strong><div class="module__question"><p><strong>Q1:</strong> Question</p><div class="module__options"><label><input type="radio" name="q_6_0" value="b"> Correct</label><label><input type="radio" name="q_6_0" value="a"> Option</label></div></div><div class="module__question"><p><strong>Q2:</strong> Question</p><div class="module__options"><label><input type="radio" name="q_6_1" value="b"> Correct</label><label><input type="radio" name="q_6_1" value="a"> Option</label></div></div><div class="module__question"><p><strong>Q3:</strong> Question</p><div class="module__options"><label><input type="radio" name="q_6_2" value="b"> Correct</label><label><input type="radio" name="q_6_2" value="a"> Option</label></div></div><button id="submitBtn" class="module__submit-btn">Submit</button><div id="quizResult"></div></div></div></article>';
const answers = { correct: ['b', 'b', 'b'] };
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_6_0"]:checked')?.value, document.querySelector('input[name="q_6_1"]:checked')?.value, document.querySelector('input[name="q_6_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all.</div>'; return; } let correct = 0; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-pass">✓ Passed!</div>'; this.disabled = true; setTimeout(() => { window.location.href = '7.html'; }, 1500); const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); } else { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Got ' + correct + '/3. Need 80%.</div>'; } }); updateProgress();
</script></body></html>
