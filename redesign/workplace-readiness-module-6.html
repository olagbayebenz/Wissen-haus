<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 6: Feedback, Criticism & Growth - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="wr"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 6 of 10</span><h1 class="display-lg mt-s">Feedback, Criticism & Growth</h1><p class="lead mt-m">Feedback is a gift—good performers want it. Receiving: listen without interrupting, ask clarifying questions, thank them...</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="workplace-readiness-module-5.html" class="btn btn--outline">← Previous</a><a href="workplace-readiness-module-7.html" class="btn">Next →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 6, COURSE_ID = 'workplace-readiness', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Feedback, Criticism & Growth</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Receive feedback without defensiveness</li><li>Give constructive feedback</li><li>Use criticism as a growth tool</li></ul></div><p class="module__summary">Feedback is a gift—good performers want it. Receiving: listen without interrupting, ask clarifying questions, thank them (even if you disagree). Don't make excuses immediately. Reflect first. Giving: be specific (not "you're bad"), focus on behavior/impact, offer solutions, praise publicly, criticize privately. Regular feedback prevents annual review surprises.</p><div class="module__quiz"><strong>Quiz: Feedback, Criticism & Growth</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> When receiving critical feedback, what's your best first response?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_6_0" value="a"><span><strong>A.</strong> Get defensive</span></label><label class="module__option"><input type="radio" name="q_6_0" value="b"><span><strong>B.</strong> Listen actively without interrupting</span></label><label class="module__option"><input type="radio" name="q_6_0" value="c"><span><strong>C.</strong> Immediately make excuses</span></label><label class="module__option"><input type="radio" name="q_6_0" value="d"><span><strong>D.</strong> Ignore it</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> How should constructive feedback be delivered?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_6_1" value="a"><span><strong>A.</strong> Publicly in meetings</span></label><label class="module__option"><input type="radio" name="q_6_1" value="b"><span><strong>B.</strong> Specific, behavior-focused, with solutions</span></label><label class="module__option"><input type="radio" name="q_6_1" value="c"><span><strong>C.</strong> As insults</span></label><label class="module__option"><input type="radio" name="q_6_1" value="d"><span><strong>D.</strong> Vaguely and indirectly</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> Why should you give feedback regularly, not just annually?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_6_2" value="a"><span><strong>A.</strong> To be annoying</span></label><label class="module__option"><input type="radio" name="q_6_2" value="b"><span><strong>B.</strong> Prevents surprises, enables real-time improvement</span></label><label class="module__option"><input type="radio" name="q_6_2" value="c"><span><strong>C.</strong> Feedback doesn't matter</span></label><label class="module__option"><input type="radio" name="q_6_2" value="d"><span><strong>D.</strong> Only once a year is enough</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'When receiving critical feedback, what\'s your best first response?', opts: ['Get defensive', 'Listen actively without interrupting', 'Immediately make excuses', 'Ignore it'] },
  { q: 'How should constructive feedback be delivered?', opts: ['Publicly in meetings', 'Specific, behavior-focused, with solutions', 'As insults', 'Vaguely and indirectly'] },
  { q: 'Why should you give feedback regularly, not just annually?', opts: ['To be annoying', 'Prevents surprises, enables real-time improvement', 'Feedback doesn\'t matter', 'Only once a year is enough'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_6_0"]:checked')?.value, document.querySelector('input[name="q_6_1"]:checked')?.value, document.querySelector('input[name="q_6_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'workplace-readiness-module-7.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
