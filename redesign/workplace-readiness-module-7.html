<body data-page="wr"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 7 of 10</span><h1 class="display-lg mt-s">Meetings, Presentations & Public Speaking</h1><p class="lead mt-m">Meetings are expensive—make them count. Always have agenda, start/end on time, clear decisions/actions. Presentations: k...</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="workplace-readiness-module-6.html" class="btn btn--outline">← Previous</a><a href="workplace-readiness-module-8.html" class="btn">Next →</a></div></div></section>

<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 7, COURSE_ID = 'workplace-readiness', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Meetings, Presentations & Public Speaking</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Run effective meetings</li><li>Deliver compelling presentations</li><li>Build public speaking confidence</li></ul></div><p class="module__summary">Meetings are expensive—make them count. Always have agenda, start/end on time, clear decisions/actions. Presentations: know your material, tell stories (not just data), practice delivery, answer questions confidently. Public speaking anxiety is normal—preparation fixes it. Speak slower than you think, pause for breath, engage audience. Video yourself to improve.</p><div class="module__quiz"><strong>Quiz: Meetings, Presentations & Public Speaking</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> What should every effective meeting have?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_7_0" value="a"><span><strong>A.</strong> No preparation</span></label><label class="module__option"><input type="radio" name="q_7_0" value="b"><span><strong>B.</strong> Clear agenda, set time frame, defined outcomes</span></label><label class="module__option"><input type="radio" name="q_7_0" value="c"><span><strong>C.</strong> No action items</span></label><label class="module__option"><input type="radio" name="q_7_0" value="d"><span><strong>D.</strong> Unlimited duration</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> What's the best way to reduce public speaking anxiety?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_7_1" value="a"><span><strong>A.</strong> Never speak publicly</span></label><label class="module__option"><input type="radio" name="q_7_1" value="b"><span><strong>B.</strong> Thorough preparation and practice</span></label><label class="module__option"><input type="radio" name="q_7_1" value="c"><span><strong>C.</strong> Drink coffee beforehand</span></label><label class="module__option"><input type="radio" name="q_7_1" value="d"><span><strong>D.</strong> Hope for the best</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> How should presentations be structured?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_7_2" value="a"><span><strong>A.</strong> Data dump with no story</span></label><label class="module__option"><input type="radio" name="q_7_2" value="b"><span><strong>B.</strong> Story + data + clear takeaways</span></label><label class="module__option"><input type="radio" name="q_7_2" value="c"><span><strong>C.</strong> As long as possible</span></label><label class="module__option"><input type="radio" name="q_7_2" value="d"><span><strong>D.</strong> Read directly from slides</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'What should every effective meeting have?', opts: ['No preparation', 'Clear agenda, set time frame, defined outcomes', 'No action items', 'Unlimited duration'] },
  { q: 'What\'s the best way to reduce public speaking anxiety?', opts: ['Never speak publicly', 'Thorough preparation and practice', 'Drink coffee beforehand', 'Hope for the best'] },
  { q: 'How should presentations be structured?', opts: ['Data dump with no story', 'Story + data + clear takeaways', 'As long as possible', 'Read directly from slides'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_7_0"]:checked')?.value, document.querySelector('input[name="q_7_1"]:checked')?.value, document.querySelector('input[name="q_7_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'workplace-readiness-module-8.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
