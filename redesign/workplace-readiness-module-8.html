<!DOCTYPE html>

<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 8: Conflict Resolution at Work - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="wr"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 8 of 10</span><h1 class="display-lg mt-s">Conflict Resolution at Work</h1><p class="lead mt-m">Conflict is normal; how you handle it defines you. Approach: cool down first (don't react angry), talk privately 1-on-1,...</p></div></div></section>

<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="workplace-readiness-module-7.html" class="btn btn--outline">← Previous</a><a href="workplace-readiness-module-9.html" class="btn">Next →</a></div></div></section>

<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 8, COURSE_ID = 'workplace-readiness', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Conflict Resolution at Work</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Handle workplace conflicts constructively</li><li>Maintain professionalism during disagreements</li><li>Find win-win solutions</li></ul></div><p class="module__summary">Conflict is normal; how you handle it defines you. Approach: cool down first (don't react angry), talk privately 1-on-1, listen to their perspective, focus on shared goals, find compromise. Never take it personally or go public. If unresolved, involve manager/HR calmly. Document conversations. Apologize genuinely when wrong. Respect maintained relationships.</p><div class="module__quiz"><strong>Quiz: Conflict Resolution at Work</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> What's the first step when conflict arises at work?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_8_0" value="a"><span><strong>A.</strong> Escalate immediately to management</span></label><label class="module__option"><input type="radio" name="q_8_0" value="b"><span><strong>B.</strong> Cool down, then talk privately 1-on-1</span></label><label class="module__option"><input type="radio" name="q_8_0" value="c"><span><strong>C.</strong> Complain to colleagues</span></label><label class="module__option"><input type="radio" name="q_8_0" value="d"><span><strong>D.</strong> Ignore it and hope it goes away</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> When resolving conflict, what should you focus on?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_8_1" value="a"><span><strong>A.</strong> Winning the argument</span></label><label class="module__option"><input type="radio" name="q_8_1" value="b"><span><strong>B.</strong> Shared goals and finding compromise</span></label><label class="module__option"><input type="radio" name="q_8_1" value="c"><span><strong>C.</strong> Proving the other person wrong</span></label><label class="module__option"><input type="radio" name="q_8_1" value="d"><span><strong>D.</strong> Getting revenge</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> Where should difficult conversations happen?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_8_2" value="a"><span><strong>A.</strong> Publicly in front of colleagues</span></label><label class="module__option"><input type="radio" name="q_8_2" value="b"><span><strong>B.</strong> Private, 1-on-1 setting</span></label><label class="module__option"><input type="radio" name="q_8_2" value="c"><span><strong>C.</strong> In an email</span></label><label class="module__option"><input type="radio" name="q_8_2" value="d"><span><strong>D.</strong> Never</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'What\'s the first step when conflict arises at work?', opts: ['Escalate immediately to management', 'Cool down, then talk privately 1-on-1', 'Complain to colleagues', 'Ignore it and hope it goes away'] },
  { q: 'When resolving conflict, what should you focus on?', opts: ['Winning the argument', 'Shared goals and finding compromise', 'Proving the other person wrong', 'Getting revenge'] },
  { q: 'Where should difficult conversations happen?', opts: ['Publicly in front of colleagues', 'Private, 1-on-1 setting', 'In an email', 'Never'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_8_0"]:checked')?.value, document.querySelector('input[name="q_8_1"]:checked')?.value, document.querySelector('input[name="q_8_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'workplace-readiness-module-9.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
