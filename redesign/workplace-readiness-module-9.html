<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Module 9: Performance Reviews & Career Conversations - Wissen-Haus</title><link rel="icon" href="assets/img/logo.png"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="wr"><main id="main">
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)"><div class="wrap"><div class="reveal"><span class="eyebrow">Module 9 of 10</span><h1 class="display-lg mt-s">Performance Reviews & Career Conversations</h1><p class="lead mt-m">Performance reviews determine raises, promotions, and development. Prepare: document accomplishments, metrics, challenge...</p></div></div></section>
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0"><div class="wrap"><div class="course-progress"><div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div><div class="course-progress__bar"><div class="course-progress__fill" id="progressFill"></div></div></div></div></section>
<section class="section"><div class="wrap"><div class="module-single" id="moduleContent"></div></div></section>
<section class="section section--tight"><div class="wrap"><div class="module-nav"><a href="workplace-readiness-module-8.html" class="btn btn--outline">← Previous</a><a href="workplace-readiness-module-10.html" class="btn">Next →</a></div></div></section>
</main>
<script src="assets/js/auth.js"></script><script src="assets/js/main.js"></script><script src="assets/js/streak.js"></script><script src="assets/js/courseData.js"></script>
<script>
const MODULE_ID = 9, COURSE_ID = 'workplace-readiness', TOTAL_MODULES = 10;
document.getElementById('moduleContent').innerHTML = `<article class="module"><div class="module__header"><h2 class="module__title">Performance Reviews & Career Conversations</h2></div><div class="module__body"><div class="module__objectives"><strong>Learning Objectives</strong><ul><li>Prepare for performance reviews</li><li>Advocate for yourself professionally</li><li>Plan your career trajectory</li></ul></div><p class="module__summary">Performance reviews determine raises, promotions, and development. Prepare: document accomplishments, metrics, challenges overcome, goals for next period. During: discuss openly, ask for feedback, clarify expectations. Career conversations with your manager align your growth with company needs. Ask for specific development opportunities. Don't wait annually—check in quarterly.</p><div class="module__quiz"><strong>Quiz: Performance Reviews & Career Conversations</strong><div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> How should you prepare for a performance review?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_9_0" value="a"><span><strong>A.</strong> Hope your manager remembers your work</span></label><label class="module__option"><input type="radio" name="q_9_0" value="b"><span><strong>B.</strong> Document accomplishments, metrics, challenges</span></label><label class="module__option"><input type="radio" name="q_9_0" value="c"><span><strong>C.</strong> Wait for feedback only</span></label><label class="module__option"><input type="radio" name="q_9_0" value="d"><span><strong>D.</strong> Never prepare</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> When asking for a promotion, you should:</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_9_1" value="a"><span><strong>A.</strong> Demand it immediately</span></label><label class="module__option"><input type="radio" name="q_9_1" value="b"><span><strong>B.</strong> Show readiness: skills, results, understanding of next role</span></label><label class="module__option"><input type="radio" name="q_9_1" value="c"><span><strong>C.</strong> Threaten to leave</span></label><label class="module__option"><input type="radio" name="q_9_1" value="d"><span><strong>D.</strong> Wait passively</span></label></div>
          </div><div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> How often should you have career conversations with your manager?</p>
            <div class="module__options"><label class="module__option"><input type="radio" name="q_9_2" value="a"><span><strong>A.</strong> Once every 5 years</span></label><label class="module__option"><input type="radio" name="q_9_2" value="b"><span><strong>B.</strong> Quarterly or at minimum 2x yearly</span></label><label class="module__option"><input type="radio" name="q_9_2" value="c"><span><strong>C.</strong> Never</span></label><label class="module__option"><input type="radio" name="q_9_2" value="d"><span><strong>D.</strong> Only when complaining</span></label></div>
          </div><button class="module__submit-btn" id="submitBtn">Submit Quiz</button><div class="module__quiz-result" id="quizResult"></div></div></div></article>`;
const answers = { correct: ['b', 'b', 'b'] };
const questionText = [
  { q: 'How should you prepare for a performance review?', opts: ['Hope your manager remembers your work', 'Document accomplishments, metrics, challenges', 'Wait for feedback only', 'Never prepare'] },
  { q: 'When asking for a promotion, you should:', opts: ['Demand it immediately', 'Show readiness: skills, results, understanding of next role', 'Threaten to leave', 'Wait passively'] },
  { q: 'How often should you have career conversations with your manager?', opts: ['Once every 5 years', 'Quarterly or at minimum 2x yearly', 'Never', 'Only when complaining'] }
];
const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');
function getCourseProgress() { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); return allProgress[user.email] || {}; }
function saveCourseProgress(progress) { const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}'); allProgress[user.email] = progress; localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress)); }
function getModuleKey(cid, mid) { return cid + '_' + mid; }
function updateProgress() { const progress = getCourseProgress(); let completed = 0; for (let i = 1; i <= TOTAL_MODULES; i++) { if (progress[getModuleKey(COURSE_ID, i)]) completed++; } document.getElementById('progressLabel').textContent = completed + ' of ' + TOTAL_MODULES + ' modules complete'; document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%'; }
document.getElementById('submitBtn').addEventListener('click', function() { const userAnswers = [document.querySelector('input[name="q_9_0"]:checked')?.value, document.querySelector('input[name="q_9_1"]:checked')?.value, document.querySelector('input[name="q_9_2"]:checked')?.value]; if (userAnswers.includes(undefined)) { document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions.</div>'; return; } let correct = 0; const wrongQuestions = []; userAnswers.forEach((ans, idx) => { if (ans === answers.correct[idx]) correct++; else wrongQuestions.push({ index: idx + 1, question: questionText[idx].q, userAnswer: questionText[idx].opts[ans.charCodeAt(0) - 97], correctAnswer: questionText[idx].opts[answers.correct[idx].charCodeAt(0) - 97] }); }); if ((correct / 3) * 100 >= 80) { document.getElementById('quizResult').innerHTML = `<div class="module__quiz-pass">✓ Passed! ${correct}/3 correct. Loading next module...</div>`; this.disabled = true; this.textContent = 'Completed ✓'; const progress = getCourseProgress(); const modKey = getModuleKey(COURSE_ID, MODULE_ID); progress[modKey] = true; saveCourseProgress(progress); updateProgress(); setTimeout(() => { window.location.href = 'workplace-readiness-module-10.html'; }, 1500); } else { let html = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!<br><br><strong>Questions You Got Wrong:</strong>`; wrongQuestions.forEach(item => { html += `<div style="margin-top:12px;padding:12px;background:rgba(220,38,38,0.1);border-left:3px solid var(--red);border-radius:4px"><strong>Q${item.index}:</strong> ${item.question}<br><span style="color:var(--red)">Your answer:</span> ${item.userAnswer}<br><span style="color:var(--green-800)">Correct answer:</span> ${item.correctAnswer}</div>`; }); html += '</div>'; document.getElementById('quizResult').innerHTML = html; } }); updateProgress();
</script></body></html>
