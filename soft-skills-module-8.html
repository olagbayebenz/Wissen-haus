<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Module 8: Emotional Intelligence - Wissen-Haus</title>
<meta name="description" content="Develop emotional intelligence: understand emotions, manage stress, and build stronger relationships.">
<link rel="icon" href="assets/img/logo.png">
<link rel="stylesheet" href="assets/css/styles.css">
<noscript><style>.reveal{opacity:1!important;transform:none!important}</style></noscript>
</head>
<body data-page="softskills">
<noscript><div style="background:#0F2D1D;color:#fff;padding:12px 20px;text-align:center;font-family:sans-serif"><a href="community.html" style="color:#fff;margin:0 8px">Back to Community</a></div></noscript>

<main id="main">

<!-- PAGE HERO -->
<section class="section section--tight" style="padding-top:clamp(48px,6vw,84px)">
  <div class="wrap">
    <div class="reveal">
      <span class="eyebrow">Module 8 of 10</span>
      <h1 class="display-lg mt-s">Emotional Intelligence</h1>
      <p class="lead mt-m">Your emotional intelligence determines how you react under pressure, connect with others, and recover from setbacks. Learn to recognize emotions, manage them, and use them as strengths.</p>
    </div>
  </div>
</section>

<!-- PROGRESS BAR -->
<section class="section section--tight" style="padding:clamp(24px,3vw,40px) 0">
  <div class="wrap">
    <div class="course-progress">
      <div class="course-progress__label" id="progressLabel">0 of 10 modules complete</div>
      <div class="course-progress__bar">
        <div class="course-progress__fill" id="progressFill"></div>
      </div>
    </div>
  </div>
</section>

<!-- MODULE CONTENT -->
<section class="section">
  <div class="wrap">
    <div class="module-single" id="moduleContent"></div>
  </div>
</section>

<!-- NAVIGATION -->
<section class="section section--tight">
  <div class="wrap">
    <div class="module-nav">
      <a href="soft-skills-course.html" class="btn btn--outline">← Back to Course</a>
      <a href="soft-skills-module-9.html" class="btn">Next Module →</a>
    </div>
  </div>
</section>

</main>

<script src="assets/js/auth.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/streak.js"></script>
<script>
  const MODULE_ID = 8;
  const TOTAL_MODULES = 10;

  document.getElementById('moduleContent').innerHTML = `
    <article class="module">
      <div class="module__header">
        <h2 class="module__title">Emotional Intelligence</h2>
      </div>
      <div class="module__body">
        <div class="module__objectives">
          <strong>Learning Objectives</strong>
          <ul>
            <li>Recognize and name your emotions accurately</li>
            <li>Manage emotional reactions in high-pressure situations</li>
            <li>Build empathy and strengthen interpersonal relationships</li>
          </ul>
        </div>
        <p class="module__summary">Emotional intelligence (EQ) is the ability to understand and manage your own emotions while recognizing emotions in others. This module covers self-awareness (knowing your triggers and patterns), self-regulation (staying calm under pressure), empathy (understanding others' feelings), and relationship management (using emotions to connect and influence). High EQ is a predictor of career success, leadership effectiveness, and personal well-being.</p>

        <div class="module__quiz">
          <strong>Quiz: Emotional Intelligence</strong>

          <div class="module__question">
            <p class="module__question-text"><strong>Q1:</strong> Self-awareness in emotional intelligence means:</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_8_0" value="a">
                <span><strong>A.</strong> Knowing what others think about you</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_8_0" value="b">
                <span><strong>B.</strong> Understanding your own emotions, triggers, and how they affect your behavior</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_8_0" value="c">
                <span><strong>C.</strong> Being overly self-critical</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_8_0" value="d">
                <span><strong>D.</strong> Suppressing all emotions at work</span>
              </label>
            </div>
          </div>

          <div class="module__question">
            <p class="module__question-text"><strong>Q2:</strong> When you feel angry or frustrated at work, what should you do?</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_8_1" value="a">
                <span><strong>A.</strong> Express it immediately to avoid bottling it up</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_8_1" value="b">
                <span><strong>B.</strong> Pause, breathe, understand the feeling, then respond thoughtfully</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_8_1" value="c">
                <span><strong>C.</strong> Pretend you don't feel anything</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_8_1" value="d">
                <span><strong>D.</strong> Blame others for making you feel this way</span>
              </label>
            </div>
          </div>

          <div class="module__question">
            <p class="module__question-text"><strong>Q3:</strong> Empathy in the workplace helps you:</p>
            <div class="module__options">
              <label class="module__option">
                <input type="radio" name="q_8_2" value="a">
                <span><strong>A.</strong> Get others to do what you want</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_8_2" value="b">
                <span><strong>B.</strong> Understand others' perspectives, build trust, and collaborate more effectively</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_8_2" value="c">
                <span><strong>C.</strong> Avoid having to make tough decisions</span>
              </label>
              <label class="module__option">
                <input type="radio" name="q_8_2" value="d">
                <span><strong>D.</strong> Be liked by everyone</span>
              </label>
            </div>
          </div>

          <button class="module__submit-btn" id="submitBtn">Submit Quiz</button>
          <div class="module__quiz-result" id="quizResult"></div>
        </div>
      </div>
    </article>
  `;

  const answers = { correct: ['b', 'b', 'b'] };
  const user = JSON.parse(localStorage.getItem('wh_currentUser') || 'null');

  function getCourseProgress() {
    const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}');
    return allProgress[user.email] || { completedModules: [], certificateId: null, certificateIssuedAt: null };
  }

  function saveCourseProgress(progress) {
    const allProgress = JSON.parse(localStorage.getItem('wh_courseProgress') || '{}');
    allProgress[user.email] = progress;
    localStorage.setItem('wh_courseProgress', JSON.stringify(allProgress));
  }

  function updateProgress() {
    const progress = getCourseProgress();
    const completed = progress.completedModules.length;
    document.getElementById('progressLabel').textContent = `${completed} of ${TOTAL_MODULES} modules complete`;
    document.getElementById('progressFill').style.width = (completed / TOTAL_MODULES) * 100 + '%';
  }

  document.getElementById('submitBtn').addEventListener('click', function() {
    const userAnswers = [
      document.querySelector('input[name="q_8_0"]:checked')?.value,
      document.querySelector('input[name="q_8_1"]:checked')?.value,
      document.querySelector('input[name="q_8_2"]:checked')?.value
    ];

    if (userAnswers.includes(undefined)) {
      document.getElementById('quizResult').innerHTML = '<div class="module__quiz-fail">Please answer all questions before submitting.</div>';
      return;
    }

    let correct = 0;
    userAnswers.forEach((ans, idx) => {
      if (ans === answers.correct[idx]) correct++;
    });

    const percentage = (correct / 3) * 100;
    const passed = percentage >= 80;
    const resultDiv = document.getElementById('quizResult');

    if (passed) {
      resultDiv.innerHTML = `<div class="module__quiz-pass">✓ Passed! You got ${correct}/3 correct. Well done!</div>`;
      this.disabled = true;
      this.textContent = 'Completed ✓';

      const progress = getCourseProgress();
      if (!progress.completedModules.includes(MODULE_ID)) {
        progress.completedModules.push(MODULE_ID);
      }
      saveCourseProgress(progress);
      updateProgress();
    } else {
      resultDiv.innerHTML = `<div class="module__quiz-fail">You got ${correct}/3 correct. Need 80% to pass. Try again!</div>`;
    }
  });

  updateProgress();
</script>
</body>
</html>
